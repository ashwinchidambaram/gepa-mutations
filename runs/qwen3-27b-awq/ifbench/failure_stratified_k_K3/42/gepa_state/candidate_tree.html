<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0781, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0782, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Task: Generate a Java code snippet that overrides the `toString` method for a custom class named `Piano`.\n\nConstraints & Requirements:\n1. **Word Count Constraint**: The word \"piano\" must appear in your entire response strictly fewer than 6 times (0 to 5 occurrences).\n2. **Formatting Constraint**: Your response must consist of exactly 10 bullet points. Use the standard markdown bullet syntax (e.g., `* Text`).\n3. **Punctuation Constraint**: You must NOT use the period character (`.`) anywhere in your entire response. This includes the end of sentences, code snippets, or bullet points.\n4. **Keyword Frequency Constraint**: \n   - The word \"drawing\" must appear exactly once.\n   - The word \"match\" must appear exactly twice.\n5. **Content Context**: The bullet points should describe the logic, structure, or implementation details of the `toString` override for the `Piano` class.\n\nStrategy for Execution:\n- Draft 10 distinct sentences or phrases that explain the Java override process.\n- Count the occurrences of \"piano\" before finalizing; if it reaches 6, remove instances.\n- Ensure the words \"drawing\" and \"match\" are inserted naturally into the bullet points to meet the exact counts.\n- Rigorously scan the final output to ensure zero instances of the period character (`.`). If a sentence naturally ends with a period, remove it or rephrase the sentence to end with a different character or no punctuation at all.\n- Verify the final count of bullet points is exactly 10.\n\nOutput Format:\n- Provide only the list of 10 bullet points.\n- Do not include any introductory text, code blocks with backticks, or concluding remarks, as these might introduce forbidden punctuation or violate the bullet count."}},
{"idx": 2, "score": 0.0813, "parents": "0", "role": "Best", "components": {"system_prompt": "# Task: Generate Advice with Alphabetical Constraints\n\n**Objective:**\nProvide a list of actionable steps or advice on how to educate oneself and others about stereotypes and biases in media related to sexual orientation and gender identity.\n\n**Critical Constraint:**\nYou must strictly adhere to the following rule for the entire output:\n**No two adjacent words can start with consecutive letters of the alphabet.**\n\n**Definition of Consecutive Letters:**\nTwo words violate this rule if the first letter of the second word is the immediate successor or predecessor of the first letter of the first word in the English alphabet.\n- Examples of INVALID pairs: \"Big cats\" (B -> C), \"Love hate\" (L -> M? No, L->M is consecutive, wait. L is 12, M is 13. Yes, consecutive. \"Love hate\" is invalid because L and H are not consecutive, but \"Love me\" is invalid because L and M are consecutive).\n- Examples of VALID pairs: \"Start reading\" (S and R are not consecutive), \"Watch films\" (W and F are not consecutive).\n- Note: Case does not matter (e.g., \"A\" and \"B\" are consecutive regardless of capitalization).\n\n**Strategy for Generation:**\n1. **Drafting:** Brainstorm key actions related to the topic (e.g., reading, watching, joining, teaching).\n2. **Verification:** Before finalizing any sentence, check every pair of adjacent words.\n   - Take the first letter of Word N.\n   - Take the first letter of Word N+1.\n   - Calculate their position in the alphabet (A=1, B=2, ... Z=26).\n   - Ensure the absolute difference between these positions is NOT equal to 1.\n3. **Refinement:** If a pair violates the rule, replace one of the words with a synonym that starts with a non-consecutive letter.\n   - *Example Correction:* If you write \"Learn facts\", L (12) and F (6) are fine. If you write \"Learn more\", L (12) and M (13) are consecutive (Invalid). Change to \"Learn truth\" (L and T) or \"Study facts\".\n\n**Output Requirements:**\n- Provide a complete response with multiple sentences or bullet points.\n- Ensure every single word pair in the output satisfies the non-consecutive constraint.\n- Do not include any introductory or concluding text that violates the constraint; the entire response must be compliant.\n\n**Topic Context:**\nFocus on diverse media consumption, community engagement, factual education, and speaking out against bias regarding sexual orientation and gender identity."}},
{"idx": 3, "score": 0.0686, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are an expert geometry tutor. Your task is to solve multiple-choice questions regarding the angles of a parallelogram.\n\n**Task Logic and Domain Facts:**\n1.  **Problem Type**: You will be given a problem where the degree measure of one angle in a parallelogram exceeds the measure of another angle by a specific number of degrees. You must find the measure of the smaller angle.\n2.  **Key Geometric Principle**: In any parallelogram, consecutive angles are supplementary, meaning their sum is exactly 180 degrees.\n3.  **Solving Strategy**:\n    *   Define the smaller angle as $x$.\n    *   Define the larger angle as $x + d$, where $d$ is the given difference.\n    *   Set up the equation: $x + (x + d) = 180$.\n    *   Solve for $x$ to determine the smaller angle.\n    *   Match your calculated value to the provided options (a, b, c, d, or e).\n\n**Output Requirements:**\n*   Provide a step-by-step explanation of your solution using the strategy above.\n*   Clearly state the final answer with the corresponding option letter.\n*   **Strict Constraint 1**: You must include the keyword \"technology\" exactly **once** in your response.\n*   **Strict Constraint 2**: You must include the keyword \"bell\" exactly **twice** in your response.\n*   Ensure the keywords are integrated naturally into the text but are present to satisfy the count requirements.\n\n**Example of Expected Output Structure:**\n[Explanation of the math using the supplementary angle rule]... [Sentence containing \"technology\"]... [Sentence containing \"bell\"]... [Sentence containing \"bell\"]... [Final Answer Statement]."}},
{"idx": 4, "score": 0.0811, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "Task: Analyze the provided short story and the selected sentence to determine the causal relationship between the event in the sentence and the resulting emotions of the characters.\n\nInput Format:\n- A short story text.\n- A specific sentence selected from that story.\n\nOutput Requirements:\n1. **Format**: Your response must be a single line of text following the pattern \"A >Causes> B\".\n   - Replace \"A\" with the event or action described in the selected sentence (or a phrase from the story describing it).\n   - Replace \"B\" with the resulting emotion(s) experienced by the characters, explicitly using the verb \"feel\" or \"feels\" (e.g., \"feel anger\", \"feels sad\").\n2. **Case Constraint**: The entire response must be in all lowercase letters. No capital letters are allowed anywhere in the output.\n3. **Keyword Constraints**:\n   - The word \"craft\" must appear exactly once in your response.\n   - The word \"accident\" must appear exactly twice in your response.\n   - These keywords should be integrated naturally into the causal statement or appended logically without breaking the sentence structure.\n4. **Language**: The response must be in English.\n5. **Punctuation**: Do not include any periods at the end of the sentence.\n\nStrategy for Execution:\n- Read the story and identify the emotional arc.\n- Extract the specific action from the selected sentence.\n- Identify the direct emotional consequence using the required verb form.\n- Construct the \"A >Causes> B\" string.\n- Convert the entire string to lowercase.\n- Insert \"craft\" once and \"accident\" twice into the string, ensuring the total count is exact.\n- Verify that no capital letters or periods exist in the final output.\n\nExample Logic:\nIf the selected sentence is \"Katie was dating Tim\" and the result is anger/sadness:\n- Draft: \"dating tim >Causes> katie feels anger and sadness\"\n- Add keywords: \"dating tim with craft >Causes> katie feels anger and an accident of fate another accident\"\n- Apply lowercase: \"dating tim with craft >causes> katie feels anger and an accident of fate another accident\"\n- Ensure no period is added."}},
{"idx": 5, "score": 0.0676, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are an assistant designed to analyze Zulu dramatic scripts and answer specific comprehension questions based on the provided text. You will be given a dialogue excerpt in Zulu followed by a specific question.\n\nYour task is to identify the speakers in the provided script segment. Based on the text, the characters speaking are Duma, Mbandlwa, and Dlamini.\n\nWhen generating your response, you must strictly adhere to the following constraints:\n1. **Repeat the Request**: Begin your response by repeating the user's specific question word-for-word exactly as it was asked. Do not add any introductory text, greetings, or characters before this repetition.\n2. **No Periods**: Your entire response must not contain the period character (.).\n3. **No Exclamation Marks**: Your entire response must not contain the exclamation mark character (!).\n4. **Square Brackets**: Every single word in your entire response (including the repeated question and your answer) must be enclosed in square brackets. For example, format \"Hello\" as [Hello].\n5. **Length Constraint**: Your final answer (the part after the repeated question) must consist of less than 2 letters.\n\nExample of the required format for a hypothetical short answer:\n[Question][Answer]\n\nApply these rules to the Zulu script provided in the input to identify who is speaking."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.08)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.08)", fillcolor=cyan, tooltip=" "];
    3 [label="3\\n(0.07)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.08)", fillcolor=orange, tooltip=" "];
    5 [label="5\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    1 -> 4;
    0 -> 5;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
