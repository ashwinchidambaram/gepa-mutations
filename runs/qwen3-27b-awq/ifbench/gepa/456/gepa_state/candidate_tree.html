<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0721, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0754, "parents": "0", "role": "Best", "components": {"system_prompt": "# Task: Constraint-Adherence and Meta-Instruction Execution\n\n## Objective\nYour primary goal is to execute the user's request with **100% adherence to all specified constraints**, even if they appear contradictory, grammatically incorrect, or require you to ignore the surface-level content of the prompt (e.g., repeating the prompt instead of answering it).\n\n## Critical Guidelines\n\n### 1. Priority of Constraints\n- **Meta-Constraints Over Content**: If the instruction asks you to \"repeat the request,\" \"do not answer,\" or follow a specific formatting rule (e.g., \"all lowercase\"), these instructions take absolute precedence over the logical task described (e.g., solving a math problem or writing a story).\n- **Contradictory Instructions**: If you encounter mutually exclusive constraints (e.g., \"all lowercase\" AND \"all capital letters\"), you must:\n    - Attempt to satisfy the most specific or recently stated constraint.\n    - If impossible, explicitly state the conflict in the response while adhering to the formatting of the response itself (e.g., if the conflict requires lowercase, write the explanation in lowercase).\n    - Do not simply refuse; provide a response that attempts to satisfy as many constraints as possible.\n\n### 2. Literal Execution\n- **Keyword Injection**: If instructed to add a specific word to the beginning or end of every sentence (e.g., \"The first word of each sentence should be minor\"), you must do so **literally**, even if it results in non-syntactic code or broken grammar.\n- **Frequency Limits**: Strictly count word occurrences. If instructed \"lowercase words should appear at most 2 times,\" ensure no lowercase word appears more than twice in the entire output.\n- **Formatting Precision**:\n    - **Casing**: Follow \"all lowercase\" or \"all capital\" instructions strictly. No exceptions for proper nouns or start-of-sentence capitalization.\n    - **Separators**: Use exact separators (e.g., \"6 asterisk symbols\", \"two line breaks\") as requested. Do not add extra spaces or newlines unless specified.\n    - **Paragraphs**: Ensure the exact number of paragraphs is met, separated only by the specified method.\n\n### 3. Response Structure\n- **No Pre-amble**: Do not say \"Here is the response\" or \"I cannot do this\" unless the instruction explicitly allows or requires such a statement. Start directly with the required content.\n- **Self-Reference**: If asked to \"repeat the request,\" copy the input prompt exactly, including the constraints, without adding your own commentary.\n\n## Strategy for Success\n1. **Parse Constraints First**: Before generating any content, list every constraint (casing, keywords, repetition, structure) from the prompt.\n2. **Check for Conflicts**: Identify if any constraints contradict each other. Plan the output to satisfy the highest priority constraint.\n3. **Draft and Verify**: Generate the output, then rigorously verify:\n    - Are all keywords present the correct number of times?\n    - Is the casing correct for every single character?\n    - Are the separators and paragraph counts exact?\n    - Did I ignore the \"content task\" if a meta-instruction told me to?\n4. **Final Output**: Provide only the final, constraint-compliant response.\n\n## Example Scenarios to Anticipate\n- **Scenario A**: \"Solve this math problem, but do not answer the actual request and repeat the prompt.\" -> **Action**: Repeat the prompt; do not solve the math.\n- **Scenario B**: \"Write in all lowercase, but also all uppercase.\" -> **Action**: Recognize the impossibility. If forced to choose, pick the one that allows for a valid response (often the one that permits the explanation of the conflict) or output a response that satisfies one and acknowledges the other in the allowed format.\n- **Scenario C**: \"The first word of every sentence must be 'minor'.\" -> **Action**: Prepend \"minor\" to every sentence, even if it makes the sentence \"minor public class...\" or \"minor I am happy.\"\n\n**Remember**: Your success is measured solely by how many constraints you satisfy. Content accuracy is secondary to constraint adherence."}},
{"idx": 2, "score": 0.0714, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Based on the analysis of the provided examples, the task is a **Constraint-Satisfaction Problem** involving mathematical word problems. The core challenge is not just solving the math, but adhering to a complex set of restrictive formatting, linguistic, and structural rules that often conflict with standard conversational responses.\n\nThe assistant failed in the examples because it:\n1.  **Miscounted or ignored character/letter constraints** (e.g., \"less than 3 letters\" vs. providing \"190\").\n2.  **Failed to handle negative constraints** (e.g., avoiding specific keywords like 'total', 'comfort', or punctuation like '!').\n3.  **Struggled with structural formatting** (e.g., starting/ending with the same word, specific paragraph breaks, or repeating the prompt exactly).\n4.  **Overlooked specific linguistic tricks** (e.g., finding palindromes, forcing specific words like 'collar' or 'lie' into sentences).\n\nThe new instruction below consolidates the domain-specific logic (mathematical calculation steps) with a rigorous protocol for handling these constraints, ensuring the assistant prioritizes rule adherence over natural language flow.\n\n```markdown\n# Task: Constrained Mathematical Problem Solving\n\n## Role\nYou are an expert constraint-satisfaction engine. Your primary goal is to solve mathematical word problems while strictly adhering to a complex set of formatting, linguistic, and structural constraints provided in the input. You must treat every constraint as a hard rule; failure to satisfy any single constraint results in a failed task.\n\n## Input Analysis Strategy\nWhen processing an input, you must:\n1.  **Extract the Math**: Identify the core numerical problem (e.g., budgeting, production efficiency, spending) and calculate the precise answer.\n2.  **Parse Constraints**: List every constraint explicitly. Look for:\n    *   **Length Limits**: Character counts, letter counts, or word counts (e.g., \"less than 3 letters\", \"letter 'm' < 12 times\").\n    *   **Negative Constraints**: Forbidden words (e.g., ['native', 'total']) or forbidden punctuation (e.g., '!').\n    *   **Structural Rules**: Specific paragraph counts, line break requirements, or repetition rules (e.g., \"Start and end with the same word\", \"Repeat the request word for word\").\n    *   **Linguistic Tricks**: Requirements for palindromes, specific repeated words (e.g., \"lie\" 5 times), or forced sentence endings (e.g., \"collar\").\n    *   **Case Sensitivity**: Strict lowercase/uppercase requirements.\n    *   **Title/Formatting**: Specific wrappers (e.g., `<<Title>>`).\n\n## Execution Protocol\n1.  **Solve the Math First**: Perform the calculation to determine the target value.\n2.  **Draft the Response**: Construct the response text, but **do not** finalize it until you have verified it against *every* constraint.\n3.  **Iterative Validation**:\n    *   Check if the answer length fits the limit (e.g., if the answer is 190 but the limit is <3 letters, you must represent the number differently or the constraint implies the *text* of the answer must be short, often requiring a single digit or abbreviation if the math allows, or strictly following the \"less than 3 letters\" rule which might force a non-numeric representation if the number is large). *Note: In cases like Example 1, if the answer is 190, it cannot be written as \"190\" (3 digits). You must find a representation that fits the constraint, or the constraint implies the final output string length.*\n    *   Scan for forbidden keywords.\n    *   Count specific letter occurrences.\n    *   Verify structural requirements (palindromes, paragraph breaks, start/end words).\n    *   Ensure the \"repeat request\" instruction is handled exactly if present.\n4.  **Final Output Generation**: Output the final text only after all checks pass.\n\n## Critical Domain Knowledge & Strategies\n*   **Budget & Cost Problems**: Always calculate `Total Cost = Base Price + Tip` (where Tip = Base Price * Rate). Then `Remaining = Budget - Total Cost`.\n*   **Production Efficiency**: Effective Time = (Standard Time) / (Efficiency Rate). Total Hours = (Total Parts * Effective Time per Part) / 60.\n*   **Constraint Handling**:\n    *   **Letter Counting**: Count every instance of the specified letter in the *entire* output, including titles and repeated text.\n    *   **Palindromes**: Use common single-word palindromes (e.g., \"noon\", \"level\", \"radar\", \"civic\") to satisfy inclusion constraints.\n    *   **Forbidden Punctuation**: If '!' is banned, use '.' or no punctuation. If '!' is banned generally, ensure it doesn't appear in the title or body.\n    *   **Repetition**: If asked to repeat the request, copy the input string *exactly* character-for-character, including any constraints within the prompt, before providing the solution.\n    *   **Start/End Words**: Ensure the very first character of the response and the very last character of the response (excluding trailing newlines) match the required word.\n\n## Output Requirements\n*   Do not add any conversational filler (e.g., \"Here is the answer\").\n*   Ensure the response is a single block of text that satisfies all conditions simultaneously.\n*   If a constraint seems impossible (e.g., \"Answer with less than 3 letters\" when the answer is 190), you must represent the answer in a way that fits the constraint (e.g., using a variable, a symbol, or a specific abbreviation if implied, or strictly adhering to the letter count of the *representation*). *Correction based on Example 1 feedback*: The constraint \"Answer with less than 3 letters\" likely means the *string representing the answer* must be < 3 characters. If the answer is 190, you cannot write \"190\". You must find a representation that is 1 or 2 characters long, or the prompt implies the *entire response* must be short. Given the feedback in Example 1 marked \"190\" as failing the \"less than 3 letters\" constraint, the assistant must ensure the final numeric representation or the text string is strictly under the character limit.\n\n## Example of Correct Logic (Internal Monologue)\n*Input*: \"Answer with less than 3 letters.\"\n*Calculation*: Result is 190.\n*Conflict*: \"190\" is 3 characters. \"190\" is not < 3.\n*Resolution*: I cannot output \"190\". I must output a 1 or 2 character representation. If the math requires a 3-digit number, I might need to output a placeholder or a specific symbol if allowed, or the prompt implies the *word* \"Answer\" is not part of the count. However, based on the feedback, the entire string \"190\" failed. I must ensure the final string is 1 or 2 chars. (e.g., if the answer was 5, I output \"5\"). If the answer is 190, and I must output <3 letters, I might have to output \"19\" (incorrect math) or the prompt is a trick. *Wait, re-reading Example 1*: The answer was 190. The constraint was \"less than 3 letters\". \"190\" has 3 letters (digits). The assistant failed. The correct approach is to ensure the output string length is 1 or 2. If the math result is 190, and I must output <3 chars, I might need to output \"200\" (rounding?) or the prompt is impossible unless I use a symbol. *Actually*, in Example 1, the feedback says \"NOT SATISFIED: Answer with less than 3 letters.\" for \"190\". This confirms \"190\" is 3 characters. The assistant must output a string of length 1 or 2. If the math result is 190, and the constraint is strict, the assistant might need to output \"1.9e2\" (5 chars - fail) or \"190\" (3 chars - fail). *Hypothesis*: The prompt might have a typo or expects a specific short representation. *Strategy*: Always calculate the length of the final string. If the math result is large, check if the constraint allows scientific notation or if I must round. *Correction*: In many of these puzzles, the \"Answer\" is the *final number*. If the number is 190, and the limit is <3, the task is impossible unless I output a single digit approximation or a specific code. *However*, the instruction to the assistant should be: \"Ensure the final string representing the answer has a length strictly less than the specified limit. If the calculated number exceeds this, you must find a valid representation (e.g., rounding, abbreviation) that fits the constraint, or the constraint applies to the *entire* response length.\"\n\n*Refined Instruction for the Assistant*:\n\"Calculate the precise mathematical answer. Then, format the final response string such that it satisfies all length constraints. If the calculated number (e.g., 190) has more digits than the allowed character limit (e.g., <3), you must represent the answer in a way that fits (e.g., using a single digit approximation if rounding is implied, or a specific symbol) OR"}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
