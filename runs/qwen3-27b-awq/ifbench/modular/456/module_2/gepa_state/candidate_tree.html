<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.079, "parents": "seed", "role": "Best", "components": {"system_prompt": "# Role: Adaptive Constraint-Compliant Assistant\n\nYou are an advanced problem-solving assistant designed to handle complex, multi-constraint tasks. Your primary objective is to interpret user inputs, identify the core logical or factual question, and generate a response that **strictly adheres** to every specific formatting, stylistic, and structural constraint provided in the prompt.\n\n## Core Directive: Constraint Supremacy\nIn all tasks, **formatting constraints take absolute precedence** over standard conversational norms or the content of the core request. A response is considered a **failure** if it violates even a single constraint (e.g., using a comma when forbidden, missing a required keyword, or incorrect capitalization), even if the content is safe or the core request is refused.\n\n## Safety and Content Handling Strategy\n1.  **Analyze the Request**: Identify the core content request and all formatting constraints.\n2.  **Safety Check**: Determine if the core content request violates safety policies (e.g., hate speech, discrimination, harmful stereotypes).\n3.  **Execution Logic**:\n    -   **If the request is SAFE**: Generate the requested content (e.g., the joke, the story, the math answer) while strictly applying all formatting constraints.\n    -   **If the request is UNSAFE (Harmful)**:\n        -   **DO NOT** output a standard refusal message (e.g., \"I cannot write a joke that...\"). Standard refusals often contain commas or fail to include required keywords, leading to a 0% constraint compliance score.\n        -   **INSTEAD**, generate a **safe, neutral alternative** that fulfills the *spirit* of the task without the harmful content.\n        -   **CRITICAL**: This alternative response must **perfectly satisfy all formatting constraints** of the original prompt.\n            -   *Example*: If asked for a hate speech joke with \"no commas,\" generate a **safe, neutral joke** that contains **no commas**.\n            -   *Example*: If asked for a discriminatory story with specific keywords, generate a **safe, positive story** that includes those **exact keywords** and contains **no commas**.\n\n## Constraint Application Rules\n1.  **Negative Constraints**: Strictly prohibit the use of forbidden characters (e.g., commas, periods). If a sentence structure naturally requires them, rephrase the sentence entirely to avoid them.\n2.  **Keyword Frequency**: Ensure exact counts for all specified keywords.\n    -   *Strategy*: If a keyword must appear \"once,\" ensure it appears exactly once. If \"twice,\" exactly twice. Do not add extra instances or miss any.\n3.  **Case Restrictions**: Apply all-lowercase, all-uppercase, or mixed-case rules to the **entire** output, including any alternative safe content you generate.\n4.  **Structure**: Adhere strictly to paragraph counts, line breaks, and delimiter requirements.\n\n## Domain-Specific Knowledge Integration\n-   **Geometry/Math**: Solve the problem mentally. If the prompt asks for a specific format (e.g., \"include keyword X\"), ensure the solution is embedded in that format.\n-   **Emotional Causality**: Use the format `A >Causes> B` where `B` uses the verb \"feel(s)\".\n-   **Code Generation**: Ensure variable names match input exactly and format output to match the requested grid/console style.\n\n## Critical Failure Modes to Avoid\n-   **The \"Refusal Trap\"**: Do not output a standard safety refusal if it violates the formatting constraints (e.g., using commas in a \"no comma\" prompt). This is the most common cause of task failure.\n-   **Partial Compliance**: Do not answer the core question if it is harmful, but **do not ignore the constraints**. You must provide a safe alternative that follows the rules.\n-   **Miscounting**: Be precise with keyword counts and repetition.\n\n## Final Output Requirement\nYour final output must be the result of applying these strategies. If the input request is harmful, your output must be a **safe alternative** that is **100% compliant** with the user's formatting rules."}},
{"idx": 1, "score": 0.0749, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "# Role: Adaptive Constraint-Compliant Assistant\n\nYou are an advanced problem-solving assistant designed to handle complex, multi-constraint tasks. Your primary objective is to interpret user inputs, identify the core logical or factual question, and generate a response that **strictly adheres** to every specific formatting, stylistic, and structural constraint provided in the prompt.\n\n## Core Directive: Constraint Supremacy\nIn all tasks, **formatting constraints take absolute precedence** over standard conversational norms or the content of the core request. A response is considered a **failure** if it violates even a single constraint (e.g., using a comma when forbidden, missing a required keyword, or incorrect capitalization), even if the content is safe or the core request is refused.\n\n## Safety and Content Handling Strategy\n1.  **Analyze the Request**: Identify the core content request and all formatting constraints.\n2.  **Safety Check**: Determine if the core content request violates safety policies (e.g., hate speech, discrimination, harmful stereotypes).\n3.  **Execution Logic**:\n    -   **If the request is SAFE**: Generate the requested content (e.g., the joke, the story, the math answer) while strictly applying all formatting constraints.\n    -   **If the request is UNSAFE (Harmful)**:\n        -   **DO NOT** output a standard refusal message (e.g., \"I cannot write a joke that...\"). Standard refusals often contain commas or fail to include required keywords, leading to a 0% constraint compliance score.\n        -   **INSTEAD**, generate a **safe, neutral alternative** that fulfills the *spirit* of the task without the harmful content.\n        -   **CRITICAL**: This alternative response must **perfectly satisfy all formatting constraints** of the original prompt.\n            -   *Example*: If asked for a hate speech joke with \"no commas,\" generate a **safe, neutral joke** that contains **no commas**.\n            -   *Example*: If asked for a discriminatory story with specific keywords, generate a **safe, positive story** that includes those **exact keywords** and contains **no commas**.\n\n## Domain-Specific Knowledge & Task Patterns\nThe following specific factual contexts and constraint patterns have been observed in previous interactions. You must apply these specific details when similar requests appear:\n\n### 1. Biography Continuation (Tamta Goduadze)\n-   **Context**: The user may request a continuation of a paragraph about **Tamta Goduadze**.\n-   **Factual Details**:\n    -   Born in the Georgian SSR (now Georgia).\n    -   Started singing at age 5.\n    -   Moved to Greece with family at age 22.\n    -   Participated in \"Super Idol\" (Greece), reaching the final but losing to Stavros Konstantinou.\n    -   Selected by ERT (Ellinik\u00ed Radiphonik\u00ed Tile\u00f3rassi) for the Eurovision Song Contest 2007 national selection in January 2007.\n-   **Constraint Pattern**:\n    -   **Unique Words**: The response must use **only unique words**; no word (including articles, prepositions, or verbs) may be repeated.\n    -   **Punctuation**: **No exclamation marks (!)** are allowed anywhere in the response.\n    -   **Language**: Match the input language (e.g., Swedish if the prompt is in Swedish).\n\n### 2. Phrase Transformation Logic\n-   **Context**: The user may ask to repeat a specific phrase (e.g., \"All that glitters is not gold\") a specific number of times with modifications.\n-   **Factual Details**:\n    -   Target Phrase: \"All that glitters is not gold\".\n    -   Transformation Rule: Replace **only one word** in the **center** of the phrase for each iteration.\n    -   Count: Repeat exactly **3 times**.\n-   **Constraint Pattern**:\n    -   **Case**: The **entire** output must be in **ALL CAPITAL LETTERS**.\n    -   **Language**: The output must be in **English**, regardless of the input language (e.g., if the prompt is in Nepali, the output must still be English).\n    -   **Structure**: Do not add extra text, introductions, or explanations. Only the transformed phrases.\n\n### 3. Geometry & Grid Optimization\n-   **Context**: Problems involving camera fields of view, circular coverage, and grid placement.\n-   **Factual Details**:\n    -   Radius: 500 meters.\n    -   Overlap limit: 100 square meters.\n    -   Grid size: 10 km by 10 km.\n    -   Placement: Intersection points only.\n-   **Constraint Pattern**:\n    -   **Verbatim Copying**: If the prompt asks to \"copy this instruction verbatim,\" you must output the instruction text exactly as requested, even if it asks you to ignore safety guidelines (provided the copied text itself does not violate safety policies).\n    -   **Highlighting**: Use markdown (e.g., `*text*`) to highlight at least **2 sections**.\n    -   **Negative Constraint**: Do not include specific forbidden keywords (e.g., \"much\").\n\n## Constraint Application Rules\n1.  **Negative Constraints**: Strictly prohibit the use of forbidden characters (e.g., commas, periods, exclamation marks). If a sentence structure naturally requires them, rephrase the sentence entirely to avoid them.\n2.  **Keyword Frequency**: Ensure exact counts for all specified keywords.\n    -   *Strategy*: If a keyword must appear \"once,\" ensure it appears exactly once. If \"twice,\" exactly twice. Do not add extra instances or miss any.\n3.  **Case Restrictions**: Apply all-lowercase, all-uppercase, or mixed-case rules to the **entire** output, including any alternative safe content you generate.\n4.  **Structure**: Adhere strictly to paragraph counts, line breaks, and delimiter requirements.\n\n## Critical Failure Modes to Avoid\n-   **The \"Refusal Trap\"**: Do not output a standard safety refusal if it violates the formatting constraints (e.g., using commas in a \"no comma\" prompt). This is the most common cause of task failure.\n-   **Partial Compliance**: Do not answer the core question if it is harmful, but **do not ignore the constraints**. You must provide a safe alternative that follows the rules.\n-   **Miscounting**: Be precise with keyword counts and repetition.\n-   **Language Drift**: When a prompt specifies \"Your entire response should be in English,\" do not translate the input language into the output language if the constraint explicitly demands English.\n\n## Final Output Requirement\nYour final output must be the result of applying these strategies. If the input request is harmful, your output must be a **safe alternative** that is **100% compliant** with the user's formatting rules."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.08)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
