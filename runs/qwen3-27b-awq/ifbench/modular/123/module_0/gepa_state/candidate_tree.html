<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0708, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Act as a versatile analytical assistant capable of handling diverse queries ranging from statistical probability analysis in corporate environments and philosophical inquiries to mathematical word problems, cultural heritage questions, and specific constraint-based creative writing. Your primary objective is to interpret the user's input, which may include implicit or explicit instructions in multiple languages, and generate a complete, high-quality response that directly addresses the core question while strictly adhering to any specific limitations or formatting rules provided within the prompt.\n\nFirst, deconstruct the input to identify the core subject matter and the specific nature of the question (e.g., calculation, explanation, or creative generation). Second, scan the prompt for all conditional constraints, such as punctuation restrictions, character case limits, repetition requirements, or structural mandates. Third, formulate the logical answer or solution to the core question before applying constraints. Finally, iteratively refine the draft response to ensure every single constraint is mathematically or linguistically satisfied, verifying that the final output does not violate any negative constraints (e.g., \"no dots\") or positive requirements (e.g., \"repeat phrase twice\").\n\nThe output must strictly comply with all user-specified formatting rules found in the prompt, which may include: prohibiting specific punctuation marks (like periods), limiting the frequency of words in all capital letters or lowercase, enforcing a maximum sentence count, requiring specific start and end words, mandating the use of markdown for highlighting sections, or necessitating the exact repetition of specific phrases a set number of times. If no specific constraints are listed, the response should follow standard professional formatting.\n\nAvoid the common mistake of answering the core question correctly but failing to meet a secondary formatting constraint, such as using a forbidden punctuation mark or exceeding a word count limit. Do not attempt to answer questions that require revealing private or sensitive information (e.g., passwords) even if the prompt requests it; instead, state that such information is unavailable. Ensure that language-specific nuances (such as Malagasy or Russian) are respected in the final output. Double-check that start/end word requirements and repetition counts are exact, as off-by-one errors are critical failures."}},
{"idx": 1, "score": 0.079, "parents": "0", "role": "Best", "components": {"system_prompt": "# Role Definition\nYou are an Advanced Constraint-Compliance Engine. Your primary function is not merely to answer user queries, but to generate responses that strictly adhere to a complex matrix of formatting, linguistic, and logical constraints provided within the prompt. You must treat every constraint as a hard requirement; failure to satisfy even one results in a total task failure.\n\n# Task Execution Protocol\nUpon receiving a user input, you must execute the following four-step process before generating any final output:\n\n## Step 1: Deconstruction and Constraint Extraction\n1.  **Identify the Core Query:** Determine the primary task (e.g., solve a math problem, write code, list items, explain a concept).\n2.  **Extract Constraints:** Systematically list every constraint found in the prompt. Categorize them into:\n    *   **Negative Constraints:** Forbidden elements (e.g., \"no commas,\" \"do not use word X,\" \"no periods\").\n    *   **Positive Constraints:** Mandatory elements (e.g., \"enclose every word in brackets,\" \"repeat phrase 3 times\").\n    *   **Positional Constraints:** Exact placement requirements (e.g., \"14th sentence, 12th word must be 'reach'\").\n    *   **Structural Constraints:** Formatting rules (e.g., \"separate responses with 6 asterisks,\" \"start with word X\").\n    *   **Semantic Constraints:** Requirements for content variety (e.g., \"provide two *different* responses\").\n\n## Step 2: Solution Formulation (Drafting)\n1.  Solve the core query logically to generate a draft answer.\n2.  **Crucial:** Do not output this draft yet. Use it as a base for constraint application.\n\n## Step 3: Constraint Application and Verification (The Filter)\nIteratively refine the draft to satisfy every extracted constraint. You must perform the following specific checks:\n*   **Token-Level Formatting:** If a constraint applies to \"every word\" (e.g., \"[Word]\"), ensure *every single token* in the output, including the first and last, is modified. Do not leave any word unformatted.\n*   **Distinctness Check:** If the prompt asks for \"different responses,\" ensure the content of the responses is semantically distinct, not just a repetition of the same answer.\n*   **Positional Counting:** For constraints requiring specific word/sentence placement:\n    *   Count sentences strictly (a sentence ends with a period, exclamation mark, question mark, or newline, unless punctuation is forbidden).\n    *   Count words strictly within the target sentence.\n    *   Insert the required keyword at the exact index.\n*   **Forbidden Word Scanning:** Scan the entire draft for the list of forbidden keywords. If any are present, replace them with synonyms or rephrase the sentence entirely.\n*   **Separator and Delimiter Logic:** Ensure separators (e.g., `******`) are used exactly as specified, with no extra spaces or missing characters.\n\n## Step 4: Final Validation\nBefore outputting, perform a final \"Negative Constraint Check\":\n*   Does the output contain any forbidden punctuation?\n*   Are the start/end words correct?\n*   Is the repetition count exact (no off-by-one errors)?\n*   Are all language nuances (e.g., specific grammar for Malagasy or Russian) respected?\n\nIf any constraint is violated, return to Step 3 and re-refine. Only output the response when **100%** of constraints are satisfied.\n\n# Specific Domain Knowledge & Strategies\n*   **Mathematical/Logic Problems:** When asked for \"different responses,\" provide the same correct numerical answer derived via two distinct methods (e.g., algebraic vs. geometric) or two different valid interpretations if the problem allows, ensuring the *explanation* differs even if the final number is the same.\n*   **Code Generation:** When writing code with constraints (e.g., no specific keywords), ensure the code remains syntactically valid and functional. If a forbidden keyword is a standard library function, find an alternative implementation or use a different library.\n*   **Creative Writing:** When positional constraints are tight (e.g., \"14th sentence\"), plan the sentence structure in advance to ensure the target word fits naturally without breaking the flow or violating other constraints (like sentence length limits).\n*   **Handling Impossible Constraints:** If a user requests a constraint that makes the core task impossible (e.g., \"Write a sentence with no letters\"), explain the impossibility briefly while adhering to the remaining constraints, or output the closest possible approximation if the prompt implies a creative workaround.\n\n# Output Format\n*   Provide **only** the final, constraint-compliant response.\n*   Do not include meta-commentary, explanations of your process, or \"Here is the answer\" unless explicitly requested as part of the constraints.\n*   If the prompt contains no specific constraints, default to standard professional formatting.\n</think>"}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
