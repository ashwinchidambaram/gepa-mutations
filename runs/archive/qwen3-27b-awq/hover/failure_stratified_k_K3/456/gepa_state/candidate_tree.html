e action/attribute).\n    - **Step 2: Map to Evidence**. Check if the Evidence keys contain the **specific entities or facts** that directly validate the **Predicate**.\n        - **Location Facts**: If the claim asserts a specific location (e.g., \"born in [Location X]\"), the Evidence **must** contain a key explicitly matching \"[Location X]\". If the Evidence contains a different location (e.g., \"[Location Y]\"), the claim is **NOT_SUPPORTED**.\n        - **Relationship Facts**: If the claim asserts a specific relationship or attribute (e.g., \"A is the author of B's books\" or \"C is in D's repertoire\"), the Evidence **must** contain keys that explicitly represent this relationship or the specific context.\n        - **Mere Co-occurrence is Insufficient**: The mere presence of two names in the Evidence keys (e.g., \"Person A\" and \"Person B\") does **NOT** support a claim that asserts a specific relationship between them (e.g., \"A broke B's record\") unless the Evidence also contains a key representing that specific relationship or the specific fact is explicitly listed.\n    - **Decision Rule**:\n        - **SUPPORTED**: Only if the Evidence keys contain the **exact specific entities** or **fact-representing keys** required to prove the specific assertion in the claim.\n        - **NOT_SUPPORTED**: If any critical specific entity (like a specific location, date, or relationship descriptor) asserted in the claim is **missing** from the Evidence keys, or if the Evidence provides a **contradictory** entity (e.g., Claim says \"New York County\", Evidence says \"Hoosick\").\n\n## Reasoning Steps\n1.  **Identify Specific Assertions**: Break the claim down. What specific fact is being claimed? (e.g., \"Born in X\", \"Y broke Z's record\", \"W wrote 4 books about V\").\n2.  **Scan Evidence for Specific Matches**: Look for keys in the Evidence that match the **specific** components of the assertion.\n    - Do not just look for the names of the people involved. Look d-breaking event).\n    - Both critical entities are present.\n- **Verdict**: SUPPORTED\n\n- **Claim**: \"The Greek composer Vincenzo Bellini was included in the repertoire of the singer who had four books about her written by John Ardoin.\"\n- **Evidence**: `{'key': 'Maria Callas', 'value': 2}`, `{'key': 'Vincenzo Bellini', 'value': 0}`, `{'key': 'John Ardoin', 'value': 0}`\n- **Reasoning**:\n    - The claim asserts specific relationships: \"Bellini in Callas's repertoire\" and \"Ardoin wrote 4 books about Callas\".\n    - The Evidence only lists the names \"Maria Callas\", \"Vincenzo Bellini\", and \"John Ardoin\".\n    - The Evidence **does not** contain keys representing the specific relationships (e.g., \"Bellini in Callas repertoire\" or \"Ardoin books about Callas\").\n    - Mere co-occurrence of names is insufficient to"}},

te), \"taught\" (Action attribute), \"American\", \"Austrian\".\n  - Scan: Both \"Vincent Kling\" and \"Hugo von Hofmannsthal\" are present in the keys.\n  - Logic: The presence of the translator and the prodigy confirms the relationship. The specific location where he taught is an attribute of the confirmed entities.\n- **Verdict**: SUPPORTED\n\n### Example C (Missing Core Entity)\n- **Claim**: \"The Grieg crater is named for a Norwegian composer.\"\n- **Evidence**: `{'key': 'Grieg (crater)', 'value': 3}`, `{'key': 'Edvard Grieg', 'value': 1}`\n- **Reasoning**:\n  - Core Entities: \"Grieg crater\" (Subject), \"Edvard Grieg\" (Object).\n  - Scan: Both are present.\n- **Verdict**: SUPPORTED\n\n### Example D (Missing Core Entity - Negative Case)\n- **Claim**: \"The Grieg crater is named for a Norwegian composer named Johann.\"\n- **Evidence**: `{'key': 'Grieg (crater)', 'value': 3}`, `{'key': 'Edvard Grieg', 'value': 1}`\n- **Reasoning**:\n  - Core Entities: \"Grieg crater\" (Present), \"Johann\" (Missing).\n  - Logic: The claim asserts a specific person (\"Johann\") as the namesake. The evidence only contains \"Edvard Grieg\". The core entity \"Johann\" is missing.\n- **Verdict**: NOT_SUPPORTED"}},

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
