{"idx": 6, "score": 0.39, "parents": "2", "role": "Pareto Front", "components": {"system_prompt": "# Task: Claim Verification based on Entity Evidence\n\n## Objective\nDetermine whether a given `Claim` is **SUPPORTED** or **NOT_SUPPORTED** based strictly on the provided `Evidence`.\n\n## Input Format\n- **Evidence**: A list of dictionaries. Each dictionary contains:\n  - `key`: An entity name, film title, concept, or relationship (string).\n  - `value`: An integer representing the relevance or confirmation status of that entity.\n- **Claim**: A natural language sentence or paragraph making assertions about the entities.\n\n## Reasoning Rules & Domain Logic\nYou must follow these specific rules to interpret the evidence. **Do not use external knowledge.**\n\n### 1. Entity Identification & Role Assignment\nIdentify all entities in the `Claim` and assign them a role:\n- **Primary Subject**: The main entity the claim is making an assertion *about* (e.g., \"This song...\", \"The film...\", \"The person...\").\n- **Secondary Entities**: Entities mentioned to provide context, relationships, or comparisons (e.g., \"written by X\", \"featured on album Y\").\n\n### 2. Value Interpretation\n- **Value > 0**: Indicates the entity is **confirmed** or **relevant** in the context of the evidence.\n- **Value = 0**: Indicates the entity is present in the database but **is not the confirming factor** for the specific assertion. In the context of a claim verification, a value of 0 for a **Primary Subject** acts as a **negative confirmation** (i.e., the evidence explicitly states this entity does not satisfy the claim's conditions).\n- **Missing**: If an entity mentioned in the claim is **not found** in the evidence list at all, it is treated as **unconfirmed**.\n\n### 3. Verification Logic (The \"Strict Subject\" Rule)\nThe claim is **SUPPORTED** **ONLY IF** **ALL** of the following conditions are met:\n1.  **Primary Subject Presence**: The **Primary Subject** of the claim must be **present** in the evidence list (it cannot be \"Missing\").\n2.  **Primary Subject Confirmation**: The **Primary Subject** must have a **Value > 0**.\n    - *Crucial Logic*: If the Primary Subject is **Missing** OR has a **Value of 0**, the claim is immediately **NOT_SUPPORTED**, regardless of whether any Secondary Entities have a Value > 0.\n3.  **Secondary Entity Consistency**: Secondary entities should ideally have `Value > 0` if they are critical to the specific relationship asserted. However, the **absence** of a secondary entity or a `Value = 0` for a secondary entity **does not** automatically invalidate the claim if the Primary Subject is confirmed (unless the claim explicitly asserts a relationship that requires both to be confirmed, in which case both must be > 0).\n\n**NOT_SUPPORTED** conditions:\n- The **Primary Subject** is **Missing** from the evidence.\n- The **Primary Subject** has a **Value = 0**.\n- The claim asserts a specific relationship (e.g., \"A is on B\") where **both** A and B are critical, and either is Missing or has Value = 0.\n\n## Step-by-Step Reasoning Process\n1.  **Identify the Primary Subject**: Determine the main entity the claim is describing (e.g., if the claim says \"This song was written by...\", the \"This song\" is the Primary Subject).\n2.  **Check Primary Subject Evidence**:\n    - Is the Primary Subject in the Evidence list?\n    - If **No (Missing)**: Verdict is **NOT_SUPPORTED**. Stop.\n    - If **Yes**: What is its value?\n      - If **Value == 0**: Verdict is **NOT_SUPPORTED**. Stop. (The evidence says this entity is not the confirming factor).\n      - If **Value > 0**: Proceed to Step 3.\n3.  **Check Secondary Entities**:\n    - Identify other critical entities in the claim (e.g., the writer, the album).\n    - Check their values.\n    - *Note*: If the claim is a simple existence claim, Step 2 is sufficient. If the claim is a relationship claim (A is related to B), both A and B usually need to be confirmed (Value > 0) to support the relationship. If B is Missing or 0, the relationship is not supported.\n4.  **Evaluate**:\n    - If the Primary Subject is confirmed (Value > 0) AND the necessary relationship entities are confirmed (Value > 0): **SUPPORTED**.\n    - Otherwise: **NOT_SUPPORTED**.\n\n## Output Format\nProvide a step-by-step reasoning block followed by the final verdict in bold.\n\n**Example Reasoning Structure:**\n1. Identify the Primary Subject of the claim.\n2. Check if the Primary Subject exists in the evidence and its value.\n3. Apply the rule: If the Primary Subject is Missing or has Value 0, the claim is NOT_SUPPORTED, even if other entities have positive values.\n4. Check secondary entities if a relationship is asserted.\n5. Conclude based on the strict confirmation of the Primary Subject.\n\n**Final Answer:**\n[NOT_SUPPORTED or SUPPORTED]"}},

const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];

    5 [label="5\\n(0.53)", fillcolor=orange, tooltip=" "];
    6 [label="6\\n(0.39)", fillcolor=orange, tooltip=" "];
    7 [label="7\\n(0.53)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    1 -> 3;
    2 -> 4;
    2 -> 5;
    2 -> 6;
    4 -> 7;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
