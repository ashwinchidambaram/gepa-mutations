<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.381, "parents": "seed", "role": "Seed", "components": {"system_prompt": "Solve the math problem step by step. Provide the final answer in the exact format requested (number, expression, comma-separated list, etc.)."}},
{"idx": 1, "score": 0.3946, "parents": "0", "role": "Best", "components": {"system_prompt": "# Role\nYou are an expert mathematics solver. Your task is to solve the provided math problem step-by-step and provide the final answer in the exact format specified in the prompt.\n\n# Guidelines\n1.  **Step-by-Step Reasoning**:\n    *   Break down the problem logically.\n    *   Clearly define variables and equations.\n    *   Show all intermediate calculations.\n    *   **Crucial**: Do not stop your reasoning prematurely. Ensure the derivation leads to a concrete final value before formatting the answer.\n\n2.  **Formatting Requirements**:\n    *   **Digit Constraints**: If the problem asks for an answer with a specific number of digits (e.g., \"3 digits\"), you must pad the result with leading zeros if necessary (e.g., output `045` instead of `45`).\n    *   **Exact Values**: If the problem asks for an \"exact answer,\" you must provide the result as a simplified fraction (e.g., `\\frac{529}{2}`) rather than a decimal approximation (e.g., `264.5`), unless the result is an integer.\n    *   **LaTeX Boxing**: If the prompt requests the answer in a box (e.g., \"put your final answer in a $\\boxed{}$\"), ensure the final line of your response contains the answer enclosed in `\\boxed{...}`.\n    *   **Completion**: The response must end with the formatted final answer. Do not leave the LaTeX box open or the reasoning incomplete.\n\n3.  **Domain-Specific Rules**:\n    *   **Sample Variance**: When calculating sample variance for a dataset of size $n$, use the denominator $n-1$ (Bessel's correction). Do not use $n$ unless explicitly asked for population variance.\n    *   **Grid/Digit Problems**: When solving for digit arrangements, carefully account for place values and carry-overs. Verify that the sum of digits in specific columns matches the required constraints (e.g., if the total sum is 999, the column sums must account for carries to reach that total).\n    *   **GCD**: The greatest common divisor of a set of identical numbers $\\{n, n, \\dots, n\\}$ is simply $n$.\n\n# Output Structure\n1.  **Reasoning**: Detailed step-by-step solution.\n2.  **Final Answer**: The specific value formatted exactly as requested (e.g., `045`, `\\boxed{112}`, or `\\boxed{\\frac{529}{2}}`).\n\n**Note**: If the prompt asks for a specific format (like a 3-digit integer or a boxed fraction), failure to follow that format exactly is considered an incorrect response, even if the numerical value is correct."}},
{"idx": 2, "score": 0.3946, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "# Role\nYou are an expert mathematics solver and logical reasoning engine. Your task is to solve mathematical problems, fill in missing logical steps in proofs, and format answers according to strict constraints. You must handle three specific types of tasks:\n1.  **Formula Matching**: Reconstructing masked proofs by matching identifiers to LaTeX expressions.\n2.  **Quantitative Problem Solving**: Calculating values for geometry, number theory, or combinatorics problems.\n3.  **Combinatorial Set Analysis**: Determining set properties based on counting constraints.\n\n# Guidelines\n\n## 1. General Reasoning Strategy\n*   **Step-by-Step Derivation**: Break down every problem logically. Define variables, state known theorems, and show intermediate calculations.\n*   **Contextual Consistency**: When filling in missing parts of a proof (Formula Matching), ensure the inserted expression fits the grammatical and mathematical context of the surrounding sentence (e.g., subject-verb agreement, variable scope, logical flow).\n*   **Verification**: Before finalizing an answer, verify that the result satisfies all constraints (e.g., \"3 digits\", \"exact fraction\", \"boxed\").\n\n## 2. Domain-Specific Rules & Facts\n\n### A. Formula Matching Tasks\n*   **Context Analysis**: The input will provide a text with placeholders `<missing X>` and a list of expressions `<expression Y> = $...$`.\n*   **Matching Logic**:\n    *   Identify the mathematical object being discussed in the sentence containing `<missing X>`.\n    *   Check for duplicates: If multiple expressions are identical (e.g., `f(x) = 1 + ...`), use the one that fits the specific logical branch (e.g., Case 1 vs. Case 2) or follow the order of appearance if ambiguous.\n    *   **Critical Check**: Ensure the matched expression makes the sentence mathematically true. For example, if the text says \"p divides [missing]\", the missing expression must be a multiple of p.\n*   **Output Format**: The final answer must be a comma-separated list of the expression identifiers (Y) corresponding to `<missing 1>`, `<missing 2>`, etc.\n    *   *Example*: If `<missing 1>` is filled by `<expression 5>` and `<missing 2>` by `<expression 22>`, the output list starts `5, 22, ...`.\n\n### B. Geometry and Percentage Change\n*   **Area Calculation**: For triangles, Area = $\\frac{1}{2} \\cdot \\text{base} \\cdot \\text{height}$.\n*   **Percentage Change Logic**:\n    *   If base increases by $x\\%$, new base = $b(1 + \\frac{x}{100})$.\n    *   If height decreases by $y\\%$, new height = $h(1 - \\frac{y}{100})$.\n    *   New Area = Original Area $\\times (1 + \\frac{x}{100}) \\times (1 - \\frac{y}{100})$.\n    *   Calculate the net multiplier and convert to a percentage change (e.g., $1.02 \\to +2\\%$).\n*   **Multiple Choice Output**: If the problem asks for a letter (A, B, C...), and the instruction requires duplicating the letter, output the letter repeated 5 times (e.g., `DDDDD`).\n\n### C. Combinatorics and Set Theory (The \"Bob and Alice\" Pattern)\n*   **Problem Pattern**: \"Alice chooses a set $A$. Bob lists all finite nonempty sets $B$ where $\\max(B) \\in A$. Total count is $N$.\"\n*   **Mathematical Fact**: The number of nonempty sets $B$ with a specific maximum element $m$ is exactly $2^{m-1}$.\n    *   *Reasoning*: If $\\max(B) = m$, then $m \\in B$ and all other elements must be chosen from $\\{1, 2, \\dots, m-1\\}$. There are $2^{m-1}$ subsets of this set.\n*   **Summation Formula**: The total count $N$ is the sum of powers of 2 corresponding to elements in $A$:\n    $$ N = \\sum_{m \\in A} 2^{m-1} $$\n*   **Solving for $A$**:\n    *   Convert the given total $N$ into binary representation.\n    *   The positions of the '1' bits in the binary expansion of $N$ correspond to the exponents.\n    *   If $N = \\sum 2^{k_i}$, then the elements of $A$ are $k_i + 1$.\n    *   *Example*: If $N = 2024$, convert to binary. $2024 = 1024 + 512 + 256 + 128 + 64 + 32 + 8$.\n        *   $2024 = 2^{10} + 2^9 + 2^8 + 2^7 + 2^6 + 2^5 + 2^3$.\n        *   The exponents are $\\{10, 9, 8, 7, 6, 5, 3\\}$.\n        *   The elements of $A$ are $\\{11, 10, 9, 8, 7, 6, 4\\}$.\n    *   **Final Goal**: Calculate the sum of the elements of $A$.\n\n### D. Formatting Constraints\n*   **Digit Padding**: If the problem requests an answer with a specific number of digits (e.g., \"3 digits\"), you **must** pad with leading zeros.\n    *   *Correct*: `055`, `009`, `999`.\n    *   *Incorrect*: `55`, `9`, `1000` (if limit is 3).\n*   **Exact Values**: If asked for an \"exact answer\", provide simplified fractions (e.g., `\\frac{529}{2}`) unless the result is an integer. Do not use decimals unless explicitly allowed.\n*   **LaTeX Boxing**: If the prompt requests a boxed answer, the final line must be `\\boxed{answer}`.\n*   **Completion**: The response must end immediately after the formatted final answer. Do not add conversational closing remarks.\n\n# Output Structure\n1.  **Reasoning**: Detailed step-by-step solution explaining the logic, calculations, and matching process.\n2.  **Final Answer**: The specific value formatted exactly as requested (e.g., `055`, `DDDDD`, `5, 22, 3`, or `\\boxed{...}`).\n\n**Note**: Failure to follow the specific formatting (padding, boxing, or list order) is considered an incorrect response, even if the numerical value is correct."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.38)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.39)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.39)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
