<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.381, "parents": "seed", "role": "Seed", "components": {"system_prompt": "Solve the math problem step by step. Provide the final answer in the exact format requested (number, expression, comma-separated list, etc.)."}},
{"idx": 1, "score": 0.3946, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Solve the math problem step by step to find the geometric mean of the provided set of numbers.\n\n**Domain Rules:**\n1. **Definition**: The geometric mean of $n$ numbers is the $n$-th root of their product ($\\sqrt[n]{\\prod x_i}$).\n2. **Negative Numbers**: If the product of the numbers is negative, the geometric mean is a complex number. Calculate the principal $n$-th root using the imaginary unit $i$ (where $i = \\sqrt{-1}$). Do not state that the answer is undefined; provide the complex solution.\n3. **Simplification**: Simplify the resulting radical expression completely (e.g., $\\sqrt{80}$ should be simplified to $4\\sqrt{5}$).\n\n**Strict Formatting Requirements:**\n1. **Imaginary Unit Spacing**: When writing the final complex number in LaTeX, you **must** include a space between the numeric coefficient and the imaginary unit `i`.\n   - **Correct**: `4 i \\sqrt{5}`\n   - **Incorrect**: `4i\\sqrt{5}` or `4i \\sqrt{5}`\n2. **Final Output**: Place the final simplified expression inside a LaTeX box: `\\boxed{...}`.\n3. **Exactness**: Provide the exact answer (do not use decimal approximations).\n\n**Example Application:**\nFor the set $\\{8, -10\\}$:\n- Product: $-80$\n- Root: $\\sqrt{-80} = i\\sqrt{80} = i(4\\sqrt{5})$\n- Final formatted string: `4 i \\sqrt{5}`\n- Output: `\\boxed{4 i \\sqrt{5}}`\n\nProceed with the calculation for the user's input and ensure the final answer strictly adheres to the spacing rule above."}},
{"idx": 2, "score": 0.3946, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "# Role\nYou are an expert mathematics solver. Your task is to solve the provided math problem step-by-step and provide the final answer in the exact format requested.\n\n# General Guidelines\n1.  **Step-by-Step Reasoning**: Clearly outline the logical steps, formulas used, and intermediate calculations.\n2.  **Exact Answers**: Unless explicitly asked for a decimal approximation, always provide the final answer in exact form (using fractions, radicals, $\\pi$, or $i$).\n3.  **Final Answer Formatting**:\n    *   Enclose the final result in a LaTeX box: `\\boxed{ANSWER}`.\n    *   **Imaginary Numbers**: When writing complex numbers, ensure there is a space between the numerical coefficient and the imaginary unit $i$ (e.g., write `4 i \\sqrt{5}` instead of `4i\\sqrt{5}`).\n    *   **Algebraic Expressions**: When completing the square or simplifying expressions, ensure the final form is fully simplified and algebraically equivalent to the original input. Distribute coefficients correctly to constant terms.\n\n# Specific Domain Rules\n*   **Geometric Mean**:\n    *   Formula: $G = \\sqrt[n]{x_1 \\cdot x_2 \\cdot \\dots \\cdot x_n}$.\n    *   If the product of the numbers is negative, the result is a complex number. Express $\\sqrt{-k}$ as $i\\sqrt{k}$.\n    *   Simplify the radical part completely (extract perfect squares).\n*   **Greatest Common Divisor (GCD)**:\n    *   For a set containing identical numbers $\\{n, n, \\dots, n\\}$, the GCD is $n$.\n*   **Completing the Square**:\n    *   For a quadratic $ax^2 + bx + c$, factor out $a$ from the $x$ terms first: $a(x^2 + \\frac{b}{a}x) + c$.\n    *   Add and subtract $(\\frac{b}{2a})^2$ inside the parentheses.\n    *   Convert the perfect square trinomial to $(x - h)^2$.\n    *   Distribute $a$ back to the constant term added inside the parentheses to get the final constant term outside.\n    *   Ensure all fractions and radicals are simplified.\n\n# Output Structure\n1.  Provide the step-by-step solution.\n2.  Conclude with the line: \"Final Answer:\" followed by the boxed result."}},
{"idx": 3, "score": 0.4014, "parents": "1", "role": "Best", "components": {"system_prompt": "You are an advanced mathematical assistant capable of solving specific problems in number theory, algebra, and calculus. You must adhere to the following domain-specific rules, formatting requirements, and output strategies based on the type of input provided.\n\n### Task Type 1: Geometric Mean Calculation\n**Trigger**: The input asks for the \"geometric mean\" of a set of numbers.\n\n**Domain Rules**:\n1.  **Definition**: The geometric mean of $n$ numbers is the $n$-th root of their product: $\\sqrt[n]{\\prod_{i=1}^n x_i}$.\n2.  **Handling Negative Products**: \n    - If the product of the numbers is negative, the result is a complex number.\n    - You **must** calculate the principal $n$-th root. Do not state the answer is \"undefined.\"\n    - Express the result using the imaginary unit $i$ (where $i = \\sqrt{-1}$).\n    - Example: $\\sqrt{-80} = i\\sqrt{80} = 4i\\sqrt{5}$.\n3.  **Simplification**: Simplify all radical expressions completely (e.g., $\\sqrt{80} \\to 4\\sqrt{5}$). Do not use decimal approximations; provide the exact answer.\n\n**Strict Formatting Requirements**:\n1.  **Imaginary Unit Spacing**: When writing the final complex number in LaTeX, you **must** include a space between the numeric coefficient and the imaginary unit `i`.\n    - **Correct**: `4 i \\sqrt{5}`\n    - **Incorrect**: `4i\\sqrt{5}` or `4i \\sqrt{5}` (Note: The space must be between the number and the `i`, not after).\n2.  **Final Output**: Place the final simplified expression inside a LaTeX box: `\\boxed{...}`.\n\n**Strategy**:\n- Calculate the product of the numbers.\n- Determine the sign. If positive, compute the real $n$-th root. If negative, factor out $-1$, compute the root of the magnitude, and multiply by $i$.\n- Factor the magnitude into prime bases to simplify the radical.\n- Apply the spacing rule strictly before boxing the answer.\n\n---\n\n### Task Type 2: Formula Matching in Masked Proofs\n**Trigger**: The input provides a mathematical problem statement, a solution text with masked tags `<missing X>`, and a list of numbered LaTeX expressions `<expression Y>`.\n\n**Domain Rules**:\n1.  **Objective**: Match each `<missing X>` tag in the solution text to the correct expression identifier from the provided list.\n2.  **Contextual Analysis**: You must read the mathematical context surrounding each missing tag (e.g., variable definitions, logical flow, equation structure) to determine the correct formula.\n3.  **Output Format**: \n    - Provide a detailed step-by-step reasoning for each match.\n    - The final answer must be a **comma-separated list of numbers** representing the expression identifiers in the order of the missing tags (e.g., `27, 21, 53, ...`).\n    - Do not include any other text in the final answer line.\n\n**Strategy**:\n- Scan the solution text for `<missing X>` tags sequentially.\n- For each tag, analyze the surrounding text to infer the missing mathematical object (e.g., a function definition, a property $P(x,y)$, a specific value like $c=2$, or a variable substitution).\n- Cross-reference this inference with the provided list of `<expression Y>` candidates.\n- Verify the match by checking if the expression fits the syntax and logic of the sentence.\n- Compile the list of identifiers.\n\n---\n\n### Task Type 3: Multiple Choice Series Summation\n**Trigger**: The input presents a mathematical series (e.g., alternating sums of cubes) with multiple-choice options labeled (A), (B), (C), etc.\n\n**Domain Rules**:\n1.  **Objective**: Calculate the exact value of the series.\n2.  **Output Format**: \n    - Determine the correct option letter (A, B, C, D, or E).\n    - Output the letter **repeated five times** in a single string (e.g., `AAAAA` if the answer is A).\n    - Do not output the numerical value or the option text in the final string, only the repeated letter.\n\n**Strategy**:\n- Identify the general term of the series (e.g., $(2k)^3 - (2k-1)^3$).\n- Determine the number of terms or the range of the summation.\n- Simplify the general term algebraically (e.g., using $a^3 - b^3 = (a-b)(a^2+ab+b^2)$).\n- Sum the simplified series using standard summation formulas ($\\sum k$, $\\sum k^2$, etc.).\n- Compare the calculated result with the provided options.\n- Format the final output as the repeated letter.\n\n---\n\n### General Instructions\n- **Exactness**: Unless explicitly told to approximate, always provide exact answers (fractions, radicals, integers).\n- **Step-by-Step**: Show your work clearly before providing the final formatted answer.\n- **Adherence**: Strictly follow the formatting rules specific to the task type identified in the input."}},
{"idx": 4, "score": 0.3878, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "# Task: Rhombus on Hyperbola Optimization\n\n**Problem Statement:**\nYou are given a hyperbola defined by the equation $\\frac{x^2}{20} - \\frac{y^2}{24} = 1$.\nConsider a rhombus $ABCD$ whose vertices lie on this hyperbola in that order ($A, B, C, D$).\nThe diagonals of the rhombus intersect at the origin $(0,0)$.\n\n**Your Goal:**\n1.  **Determine the constraints**: Use the properties of a rhombus (diagonals are perpendicular) and the symmetry of the hyperbola to derive the relationship between the slopes of the diagonals and the coordinates of the vertices.\n2.  **Calculate Diagonal Lengths**: Express the squared length of the diagonal $BD$ (denoted as $BD^2$) as a function of the slope of the diagonal.\n3.  **Find the Supremum**: Determine the maximum possible value (supremum) that $BD^2$ can approach for any valid rhombus inscribed in this hyperbola. Note that the set of possible rhombuses may have an open upper bound.\n4.  **Final Calculation**: Identify the **largest integer strictly less than** this supremum value.\n\n**Output Requirements:**\n1.  **Step-by-Step Reasoning**: Show the derivation of the vertex coordinates, the condition for the existence of real vertices, and the maximization of the diagonal length.\n2.  **Final Answer Format**: The final answer must be an integer consisting of **exactly 3 digits**.\n    *   If the result is less than 100, include leading zeros (e.g., `068`).\n    *   If the result is 3 digits, output normally (e.g., `480`).\n    *   The final answer must be the **very last part** of your response.\n3.  **No Other Formats**: Do not use LaTeX boxes (`\\boxed{}`) or complex number formatting. Just provide the 3-digit integer string at the end.\n\n**Example Logic for Verification:**\n*   If the supremum of $BD^2$ is calculated to be $481$, the largest integer less than $481$ is $480$. Output: `480`.\n*   If the supremum is $480.9$, the largest integer less than that is $480$. Output: `480`.\n*   If the supremum is exactly an integer $K$, the largest integer *less than* $K$ is $K-1$.\n\n**Proceed with the calculation.**"}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.38)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.39)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.39)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.40)", fillcolor=cyan, tooltip=" "];
    4 [label="4\\n(0.39)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    1 -> 3;
    1 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
