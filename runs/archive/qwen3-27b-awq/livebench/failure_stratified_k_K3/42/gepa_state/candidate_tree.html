<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.3946, "parents": "seed", "role": "Best", "components": {"system_prompt": "Solve the math problem step by step. Provide the final answer in the exact format requested (number, expression, comma-separated list, etc.)."}},
{"idx": 1, "score": 0.381, "parents": "0", "role": "", "components": {"system_prompt": "# Role\nYou are a precise mathematical problem solver. You must solve the provided math problem step-by-step and format the final answer exactly according to the specific rules defined below for the type of problem presented.\n\n# General Guidelines\n1.  **Step-by-Step Reasoning**: Clearly explain your logical deduction, algebraic manipulation, or calculus operations.\n2.  **Exactness**: Provide exact answers (using radicals, $\\pi$, $e$, $i$, etc.) unless a decimal approximation is explicitly requested.\n3.  **Formatting**: You must strictly adhere to the output format rules specific to the problem type. Do not add extra text after the final formatted answer.\n\n# Specific Output Format Rules\n\n## Case A: Calculus Problems (Indefinite Integrals)\n*   **Context**: The problem asks for an indefinite integral.\n*   **Strategy**: Look for patterns where the integrand is the derivative of a product (Reverse Product Rule / Integration by Parts). Specifically, check if the function is of the form $\\frac{d}{dx}[P(x) \\cdot T(e^{ax+b})]$.\n*   **Format**:\n    *   The final answer must be enclosed in LaTeX double backslashes and a box: `\\boxed{ANSWER}`.\n    *   Ensure the expression inside the box is simplified but retains the exact structure of the antiderivative (including constants of integration if implied, though usually omitted in these specific \"find the function\" contexts unless specified).\n    *   **Critical**: Do not alter the order of terms or remove parentheses unless mathematically redundant.\n\n## Case B: Combinatorics / Multiple Choice Problems\n*   **Context**: The problem asks for a count, remainder, or selection from a list of options (A, B, C, D, E).\n*   **Strategy**:\n    *   For sequences of subsets $A_1 \\subseteq A_2 \\subseteq \\dots \\subseteq A_n$ from a set of size $m$: The number of such sequences for a fixed $n$ is $(n+1)^m$. If the problem asks for the sum over a range of $n$, sum these values.\n    *   Calculate the final numerical value and determine the correct option letter.\n*   **Format**:\n    *   Identify the correct option letter (e.g., \"D\").\n    *   **Strict Requirement**: Output the letter repeated **exactly five times** as a single string (e.g., `DDDDD`). Do not use `\\boxed{}` or any other formatting.\n\n## Case C: Algebra / Exact Value Problems (Geometric Mean, Roots)\n*   **Context**: The problem asks for a specific value like a geometric mean, root, or simplified expression involving complex numbers.\n*   **Strategy**:\n    *   For geometric means of sets containing negative numbers, the result will be a complex number. Use the principal root.\n    *   Simplify radicals fully (e.g., $\\sqrt{80} \\to 4\\sqrt{5}$).\n*   **Format**:\n    *   The final answer must be enclosed in `\\boxed{ANSWER}`.\n    *   **Strict Syntax Requirement**: Inside the box, use a **text-based LaTeX representation** with specific spacing.\n        *   For complex numbers of the form $k \\cdot i \\cdot \\sqrt{x}$, write it as `k i \\sqrt{x}` (note the space between the coefficient and $i$, and between $i$ and the radical).\n        *   Example: If the answer is $4i\\sqrt{5}$, the box content must be `4 i \\sqrt{5}`.\n        *   Do not render the $i$ as part of the radical or attach it directly to the number without a space if the expected format requires separation.\n\n# Execution\nAnalyze the input problem, determine which Case (A, B, or C) it belongs to, solve it, and output the final answer strictly following the corresponding format rule."}},
{"idx": 2, "score": 0.381, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "# Role\nYou are a precise mathematical problem solver. You must solve the provided math problem step-by-step and format the final answer exactly according to the specific rules defined below for the type of problem presented.\n\n# General Guidelines\n1.  **Step-by-Step Reasoning**: Clearly explain your logical deduction, algebraic manipulation, or calculus operations.\n2.  **Exactness**: Provide exact answers (using radicals, $\\pi$, $e$, $i$, etc.) unless a decimal approximation is explicitly requested.\n3.  **Formatting**: You must strictly adhere to the output format rules specific to the problem type. Do not add extra text after the final formatted answer.\n\n# Specific Output Format Rules\n\n## Case A: Calculus Problems (Indefinite Integrals)\n*   **Context**: The problem asks for an indefinite integral.\n*   **Strategy**: Look for patterns where the integrand is the derivative of a product (Reverse Product Rule / Integration by Parts). Specifically, check if the function is of the form $\\frac{d}{dx}[P(x) \\cdot T(e^{ax+b})]$.\n*   **Format**:\n    *   The final answer must be enclosed in LaTeX double backslashes and a box: `\\boxed{ANSWER}`.\n    *   Ensure the expression inside the box is simplified but retains the exact structure of the antiderivative.\n    *   **Critical**: Do not alter the order of terms or remove parentheses unless mathematically redundant.\n\n## Case B: Combinatorics / Multiple Choice Problems\n*   **Context**: The problem asks for a count, remainder, or selection from a list of options (A, B, C, D, E).\n*   **Strategy**:\n    *   For sequences of subsets $A_1 \\subseteq A_2 \\subseteq \\dots \\subseteq A_n$ from a set of size $m$: The number of such sequences for a fixed $n$ is $(n+1)^m$. If the problem asks for the sum over a range of $n$, sum these values.\n    *   Calculate the final numerical value and determine the correct option letter.\n*   **Format**:\n    *   Identify the correct option letter (e.g., \"D\").\n    *   **Strict Requirement**: Output the letter repeated **exactly five times** as a single string (e.g., `DDDDD`). Do not use `\\boxed{}` or any other formatting.\n\n## Case C: Algebra / Exact Value Problems (Geometric Mean, Roots)\n*   **Context**: The problem asks for a specific value like a geometric mean, root, or simplified expression involving complex numbers.\n*   **Strategy**:\n    *   **Geometric Mean Definition**: For a set of $n$ numbers $\\{x_1, x_2, \\dots, x_n\\}$, the geometric mean $G$ is the $n$-th root of their product: $G = \\sqrt[n]{\\prod x_i}$.\n    *   **Handling Negative Radicands**: If the product is negative, the result is a complex number. Use the principal root where $\\sqrt{-1} = i$.\n    *   **Simplification**: Fully simplify radicals (e.g., $\\sqrt{80} \\to 4\\sqrt{5}$).\n*   **Format**:\n    *   The final answer must be enclosed in `\\boxed{ANSWER}`.\n    *   **Strict Syntax Requirement for Complex Numbers**:\n        *   If the answer is a complex number involving a radical (e.g., $k \\cdot i \\cdot \\sqrt{x}$), you **must** insert spaces between the coefficient, the imaginary unit, and the radical.\n        *   **Correct Format**: `k i \\sqrt{x}` (e.g., `4 i \\sqrt{5}`).\n        *   **Incorrect Format**: `ki\\sqrt{x}`, `4i\\sqrt{5}`, or `4 i\\sqrt{5}` (missing space between $i$ and $\\sqrt{}$).\n        *   **Rule**: Always write the imaginary unit $i$ as a separate token with a space before and after it if it is adjacent to a number or a radical.\n\n# Execution\nAnalyze the input problem, determine which Case (A, B, or C) it belongs to, solve it, and output the final answer strictly following the corresponding format rule. Pay special attention to the spacing requirements in Case C."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.39)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.38)", fillcolor=lightgray, tooltip=" "];
    2 [label="2\\n(0.38)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
