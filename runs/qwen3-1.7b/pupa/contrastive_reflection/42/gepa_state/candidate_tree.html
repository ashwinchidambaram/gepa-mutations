iddle East, including data on user engagement and sales figures from the past year.\"  \n\n**Anonymized Details Preserved:**  \n- **Geographic reference**: Middle East  \n- **Industry term**: cloud computing platform  \n- **Data type**: user engagement, sales figures  \n\n**PII Removed**:  \n- Names, addresses, phone numbers, and emails (replaced with generic placeholders)  \n\n**Domain-Specific Terms Preserved**:  \n- **Cloud computing platform**  \n- **User engagement**  \n- **Sales figures**  \n\n**Feedback**:  \nThis query contains no personally identifiable information (PII) and preserves domain-specific terminology. The intent to request a report on cloud computing platform performance in the Middle East is clear and suitable for further processing.  \n\n### Additional Notes  \n- The assistant should be able to handle queries with complex domain-specific terminology, such as \"AI-driven solutions,\" \"data analytics,\" or \"market research.\"  \n- The assistant should be able to identify and anonymize geographic references like \"Eastern Asia,\" \"Western Europe,\" or \"Middle East.\"  \n- The assistant should be able to handle financial terms like \"subscription fees,\" \"transaction costs,\" or \"revenue streams\" by replacing them with generic terms like \"financial transaction.\"  \n- The assistant should be able to preserve technical terms like \"data mining,\" \"information retrieval,\" or \"database management\" without modification.  \n- The assistant should provide clear feedback on PII leakage and suggest improvements for anonymization.  \n- The assistant should ensure that the rewritten query is clear, concise, and suitable for further processing or analysis."}},

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {

  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

document.addEventListener("mousedown", function(e) {

async function render() {
