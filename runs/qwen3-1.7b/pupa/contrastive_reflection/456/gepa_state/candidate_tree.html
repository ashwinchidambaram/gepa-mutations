ining status, and internal processes).  \n- **Financial and market data** (e.g., revenue, market size, growth projections, and competitive landscape).  \n- **Strategic goals and objectives** (e.g., expanding into new markets, enhancing brand credibility, and improving customer engagement).  \n\n## Generalizable Strategy to Solve the Task  \n- **Identify and locate** all instances of PII in the input text.  \n- **Replace PII with generic placeholders** while maintaining the original meaning.  \n- **Ensure that the rewritten text retains the original structure and formatting**.  \n- **Use a consistent and professional tone** throughout the rewritten text.  \n\n## Example Output  \nFor a business case study, the output might look like:  \n**Company Description**  \nCaviish is an e-commerce platform that sells celebrities\u2019 belongings to fans to create a unique luxury experience. Our suppliers are celebrities and sports players, and our clients are the fans. We are a global platform established as an LLC in 2021. Our main office is in Cairo, Egypt. We also have a branch in London, UK, for easier financial transactions, better currency exchange rates, and less commissions and taxes. Up till now, we have signed up with ten celebrities and offered 22 products as a start to test the market and explore challenges. Goods are offered with a fixed price; we may add an auction option later. We want to develop our company introduction to be more appealing to celebrities, customers, and production houses.  \n\n**Business Problem**  \nCelebrities wear their belongings in movies, festivals, TV shows, etc. This applies to actors, dancers, singers, sports players, social media celebrities, and so on. There are millions of belongings that hang on their cabinets. On the other hand, their fans are dreaming to own and buy the celebrity\u2019s belongings.  \n\n**Solution**  \nWe collect these items from top celebrities and sell them out to their top-notch fans throughout the Caviish platform. We offer the celebrity to donate part or all of the raised money for any community cause they are supporting.  \n\n**Benefits**  \nTo celebrities: We create a new source of income, increase their reputation, and reduce their cost of fame.  \nTo fans: We enable fans to buy celebrities\u2019 consignments and create a unique luxury experience.  \nTo Community: Donations solve many community problems through different NGOs.  \nCelebrities can diversify their interactions with fans, while fans are more interactive with applications and technology.  \nWe utilized and encouraged soft power to benefit society professionally and attractively.  \n\n**Many celebrities are in the funnel, but we prefer calming down to ensure top quality.**  \nWe have a huge challenge with marketing and branding. Celebrities are much convinced of Caviish. However, the clients don\u2019t know about us. How can we get more exposure and trust from clients? What else do the fans look for when buying their celebrity belongings?  \n\n**Our Goal**  \nTo be the most credible and profitable company that is a worldwide leader in selling celebrities\u2019 belongings to their fans in a joyful experience. Our objective is to work with all (Class A) celebrities and sports players and collaborate with top production houses.  \n\n**Future Objectives**  \n\u2022 Using NFT blockchain technology to authenticate the ownership of a specific piece. We develop an NFT for the celebrity wearing the belonging and get it signed by them. The fan will own this NFT free of charge once they buy the product. On the other hand, if the fan is interested in the NFT market, they can buy the NFT and automatically own the product free of charge.  \n\u2022 Collaborate with the production houses to gain more credibility, get an authentication letter for every product, and get access and exposure to more products.  \n\u2022 Collaborate with the cinema houses to put our products physically into a booth in front of the movie gate const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
