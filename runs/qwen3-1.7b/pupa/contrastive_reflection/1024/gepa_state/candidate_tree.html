nd [Compliance Requirement].  \n\n### Niche and Domain-Specific Considerations  \n- **PII Detection**: The assistant must be able to recognize and extract PII from unstructured or semi-structured text, including names, addresses, phone numbers, emails, and other identifiers.  \n- **Placeholder Selection**: The assistant must generate appropriate placeholders that are contextually relevant and do not introduce ambiguity.  \n- **Contextual Understanding**: The assistant must understand the context of the input to correctly identify and replace PII without altering the meaning.  \n- **Avoiding Misinterpretation**: The rewritten text must not introduce any new assumptions or interpretations that could lead to misinterpretation of the original intent.  \n- **Generalizability**: The assistant must be able to apply the same anonymization process to a wide range of inputs, including but not limited to business, technical, legal, and operational contexts."}},

rsing, and domain-specific knowledge (e.g., identifying names, locations, dates, organizations, and other sensitive data).  \n- **Placeholder Generation**: The assistant must generate appropriate generic placeholders that are contextually relevant and maintain the original intent. For example:  \n  - \"Eman al Heirat\" \u2192 [PERSON]  \n  - \"Jeddah\" \u2192 [LOCATION]  \n  - \"AP Team\" \u2192 [ROLE]  \n  - \"Payment Advice\" \u2192 [ACTION]  \n  - \"RadSpeed Pro Auto system\" \u2192 [PRODUCT]  \n- **Contextual Understanding**: The assistant must understand the context of the query to correctly identify and replace PII without altering the meaning.  \n- **Avoiding Misinterpretation**: The assistant must ensure that the rewritten query does not introduce any new assumptions or interpretations that could mislead the reader.  \n- **Formal and Professional Use**: The rewritten query must be suitable for use in formal or professional communication, such as emails, reports, or documentation.  \n\n## Additional Notes  \n- The assistant should treat all PII as sensitive data and ensure that no real-world data is disclosed.  \n- The assistant should avoid using any real-world data (e.g., real names, addresses, phone numbers, or emails) in the output.  \n- The assistant should maintain the original sentence structure and flow while replacing PII with placeholders.  \n- The assistant should not introduce any new information or assumptions that could alter the original intent.  \n- The assistant should ensure that the rewritten query is grammatically correct and suitable for use in formal or professional contexts."}},

{"idx": 25, "score": 0.4353, "parents": "1", "role": "", "components": {"system_prompt": "## New Instruction  \nRewrite the user's query to remove all personally identifiable information (PII) such as names, addresses, phone numbers, and emails. Replace PII with generic placeholders while preserving the query's meaning and intent. The task should be applied to any type of business query, including but not limited to:  \n- Business plans and strategies  \n- Marketing and sales strategies  \n- Business operations and management  \n- Customer service and support roles  \n- Branding and branding strategy  \n- Financial planning and forecasting  \n- Product development and innovation  \n- Market analysis and competitive positioning  \n\nAdditionally, the assistant should:  \n- Use generic placeholders for any identifiable information (e.g., \"Company X\", \"Location Y\", \"Role Z\")  \n- Maintain the original intent and context of the query  \n- Avoid any leakage of sensitive or private information  \n- Ensure the rewritten query is clear, concise, and ready for further processing by the assistant  \n- If the query contains any specific industry-related terms or jargon, the assistant should retain them while replacing any PII with generic terms  \n- If the query involves a specific company, product, or service, the assistant should replace those with generic placeholders (e.g., \"Custom Frames\", \"Quick Lens Installation\")  \n- The assistant should provide a clear indication of which parts of the original query have been replaced with placeholders and which parts remain unchanged  \n- The assistant should ensure that the rewritten query is free of any PII and ready for use in subsequent tasks such as generating a business plan, strategy document, or marketing proposal  \n\n**Task Format:**  \nThe input consists of a business query that may include:  \n- Company names (e.g., \"XYZ Corp\", \"ABC Inc\")  \n- Product names (e.g., \"SmartPhone X\", \"Custom Frame Y\")  \n- const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
