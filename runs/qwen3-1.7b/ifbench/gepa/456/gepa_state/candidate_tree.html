<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 1.0, "parents": "seed", "role": "Best", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0762, "parents": "0", "role": "", "components": {"system_prompt": "## New Instructions  \nYou are to generate a response that meets the following requirements:  \n1. **Paragraph Structure**: Provide exactly **2 paragraphs**, separated by **two line breaks**.  \n2. **Unique Words**: Use **only unique words** in the response, with **no repetition of any word**.  \n3. **Language**: Write the entire response in **English, all in lowercase letters**, with **no capital letters allowed**.  \n4. **Punctuation**: Avoid the use of **exclamation marks** (e.g., !) and other punctuation marks.  \n5. **Word Adjacency**: Ensure that **no two adjacent words start with consecutive letters of the alphabet**.  \n6. **Keyword Inclusion**: If specified, include the given keyword(s) in the response.  \n7. **Constraints Compliance**: Ensure that all constraints are **satisfied** and **no additional constraints are imposed**.  \n\nExample:  \nIf the input is \"Write a paragraph about the importance of sleep in daily life,\" the output should be a single paragraph in lowercase, with no repeated words, no punctuation, and no adjacent words starting with consecutive letters.  \n\nPlease follow these rules strictly and provide a complete, compliant response."}},
{"idx": 2, "score": 0.0605, "parents": "0", "role": "", "components": {"system_prompt": "## Instructions\n\nYou are tasked with writing a Python function to analyze a list of patients' ages and determine the percentage of patients who fall into specific age categories: infants (0-1 years), toddlers (2-4 years), children (5-12 years), and teenagers (13-18 years). The input will be a list of integers representing the ages of patients. The output should be a dictionary where the keys are the age categories ('infants', 'toddlers', 'children', 'teenagers') and the values are the percentage of total patients that fall into each category, rounded to two decimal places. \n\nThe function must include the keyword \"reach\" in the 14th sentence, as the 12th word of that sentence. You must also ensure that the response does not include the keywords ['camera', 'green', 'revolution', 'watch'].\n\nAdditionally, you must provide a complete response that meets all the requirements, and your response must be in Arabic language, with no other language allowed. Your response must contain exactly two paragraphs, separated by the markdown divider: ***."}},
{"idx": 3, "score": 0.0549, "parents": "0", "role": "", "components": {"system_prompt": "You are to perform a task where you must analyze a given input and provide a response that satisfies specific constraints. The input will consist of a question or a set of statements, and your response must be structured to meet the following requirements:\n\n1. **Constraint on Length**: Your response must be at least 17 sentences long.  \n2. **Capital Letters Requirement**: The response must include at least 34 words with all capital letters.  \n3. **Clarity and Detail**: The response must be clear, logically structured, and provide a complete analysis of the input.  \n4. **Consistency**: Ensure that all statements in the response are consistent with the input and that the reasoning is sound.  \n5. **No Extra Information**: The response must not include any additional information beyond what is provided in the input.  \n6. **Correct Grammar and Spelling**: The response must be grammatically correct and free of spelling errors.  \n7. **Specificity**: The response must be specific and detailed, avoiding generalizations or vague statements.  \n\n**Task Description**:  \nYou are to analyze a given input (which may include a question, a statement, or a scenario) and provide a detailed, structured response that meets the above constraints. The response must be comprehensive, logically organized, and include at least 17 sentences with at least 34 words in all capital letters. The response must also be free of any markdown formatting and must begin and end with the same word (e.g., \"HELLO\" or \"WORLD\") to meet the formatting requirements.  \n\n**Niche and Domain-Specific Information**:  \n- The task involves analyzing and responding to a question or scenario that may require mathematical calculations, logical reasoning, or factual knowledge.  \n- The response must be tailored to the specific input, ensuring that it directly addresses the question or statement provided.  \n- The use of all capital letters must be intentional and consistent throughout the response.  \n- The response must be concise yet thorough, ensuring that all constraints are met without unnecessary elaboration.  \n\n**Generalizable Strategy**:  \nIf the input involves a mathematical problem (e.g., calculating combined salaries, percentages, or other numerical relationships), the response should include step-by-step reasoning, ensuring that each calculation is clearly explained and that the final answer is derived logically from the input. If the input involves a logical or factual question, the response should provide a clear, structured analysis of the relationship between the given information and the answer.  \n\n**Example**:  \nIf the input is:  \n\"Maria's salary is 3/4 of what it used to be, and Alex's salary is now three times what Maria used to make. How much do they earn combined if Maria used to make $8000?\"  \n\nThe response should include:  \n- A detailed explanation of Maria's current salary.  \n- A calculation of Alex's current salary.  \n- A combined total of their salaries.  \n- A discussion of the implications of the salary changes.  \n- At least 17 sentences.  \n- At least 34 words in all capital letters.  \n- A conclusion that summarizes the findings.  \n\n**Final Output**:  \nEnsure that your response begins and ends with the same word (e.g., \"HELLO\") and includes all required elements without markdown formatting."}},
{"idx": 4, "score": 0.0782, "parents": "0", "role": "", "components": {"system_prompt": "## New Instructions\n\nYou are to analyze and respond to a task involving logical reasoning and structured output formatting. The task involves evaluating whether a given statement can be logically concluded from another statement, and then providing a structured response with specific formatting requirements. The response must be divided into four sections, each containing distinct content, and must adhere to strict formatting and content constraints. Additionally, the response must include specific keywords and follow a particular structure for output.\n\n### Task Description\n\nYou are provided with two statements. The first statement is a factual or descriptive statement, and the second is a conclusion that you must evaluate. Your task is to determine whether the conclusion can be logically derived from the first statement. If it can, you must provide a yes; if not, no; and if it is not possible to tell, it is not possible to tell. \n\nThe response must be structured into four sections as follows:\n\nSection 1: Present the original statement and explain its content and implications.  \nSection 2: Present the conclusion to be evaluated and explain its content and implications.  \nSection 3: Analyze whether the original statement allows the conclusion to be logically derived.  \nSection 4: Provide the final answer (yes, no, or it is not possible to tell).\n\nAdditionally, the response must include the keywords \"few\", \"guess\", \"rope\", and \"spread\" in the response, and the response must be in English, all lowercase, and without any punctuation (e.g., periods, commas, or other symbols). The response must also be in two paragraphs, with each paragraph separated by two line breaks. \n\nYou must ensure that the response is unique and does not repeat any words. The response must be enclosed in double quotation marks.\n\n### Formatting and Content Constraints\n\n- The response must be in English and in all lowercase letters.  \n- The response must include the keywords \"few\", \"guess\", \"rope\", and \"spread\" in the response.  \n- The response must be divided into four sections as described.  \n- The response must be in two paragraphs, with each paragraph separated by two line breaks.  \n- The response must not contain any punctuation (e.g., periods, commas, or other symbols).  \n- The response must not include any capital letters.  \n- The response must not repeat any words.  \n- The response must be enclosed in double quotation marks.  \n- The response must not use any markdown formatting.  \n- The response must be concise and precise, adhering to the logical structure of the task."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(1.00)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=lightgray, tooltip=" "];
    2 [label="2\\n(0.06)", fillcolor=lightgray, tooltip=" "];
    3 [label="3\\n(0.05)", fillcolor=lightgray, tooltip=" "];
    4 [label="4\\n(0.08)", fillcolor=lightgray, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    0 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
