{"idx": 11, "score": 0.0616, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement.  \n\n### Task Description  \nYou are to solve a mathematical optimization problem involving a graph representation of UI components and their dependencies. The goal is to determine the optimal layout that minimizes the total rendering time across both desktop and mobile devices, while also ensuring that user interaction latency does not exceed a specified threshold.  \n\n### Constraints and Requirements  \n1. **Graph Representation**: The graph $ G = (V, E) $ represents UI components and their dependencies. Each vertex $ v \\in V $ corresponds to a UI component, and each edge $ e \\in E $ represents a dependency between components.  \n2. **Rendering Time Function**: The rendering time for a component $ v_i $ is given by $ R(v_i) = \\alpha_i \\cdot f(s_i, r_i) $, where $ \\alpha_i $ is a device-specific constant, $ s_i $ is the size of the component, and $ r_i $ is the resolution of the component.  \n3. **Latency Function**: The latency for a component $ v_i $ is given by $ L(v_i) = \\beta_i \\cdot g(d_i) $, where $ \\beta_i $ is a device-specific constant, and $ d_i $ is the depth of the component in the graph.  \n4. **Optimization Objective**: Minimize the total rendering time $ \\sum_{v \\in V} R(v) $ for both devices, while ensuring that the total latency $ \\sum_{v \\in V} L(v) \\leq L $, where $ L $ is the maximum allowable latency.  \n5. **Mathematical Formulation**:  \n   - Define the optimization problem as a mathematical programming problem with two objectives:  \n     - Minimize $ \\sum_{v \\in V} R(v) $  \n     - Minimize $ \\sum_{v \\in V} L(v) $  \n   - The constraints are that the total rendering time must be minimized and the total latency must be less than or equal to $ L $.  \n6. **Language and Formatting**:  \n   - The response must be in **Gujarati**.  \n   - The last word of each sentence, before punctuation, must be the word **drama**.  \n   - The word **mirror** must appear exactly **5 times** in the response.  \n   - The word **chemical** must appear **at least once** in the response.  \n   - No commas are allowed in the response.  \n   - A **palindrome** must be included in the response.  \n\n### Niche and Domain-Specific Information  \n- **UI Component Layout**: The problem involves optimizing the layout of UI components in a multi-device ecosystem, considering varying screen sizes and resolutions.  \n- **Rendering Time Optimization**: The rendering time is a function of component size and resolution, which are device-specific.  \n- **Latency Constraints**: User interaction latency is influenced by the depth of components in the dependency graph, which is a critical factor in performance optimization.  \n- **Graph Theory**: The problem is modeled using graph theory, where the structure of the graph (nodes and edges) directly impacts the rendering and latency performance.  \n- **Mathematical Programming**: The problem is formulated as a mathematical programming problem, which is a common approach in optimization and machine learning.  \n\n### Generalizable Strategy  \n- Use **graph theory** to model the UI components and their dependencies.  \n- Apply **mathematical programming** to formulate the optimization problem.  \n- Incorporate **constraint satisfaction** to ensure that both rendering time and latency are minimized within the given limits.  \n- Use **palindromic structures** and **drama-based sentence endings** to meet the formatting requirements.  \n- Ensure **language compliance** by using Gujarati and adhering to the specified constraints.  \n- Include the required word **mirror** exactly 5 times and **chemical** at least once."}}];

    7 -> 10;

}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
