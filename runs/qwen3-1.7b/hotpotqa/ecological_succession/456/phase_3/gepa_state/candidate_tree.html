 in 1985 by Eva Ibbotson. The book is dedicated to Patricia Veryan. Critically well received, the young adult novel is starting to be obliquely referred to in reviews, as reviewers attempt to compliment a new work by comparing it to another, better established work.\nPatricia Veryan: Patricia Valeria Bannister, (born November 21, 1923 in London, England; died November 18, 2009 in Bellevue, Washington, USA) was a writer of historical romance fiction from 1978 until 2002. She wrote under the names Patricia Veryan and Gwyneth Moore.\nTagalog pocketbooks: According to Tatin Yang in the article \"Romansang Pinoy: A day with Tagalog romance novels\", Tagalog romance paperbacks were thin Philippine versions of romance novel books that could be found at the bottom shelves of the romance section of bookstores, wrapped and bound with book covers that are decorated with Philippine comics-styled illustrations, such as \"a barrio landscape with a badly dressed guy and girl locked in an embrace\". As a form of \"escapist fiction\" (escapism) and \"commercial literature\", Tagalog romance novels generally follow a \"strict romance formula\", meaning the narratives have happy endings (a factor influencing the salability of the novel), the protagonists are wealthy, good-looking, smart, and characters that cannot die. Normally, the hero or heroine of the story falls in love and \"goes crazy\" over the admired person. However, later authors of Tagalog romance novels deviated from portraying so-called \"damsel-in-distress and knight-in-shining-armor characters\". Contemporary writers also turned away from writing \"rags-to-riches plots\". The stereotypical norm had been replaced by the incorporation of storylines with \"interesting scenes, characters [who are ready to face challenges or to sacrifice themselves for the benefit of other people], dialogues, and new angles to old plots\". Authors such as Maria Teresa Cruz San Diego, who used the pen names Maia Jose and Tisha Nicole, ventured into the fantasy romance genre, and into topics that are related to politics, ecology, gender issues, prostitution, mail-order bride syndicates, white slavery, non-governmental organizations, and breastfeeding programs. Apart from writing about ideal lovers (men and women) and ideal situations, other novelists wrote about true-to-life settings, or at least based the stories from personal experiences. Thus, Tagalog romance novels came to mirror or replicate the \"roles that women and men play\" in Philippine society.\nFamily Album (novel): Family Album is a 1985 romance novel by Danielle Steel. It was adapted into a 1994 TV miniseries starring Jaclyn Smith.\nMorishima Ch\u016bry\u014d: Morishima Ch\u016bry\u014d (\u68ee\u5cf6 \u4e2d\u826f , 1756 \u2013 December 29, 1810) was an Edo period Japanese author of popular fiction who also wrote a number of works in the field of rangaku (Western studies). He wrote under many pen names, including Manz\u014dtei, Shinra Manz\u014d (or, conventionally, Shinra Bansh\u014d), and Tenjiku R\u014djin (\"old man from India\"). The latter constituted an allusion to the pen name Tenjiku R\u014dnin (\"masterless samurai from India\"), used by Hiraga Gennai, to whom Ch\u016bry\u014d was the principal literary successor. Ch\u016bry\u014d co-authored several plays with Gennai early in his career, and went on to write in almost all of the many genres of popular fiction that were collectively known as gesaku. He also wrote ky\u014dka, or comic waka poetry, under the pen name Taketsue no Sugaru. Ch\u016bry\u014d was the younger brother of Katsuragawa Hosh\u016b, a shogunal physician and leading scholar of rangaku.\nOndine (novel): Ondine is a romance novel first published in 1988 under Heather Graham Pozzessere\u2019s pen name, Shannon Drake. It is the story of a lady of 17th century England who finds herself cast from nobility when her father is accused of treason and murdered. As a noose rests at her neck, her one regret is that she did not have a chance to find his killer. She is once again given that chance when Lord Chatham, hoping to use the lady to solve the murder of his wife, takes her hand in marriage to save her from the hangman\u2019s rope. The novel consists of multiple plot lines making it more than just an average romance novel. It may also be classified under the genres of historical romance, mystery, and gothic.\nSarah MacLean: Sarah MacLean (born December 17, 1978) is a New York Times bestselling American author of young adult novels and romance novels. Her first adult romance novel, \"Nine Rules to Break When Romancing a Rake\" debuted on the New York Times Bestseller List, where it stayed for four weeks. Since then, all of her adult romance novels have been on the New York Times and USA Today bestseller lists. Since February 2014, MacLean has written a monthly romance novel review column for The Washington Post. She is a two-time winner of the Romance Writers of America RITA Award for Best Historical Romance for \"A Rogue by Any Other Name\" in 2013 and \"No Good Duke Goes Unpunished\" in 2014.\n\nQuestion: Which author dedicated a 1985 romance novel to the author who did in 2009 and wrote under the pen name Gwyneth Moore?\n\n**Generated Output:**\nThe author who dedicated a 1985 romance novel to the author who did in 2009 and wrote under the pen name Gwyneth Moore is Patricia Veryan.\n\n**Feedback:**\nIncorrect. The correct answer is 'Eva Ibbotson'. Ensure that the correct answer is included in the response."}},

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
