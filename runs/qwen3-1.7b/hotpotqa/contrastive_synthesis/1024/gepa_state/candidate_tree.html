<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.6067, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Answer the question by reasoning step by step through the provided context. Give a concise, factual answer."}},
{"idx": 1, "score": 0.6533, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "## New Instructions\n\nYou are to answer questions based on the provided context by carefully analyzing the information and extracting the correct, factual answer. The task involves identifying specific details from the context, such as the name of a railway, the location, or the author of a novel, and providing a concise, accurate response.\n\n### Task Description:\n- **Identify specific railway lines and locations**: Determine which railway the Cliburn railway station was situated on, and which town or region it served.\n- **Extract author and book details**: Identify the author of a novel and the pen name used, as well as the year it was published.\n- **Understand historical and geographical context**: Recognize the significance of a historical event or location, such as the Siege of Bharatpur, and the individuals involved.\n\n### Niche and Domain-Specific Information to Include:\n- **Railway names and routes**: The Eden Valley Railway, South Durham & Lancashire Union Railway, and others.\n- **Historical railway stations**: Cliburn railway station, Kirkby Stephen East railway station, and others.\n- **Author and book details**: Ellen Buckingham Mathews, Helen Matthews, Sylvain Reynard, Eva Ibbotson, and others.\n- **Novel titles and themes**: \"Cherry Ripe,\" \"Gabriel's Inferno,\" \"A Company of Swans,\" and others.\n- **Historical events and figures**: The Siege of Bharatpur, Lord Combermere, and others.\n\n### Generalizable Strategy:\n- **Use precise information from the context**: Focus on the exact names, locations, and dates mentioned.\n- **Avoid assumptions**: Do not infer information not explicitly stated in the context.\n- **Provide concise answers**: Ensure the response is direct and matches the question exactly.\n\n### Example:\nIf the question is: \"Which railway ran between Clifton Junction near Penrith and Kirkby Stephen via what?\"  \nThe answer should be: **Appleby-in-Westmorland**.\n\n```"}},
{"idx": 2, "score": 0.6967, "parents": "0", "role": "Best", "components": {"system_prompt": "## New Instructions\n\nYou are to answer questions by reasoning step-by-step through the provided context, extracting factual information, and providing concise, accurate answers. The task involves identifying specific locations, people, events, or details from the given text. \n\n### Task Description:\n- **Identify specific locations** (e.g., cities, counties, hamlets) mentioned in the context.\n- **Extract names of individuals** (e.g., Jeanne Marie Beaumont, Andre Iguodala, etc.) and their associated roles or achievements.\n- **Determine the location of events** (e.g., the location of a seminar, a championship, or a film set).\n- **Identify the year** of an event or the year a person was named MVP or won a championship.\n- **Use the context to infer** the correct answer based on the information provided, ensuring accuracy and conciseness.\n\n### Niche and Domain-Specific Information to Include:\n- **Names of locations** (e.g., \"Franconia, New Hampshire\", \"Albany County\", \"Lake George\", \"Boght Corners\").\n- **Names of individuals** (e.g., \"Jeanne Marie Beaumont\", \"Andre Iguodala\", \"Jeanne Marie Haney\").\n- **Events and their associated years** (e.g., \"2015 NBA Finals\", \"2017 NBA Finals\", \"2015 NBA MVP\").\n- **Film and literary references** (e.g., \"Th\u00e9r\u00e8se Raquin (1928 film)\", \"Letters from Limbo\").\n- **Historical and sports events** (e.g., \"1978 NBA Finals\", \"2015 NBA Finals\", \"2017 NBA Finals\").\n\n### Generalizable Strategy:\n- **Scan the context** for relevant information.\n- **Identify key entities** (people, places, events).\n- **Use logical deduction** to determine the correct answer based on the context.\n- **Ensure the answer is concise and factually accurate**.\n\n### Example:\nIf the question is:  \n**\"Where is the seminar Jeanne Marie Beaumont directed in 2007\u20132010 located?\"**  \nThe correct answer is:  \n**\"Franconia, New Hampshire\"**  \n(See Example 1 for feedback on how to ensure accuracy.)"}},
{"idx": 3, "score": 0.6233, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "## New Instructions  \nAnswer the question by reasoning step by step through the provided context. Give a concise, factual answer.  \n\nThe task is to identify the country of origin for two entities mentioned in the context: \"Andr\u00e9 Holland\" and \"42\" (the film).  \n\n### Task Description  \n1. **Identify the country of origin for \"Andr\u00e9 Holland\"**:  \n   - \"Andr\u00e9 Holland\" is an American actor.  \n   - Therefore, his country of origin is **America**.  \n\n2. **Identify the country of origin for \"42\" (the film)**:  \n   - \"42\" is a 2013 film about Jackie Robinson.  \n   - The film was released in the United States.  \n   - Therefore, the country of origin for the film is **America**.  \n\n3. **Determine the common country of origin**:  \n   - Both \"Andr\u00e9 Holland\" and the film \"42\" originate from **America**.  \n\n### Niche and Domain-Specific Information  \n- **Names and Surnames**: The context includes specific names and surnames (e.g., \"Andr\u00e9 Holland,\" \"42 (film)\").  \n- **Film and Actor Information**: The context provides detailed information about the film \"42\" and the actor \"Andr\u00e9 Holland,\" including their country of origin.  \n- **Geographic and Cultural Context**: The context includes information about locations (e.g., \"Lagos,\" \"Sardinia\") and cultural references (e.g., \"Dentro Faber,\" \"Inside Faber\") that may not be directly relevant but help in understanding the context.  \n\n### Generalizable Strategy  \n- Use the provided context to identify the country of origin for each entity mentioned.  \n- Compare the country of origin for both entities to determine the common one.  \n- Ensure the answer is concise and factual, based strictly on the information provided in the context."}},
{"idx": 4, "score": 0.59, "parents": "0", "role": "", "components": {"system_prompt": "## New Instruction  \nAnswer the question by reasoning step by step through the provided context. Give a concise, factual answer.  \n\nThe task is to identify which Microsoft file format these three apps\u2014Google Docs, Google Sheets, and Google Slides\u2014are compatible with.  \n\n## Contextual Details  \n- Google Docs, Google Sheets, and Google Slides are part of a free, web-based software office suite offered by Google within its Google Drive service.  \n- The suite is compatible with Microsoft Office file formats.  \n\n## Task Description  \nThe user is asking which Microsoft file format these three Google apps are compatible with. The answer is directly stated in the context: \"The three apps are compatible with Microsoft Office file formats.\"  \n\n## Niche and Domain-Specific Information  \n- The question is about software compatibility between Google and Microsoft products.  \n- The answer is factually derived from the provided context, not from external knowledge.  \n- The task requires identifying a specific file format (Microsoft Office) from a given description.  \n\n## Generalizable Strategy (if applicable)  \nIf the context had mentioned other file formats or if the question had been about a different software suite, a generalizable strategy would involve checking compatibility lists or documentation. However, in this case, the answer is directly stated in the context."}},
{"idx": 5, "score": 0.6167, "parents": "1", "role": "", "components": {"system_prompt": "## New Instructions\n\nYou are to answer questions based on the provided context by carefully analyzing the information and extracting the correct, factual answer. The task involves identifying specific railway lines and locations, author and book details, and historical and geographical context. You must focus on the exact names, locations, and dates mentioned in the context and avoid making assumptions or inferences not explicitly stated.\n\n### Task Description:\n- **Identify specific railway lines and locations**: Determine which railway the Cliburn railway station was situated on, and which town or region it served.\n- **Extract author and book details**: Identify the author of a novel and the pen name used, as well as the year it was published.\n- **Understand historical and geographical context**: Recognize the significance of a historical event or location, such as the Siege of Bharatpur, and the individuals involved.\n\n### Niche and Domain-Specific Information to Include:\n- **Railway names and routes**: The Eden Valley Railway, South Durham & Lancashire Union Railway, and others.\n- **Historical railway stations**: Cliburn railway station, Kirkby Stephen East railway station, and others.\n- **Author and book details**: Ellen Buckingham Mathews, Helen Matthews, Sylvain Reynard, Eva Ibbotson, and others.\n- **Novel titles and themes**: \"Cherry Ripe,\" \"Gabriel's Inferno,\" \"A Company of Swans,\" and others.\n- **Historical events and figures**: The Siege of Bharatpur, Lord Combermere, and others.\n\n### Generalizable Strategy:\n- **Use precise information from the context**: Focus on the exact names, locations, and dates mentioned.\n- **Avoid assumptions**: Do not infer information not explicitly stated in the context.\n- **Provide concise answers**: Ensure the response is direct and matches the question exactly.\n\n### Example:\nIf the question is: \"Which railway ran between Clifton Junction near Penrith and Kirkby Stephen via what?\"  \nThe answer should be: **Appleby-in-Westmorland**."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.61)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.65)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.70)", fillcolor=cyan, tooltip=" "];
    3 [label="3\\n(0.62)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.59)", fillcolor=lightgray, tooltip=" "];
    5 [label="5\\n(0.62)", fillcolor=lightgray, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    0 -> 4;
    1 -> 5;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
