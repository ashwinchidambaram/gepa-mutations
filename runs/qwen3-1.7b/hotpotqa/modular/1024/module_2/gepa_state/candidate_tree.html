<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }

  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }

  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;

    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;

  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }

</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.61, "parents": "seed", "role": "Best", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity."}},
{"idx": 1, "score": 0.5733, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information. The answer must be in a single, clear sentence or short paragraph. It must strictly follow the structure of the original question and context, and must not include assumptions or external knowledge.  \n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.  \n\n(Niche and domain-specific information)  \n- The task involves identifying specific entities (e.g., names of places, people, organizations) and their associated details (e.g., elevation, location, awards, dates).  \n- The context may contain multiple unrelated topics, but the task requires focusing on the specific question and extracting the relevant information.  \n- The assistant must be able to distinguish between factual details and contextual background information.  \n- The answer must be precise and directly answer the question without introducing new information or interpretations.  \n\n(Generalizable strategy)  \n- The assistant should use logical deduction based on the provided context.  \n- The assistant should avoid relying on prior knowledge or general rules.  \n- The assistant should ensure that the answer is consistent with the information provided and does not make unsupported claims."}},
{"idx": 2, "score": 0.5767, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires identifying the specific genus of a plant based on a given context, focusing on factual information about plant taxonomy. The answer must be concise, directly derived from the provided context, and strictly follow the structure of the question. The assistant must extract relevant plant names and their corresponding genera, ensuring no assumptions or external knowledge are used.  \n\n(Step-by-step reasoning approach)  \n1. Identify the specific plant or plant-related term in the question or context.  \n2. Extract the genus name(s) mentioned in the context.  \n3. Analyze the context to determine which genus is being referred to.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.  \n\n(Output format requirements and constraints)  \n- The answer must be a single, clear sentence or short paragraph.  \n- The answer must strictly follow the structure of the original question and context.  \n- No external knowledge or assumptions are used.  \n- The answer must directly address the question without introducing new information or interpretations.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure the answer is based solely on the information given and does not rely on prior knowledge.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.  \n\n(Niche and domain-specific information)  \n- The task involves identifying plant genera (e.g., Marsilea, Brabejum, Sinocyclocheilus) and their corresponding species counts.  \n- The context may contain multiple unrelated topics, but the task requires focusing on the specific question and extracting the relevant information.  \n- The assistant must distinguish between factual plant details (e.g., species counts, genus names) and contextual background information.  \n- The answer must be precise and directly answer the question without introducing new information or interpretations.  \n\n(Generalizable strategy)  \n- The assistant should use logical deduction based on the provided context.  \n- The assistant should avoid relying on prior knowledge or general rules.  \n- The assistant should ensure that the answer is consistent with the information provided and does not make unsupported claims."}},
{"idx": 3, "score": 0.5867, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information. The answer must be in a single, clear sentence or short paragraph. It must strictly follow the structure of the original question and context, and must not include any assumptions or external knowledge.  \n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.  \n\n(Niche and domain-specific information)  \n- The context contains a variety of sports and professionals, including tennis, football (soccer), and publishing.  \n- The task may involve identifying a specific sport or profession based on the names and roles mentioned.  \n- The assistant must recognize that the answer must be derived directly from the context and not based on external knowledge.  \n- The assistant must be careful to avoid including any information not explicitly stated in the context.  \n- The assistant must ensure that the answer is a direct answer to the question, not a general statement about the subject.  \n\n(Generalizable strategy)  \n- If the question involves identifying a sport or profession based on names and roles, the assistant should look for direct mentions of the sport or profession in the context.  \n- If the question involves a specific event or time period, the assistant should identify the relevant details from the context.  \n- If the question involves a logical deduction based on the context, the assistant should follow the step-by-step reasoning approach outlined above."}},
{"idx": 4, "score": 0.5767, "parents": "0", "role": "", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information. The answer must be in a single, clear sentence or short paragraph, and must strictly follow the structure of the original question and context. The assistant must avoid assumptions, external knowledge, and speculation, and must ensure the answer is accurate and directly based on the information provided in the context.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.\n\n(Niche and domain specific factual information)  \n- The task involves identifying specific individuals based on their roles, positions, and achievements in sports, particularly football (soccer).  \n- The assistant must be able to recognize names, positions, and achievements in a context that may include multiple players, teams, and coaches.  \n- The answer must be precise and match the exact name and details provided in the context, including any variations in spelling or formatting.  \n- The assistant must be able to distinguish between similar names (e.g., \"Claudio L\u00f3pez\" and \"Claudio Javier L\u00f3pez\") and ensure the correct name is selected.  \n- The assistant must be able to identify key facts such as birth dates, positions, and notable achievements, even if they are not explicitly stated in the context.  \n\n(Generalizable strategy for solving the task)  \n- The assistant should use a direct match strategy to identify the correct individual based on the question and the context.  \n- The assistant should focus on key details such as positions, teams, and notable achievements to narrow down the correct answer.  \n- The assistant should avoid any interpretation or speculation and rely solely on the information provided in the context.  \n- The assistant should ensure that the answer is concise, accurate, and directly derived from the given information without any external knowledge."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.61)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.57)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.58)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.59)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.58)", fillcolor=lightgray, tooltip=" "];
    0 -> 1;
    1 -> 2;
    0 -> 3;
    0 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
