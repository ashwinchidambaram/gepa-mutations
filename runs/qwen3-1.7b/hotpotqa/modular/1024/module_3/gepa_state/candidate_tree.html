<script type="module">
const NODES = [{"idx": 0, "score": 0.6067, "parents": "seed", "role": "Best", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity."}},

\n- The task requires understanding of geographic and administrative boundaries, such as county names, town names, and route designations.  \n- The answer must be based solely on the given context and must not include external knowledge or general knowledge about geography.  \n- The task is highly dependent on the exact phrasing of the question and the precise location names provided in the context.  \n\n(Generalizable strategy)  \n- Identify the key entity or location mentioned in the question.  \n- Locate the relevant information in the context that directly answers the question.  \n- Ensure the answer is concise and matches the exact phrasing of the question.  \n- Avoid any interpretation or inference beyond the given text.  \n- Maintain strict adherence to the structure of the question and the context."}},

.).  \n- The answer must be precise and use the exact names and titles provided in the context.  \n- The answer must reflect the specific roles and relationships as defined in the context, not generalizations.  \n- The answer must be derived directly from the context without external knowledge or inference.  \n\n(Generalizable strategy)  \n- The assistant will use a direct lookup strategy to identify the individual and their role in the context.  \n- The assistant will extract the name of the individual and their role from the context and match it to the question.  \n- The assistant will ensure the answer is concise, accurate, and directly derived from the provided information."}},
{"idx": 3, "score": 0.5567, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires identifying the specific date of birth of an Austrian \"Schutzstaffel\" (SS) officer based on the information provided in the context, where Schapira co-authored a book about the life of that officer. The answer must be concise, factual, and directly derived from the given context, strictly following the structure of the question and context. The answer must be free of assumptions and align with the given information.  \n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Locate the relevant information in the context about the Austrian \"Schutzstaffel\" (SS) officer whose life Schapira co-authored a book on.  \n3. Extract the date of birth of that officer from the context.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.  \n\n(Niche and domain-specific information)  \n- The task involves identifying specific dates and names of historical figures based on textual descriptions.  \n- The answer must be precise and match the exact names and dates mentioned in the context.  \n- The task requires understanding of historical and administrative contexts, such as the SS and its officers.  \n- The answer must be based solely on the given context and must not include external knowledge or general knowledge about history.  \n- The task is highly dependent on the exact phrasing of the question and the precise location names provided in the context.  \n\n(Generalizable strategy)  \n- Identify the key entity or location mentioned in the question.  \n- Locate the relevant information in the context that directly answers the question.  \n- Ensure the answer is concise and matches the exact phrasing of the question.  \n- Avoid any interpretation or inference beyond the given text.  \n- Maintain strict adherence to the structure of the question and the context."}},
{"idx": 4, "score": 0.59, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information. The answer must be in a single, clear sentence or short paragraph, and it must strictly follow the structure of the original question and context. The assistant must avoid assumptions, external knowledge, or speculation, and ensure the answer is directly derived from the provided information.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.\n\n(Niche and domain-specific information)  \n- The task involves identifying specific names, titles, and roles from a given context, particularly in the fields of film, sports, and historical events.  \n- The assistant must be able to distinguish between different titles, such as \"King,\" \"Captain,\" \"Actor,\" \"Director,\" and \"Player,\" and correctly map them to the corresponding individuals or entities in the context.  \n- The assistant must be able to recognize names of institutions, teams, and events (e.g., \"Cal Poly Mustangs,\" \"NBA,\" \"NCAA\") and their associated roles or contributions.  \n- The assistant must be able to identify and extract specific details from complex or multi-part sentences, such as the names of individuals, their roles, and the context in which they appear.\n\n(Generalizable strategy)  \n- The assistant should use a direct and precise method to extract information from the given context.  \n- The assistant should focus on identifying the key elements of the question and matching them to the relevant information in the context.  \n- The assistant should avoid any interpretation or inference beyond what is explicitly stated in the context.  \n- The assistant should ensure that the final answer is clear, concise, and directly answers the question without unnecessary elaboration."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.61)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.59)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.58)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.56)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.59)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    1 -> 3;
    0 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
