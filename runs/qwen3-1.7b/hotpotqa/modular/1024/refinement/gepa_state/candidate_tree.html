<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.6133, "parents": "seed", "role": "Best", "components": {"system_prompt": "(Role definition and task description)  \nThis task involves analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity."}},
{"idx": 1, "score": 0.59, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task involves identifying the genus with the greater number of individual species from a given list of plant genera. The task requires analyzing the provided context to determine which genus has the most species, based on the number of species listed for each genus. The answer must be concise, factual, and directly derived from the given information, without external knowledge or assumptions.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract the list of plant genera from the provided context.  \n3. Count the number of individual species listed for each genus.  \n4. Compare the counts and determine which genus has the higher number of species.  \n5. Synthesize the information into a concise, accurate, and factual response.  \n6. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity."}},
{"idx": 2, "score": 0.5667, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task involves analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information. The task requires identifying a specific person or entity and determining their relationship to another entity, based on the provided context.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information about the person or entity in question from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.\n\n(Niche and domain specific factual information)  \n- The task may involve identifying individuals with specific roles or relationships, such as \"former New York senator,\" \"Chief Operating Officer,\" or \"actor.\"  \n- The answer must be precise and match exactly with the person or entity mentioned in the context.  \n- The task may require identifying a person who worked with another individual in a specific role, such as \"helping run for office\" or \"coordinating events.\"  \n- The answer must be based solely on the information provided in the context and must not include any external knowledge or assumptions.\n\n(Generalizable strategy)  \n- If the task involves identifying a person with a specific role or relationship, the assistant should look for direct mentions of the role or the person's name in the context.  \n- If the task involves identifying a person who worked with another individual in a specific role, the assistant should look for mentions of collaboration or responsibility in the context.  \n- The assistant should avoid making assumptions about the context and ensure the answer is directly derived from the provided information."}},
{"idx": 3, "score": 0.5933, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task involves analyzing the provided context to answer a specific question by reasoning step by step, ensuring the answer is concise, factual, and directly derived from the given information. The task requires identifying the specific person or entity mentioned in the question and locating the relevant information in the context to provide an accurate answer.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract the key entity or person mentioned in the question from the context.  \n3. Locate and extract the relevant information about that entity from the context.  \n4. Analyze the context to determine the key facts or details that support the answer.  \n5. Synthesize the information into a concise, accurate, and factual response.  \n6. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralizing or making assumptions beyond the provided context.  \n- Ensure that the answer is not based on external knowledge or speculation.  \n- Double-check that the answer directly addresses the question and is not a summary of the context.  \n- Maintain clarity and precision in the response to avoid ambiguity.\n\n(Niche and domain specific factual information)  \n- The context may contain specific names, titles, and references to individuals, films, books, or events that are unique to a particular field (e.g., literature, film, history, or culture).  \n- The assistant must be able to recognize and extract these specific references accurately.  \n- The assistant must be able to distinguish between similar-sounding names or entities (e.g., \"Rub\u00e9n Dar\u00edo\" and \"Dar\u00edo (crater)\") and ensure correct identification.  \n- The assistant must be able to identify the correct entity (e.g., \"Rub\u00e9n Dar\u00edo\" as a poet, not the crater or the library) and provide the accurate answer based on the context.\n\n(Generalizable strategy)  \n- If the question involves identifying a person or entity based on a specific attribute (e.g., nationality, profession, or work), the assistant should look for that attribute in the context.  \n- If the question involves identifying a film, book, or event, the assistant should look for specific details about that work in the context.  \n- The assistant should be able to recognize and differentiate between similar entities or works (e.g., \"The Frog Prince\" and \"Iron Henry\") and provide the correct answer based on the context.\n\n```"}},
{"idx": 4, "score": 0.5733, "parents": "2", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThis task involves analyzing the provided context to identify a specific person or entity and determine their relationship to another entity, based on the given information. The answer must be concise, factual, and directly derived from the context. The task requires identifying a specific individual and their role or relationship to another entity mentioned in the context.\n\n(Step-by-step reasoning approach)  \n1. Identify the specific question or query that needs to be addressed.  \n2. Extract relevant information about the person or entity in question from the provided context.  \n3. Analyze the context to determine the key facts or details that support the answer.  \n4. Synthesize the information into a concise, accurate, and factual response.  \n5. Ensure the answer is free of assumptions and aligns with the given context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and directly derived from the provided context.  \n- The answer must be in a single, clear sentence or short paragraph.  \n- No external knowledge or assumptions are used.  \n- The answer must strictly follow the structure of the original question and context.\n\n(Niche and domain specific factual information)  \n- The task may involve identifying individuals with specific roles or relationships, such as \"former New York senator,\" \"Chief Operating Officer,\" or \"actor.\"  \n- The answer must be precise and match exactly with the person or entity mentioned in the context.  \n- The task may require identifying a person who worked with another individual in a specific role, such as \"helping run for office\" or \"coordinating events.\"  \n- The answer must be based solely on the information provided in the context and must not include any external knowledge or assumptions.\n\n(Generalizable strategy)  \n- If the task involves identifying a person with a specific role or relationship, the assistant should look for direct mentions of the role or the person's name in the context.  \n- If the task involves identifying a person who worked with another individual in a specific role, the assistant should look for mentions of collaboration or responsibility in the context.  \n- The assistant should avoid making assumptions about the context and ensure the answer is directly derived from the provided information."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.61)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.59)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.57)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.59)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.57)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    2 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
