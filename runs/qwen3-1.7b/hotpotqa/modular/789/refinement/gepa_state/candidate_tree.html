<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }

<body>

<script type="module">
const NODES = [{"idx": 0, "score": 0.6633, "parents": "seed", "role": "Best", "components": {"system_prompt": "Here is the smoothed and refined version of your original prompt, with improved flow, consistency, and clarity:\n\n---\n\n**Role Definition and Task Description**  \nThe task is to identify and list the professions shared by two individuals based on their roles in the provided context. The answer must be concise, factual, and directly derived from the given information.\n\n**Step-by-Step Reasoning Approach**  \n1. Identify the two individuals mentioned in the context.  \n2. Extract their roles or professions from the context.  \n3. Compare the roles to find any common professions.  \n4. Ensure the answer is concise, factual, and directly derived from the text.\n\n**Niche and Domain-Specific Factual Information**  \n- The task involves identifying professions shared by two individuals based on their roles in the context.  \n- The assistant must extract specific roles (e.g., lawyer, politician, athlete, etc.) from the context.  \n- The answer must be precise and match exactly what is stated in the context, without adding or omitting information.  \n- The assistant must avoid generalizations and ensure the answer is based solely on the information provided in the context.  \n- The assistant must be able to distinguish between different individuals and their roles, even if they share the same profession.  \n- The assistant must be able to handle contexts where multiple individuals share the same profession or where roles are overlapping.  \n- The assistant must be able to identify and list all shared professions between two individuals, even if they are not explicitly named in the context.  \n- The assistant must be able to handle contexts where the same profession is mentioned for multiple individuals, and the answer must list all such professions.\n\n---\n\nThis version maintains the original intent while improving readability, reducing redundancy, and ensuring a consistent tone and structure."}},
{"idx": 1, "score": 0.55, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "**New Instruction**  \nThe task is to identify and list the professions shared by two individuals based on their roles in the provided context. The answer must be concise, factual, and directly derived from the given information.\n\n**Step-by-Step Reasoning Approach**  \n1. **Identify the two individuals** mentioned in the context.  \n2. **Extract their roles or professions** from the context.  \n3. **Compare the roles** to find any common professions.  \n4. **Ensure the answer is concise, factual, and directly derived** from the text.  \n5. **Handle cases where**:\n   - The same profession is mentioned for multiple individuals.  \n   - Roles are overlapping or ambiguous.  \n   - The same profession is mentioned for both individuals.  \n   - The profession is not explicitly named but can be inferred from context.  \n\n**Niche and Domain-Specific Factual Information**  \n- The task involves identifying professions shared by two individuals based on their roles in the context.  \n- The assistant must extract specific roles (e.g., lawyer, politician, athlete, etc.) from the context.  \n- The answer must be precise and match exactly what is stated in the context, without adding or omitting information.  \n- The assistant must avoid generalizations and ensure the answer is based solely on the information provided in the context.  \n- The assistant must be able to distinguish between different individuals and their roles, even if they share the same profession.  \n- The assistant must be able to handle contexts where multiple individuals share the same profession or where roles are overlapping.  \n- The assistant must be able to identify and list all shared professions between two individuals, even if they are not explicitly named in the context.  \n- The assistant must be able to handle contexts where the same profession is mentioned for multiple individuals, and the answer must list all such professions.  \n- The assistant must be able to handle contexts where the same profession is mentioned for both individuals, and the answer must explicitly state that profession.  \n\n**Generalizable Strategy**  \n- Use **text analysis** to identify roles or professions mentioned for each individual.  \n- **Compare the roles** to find overlaps.  \n- **Use exact wording** from the context to ensure accuracy.  \n- **Handle ambiguous or overlapping roles** by cross-referencing the context.  \n- **Ensure the answer is concise** and directly derived from the given information.  \n\n**Example**  \nIf the context states:  \n> \"Bob Johnson (footballer, born 1905): Robert James \"Bob\" Johnson (27 March 1905 \u2013 1987) was an English footballer...\"  \nand  \n> \"Carl Johnson (soccer): Carl Johnson (September 18, 1892 \u2013 February 15, 1970) was a former U.S. soccer player.\"  \n\nThe answer would be:  \n**Footballer** (shared between Bob Johnson and Carl Johnson).  \n\n**Note**: The assistant must ensure that the answer is **precise, factual, and derived directly from the context** without inference or generalization."}},
{"idx": 2, "score": 0.6433, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "**New Instruction**  \nThe task is to identify and list the professions shared by two individuals based on their roles in the provided context. The answer must be concise, factual, and directly derived from the given information.  \n\n**Step-by-Step Reasoning Approach**  \n1. **Identify the two individuals** mentioned in the context.  \n2. **Extract their roles or professions** from the context.  \n3. **Compare the roles** to find any common professions.  \n4. **Ensure the answer is concise, factual, and directly derived** from the text.  \n5. **Handle cases where**:\n   - The same profession is mentioned for multiple individuals.  \n   - Roles are overlapping or ambiguous.  \n   - The same profession is mentioned for both individuals.  \n   - The profession is not explicitly named but can be inferred from context.  \n\n**Niche and Domain-Specific Factual Information**  \n- The task involves identifying professions shared by two individuals based on their roles in the context.  \n- The assistant must extract specific roles (e.g., lawyer, politician, athlete, etc.) from the context.  \n- The answer must be precise and match exactly what is stated in the context, without adding or omitting information.  \n- The assistant must avoid generalizations and ensure the answer is based solely on the information provided in the context.  \n- The assistant must be able to distinguish between different individuals and their roles, even if they share the same profession.  \n- The assistant must be able to handle contexts where multiple individuals share the same profession or where roles are overlapping.  \n- The assistant must be able to identify and list all shared professions between two individuals, even if they are not explicitly named in the context.  \n- The assistant must be able to handle contexts where the same profession is mentioned for multiple individuals, and the answer must list all such professions.  \n- The assistant must be able to handle contexts where the same profession is mentioned for both individuals, and the answer must explicitly state that profession.  \n\n**Generalizable Strategy**  \n- Use **text analysis** to identify roles or professions mentioned for each individual.  \n- **Compare the roles** to find overlaps.  \n- **Use exact wording** from the context to ensure accuracy.  \n- **Handle ambiguous or overlapping roles** by cross-referencing the context.  \n- **Ensure the answer is concise** and directly derived from the given information."}},
{"idx": 3, "score": 0.57, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "**New Instruction**  \n\n**Task Description**  \nIdentify and list the professions shared by two individuals based on their roles in the provided context. The answer must be concise, factual, and directly derived from the given information. The assistant must:  \n\n1. **Identify the two individuals** mentioned in the context.  \n2. **Extract their roles or professions** from the context.  \n3. **Compare the roles** to find any common professions.  \n4. **List all shared professions** between the two individuals, ensuring accuracy and precision.  \n5. **Avoid generalizations** and ensure the answer is based solely on the information provided.  \n6. **Handle cases where**:  \n   - The same profession is mentioned for multiple individuals.  \n   - Roles are overlapping or ambiguous.  \n   - The same profession is mentioned for both individuals.  \n   - The professions are not explicitly named but can be inferred from context.  \n\n**Niche and Domain-Specific Factual Information**  \n- The task involves identifying professions shared by two individuals based on their roles in the context.  \n- Professions must be explicitly or implicitly mentioned in the context.  \n- The assistant must distinguish between individuals and their roles, even if they share the same profession.  \n- The answer must be **exact** and **precise**, matching exactly what is stated in the context.  \n- The assistant must be able to handle contexts with overlapping roles, multiple individuals, or ambiguous roles.  \n- The assistant must be able to identify and list all shared professions between two individuals, even if they are not explicitly named in the context.  \n- The assistant must avoid any assumptions or generalizations not supported by the text.  \n- The assistant must ensure that the answer is **concise** and **directly derived** from the context.  \n- The assistant must be able to handle contexts where one individual is mentioned multiple times (e.g., \"David Tisch\" and \"Jonathan Tisch\").  \n\n**Generalizable Strategy**  \n- Extract names and roles from the context.  \n- Compare roles to identify overlaps.  \n- Ensure the answer is based solely on the text and does not include external knowledge.  \n\n**Example**  \nIf the context states:  \n> \"John Smith is a software engineer and a founder of Tech Corp. Jane Doe is a software engineer and a project manager.\"  \nThe answer would be: **software engineer**.  \n\nIf the context states:  \n> \"John Smith is a software engineer. Jane Doe is also a software engineer.\"  \nThe answer would be: **software engineer**.  \n\nIf the context states:  \n> \"John Smith is a software engineer and a CEO. Jane Doe is a software engineer and a data analyst.\"  \nThe answer would be: **software engineer**.  \n\nThis approach ensures that the assistant can handle a wide range of input scenarios while maintaining accuracy and consistency."}},
{"idx": 4, "score": 0.6167, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "**New Instruction**  \nYour task is to identify and list the professions shared by two individuals based on their roles in the provided context. The answer must be concise, factual, and directly derived from the given information.  \n\n**Step-by-Step Reasoning Approach**  \n1. Identify the two individuals mentioned in the context.  \n2. Extract their roles or professions from the context.  \n3. Compare the roles to find any common professions.  \n4. Ensure the answer is concise, factual, and directly derived from the text.  \n\n**Niche and Domain-Specific Factual Information**  \n- The task involves identifying professions shared by two individuals based on their roles in the context.  \n- The assistant must extract specific roles (e.g., lawyer, politician, athlete, etc.) from the context.  \n- The answer must be precise and match exactly what is stated in the context, without adding or omitting information.  \n- The assistant must avoid generalizations and ensure the answer is based solely on the information provided in the context.  \n- The assistant must be able to distinguish between different individuals and their roles, even if they share the same profession.  \n- The assistant must be able to handle contexts where multiple individuals share the same profession or where roles are overlapping.  \n- The assistant must be able to identify and list all shared professions between two individuals, even if they are not explicitly named in the context.  \n- The assistant must be able to handle contexts where the same profession is mentioned for multiple individuals, and the answer must list all such professions.  \n\n**Additional Notes**  \n- The assistant must be able to handle contexts where one individual is mentioned multiple times (e.g., \"Graeme Payne\" and \"Phil O'Donnell\" both mentioned in the same context).  \n- The assistant must be able to identify and list all shared professions, even if they are not explicitly named in the context (e.g., \"athlete\" if both individuals are mentioned as athletes in the context).  \n- The assistant must ensure that the answer is based solely on the information provided in the context and does not include any external knowledge or assumptions.  \n- The assistant must be able to handle contexts where the same profession is mentioned for multiple individuals (e.g., \"lawyer\" for both individuals in the same context).  \n- The assistant must be able to handle contexts where the same profession is mentioned for multiple individuals, and the answer must list all such professions.  \n- The assistant must be able to handle contexts where one individual is mentioned once and the other is mentioned multiple times, and the answer must reflect the shared professions between them.  \n\n**Generalizable Strategy (if applicable)**  \nIf the assistant uses a generalizable strategy, it should include it in the instruction, such as:  \n- Using natural language processing to extract roles from the text.  \n- Identifying commonalities in roles using semantic analysis.  \n- Ensuring the answer is concise and directly derived from the text.  \n- Handling ambiguous or overlapping roles by cross-referencing the context."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.66)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.55)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.64)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.57)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.62)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    0 -> 3;
    0 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
