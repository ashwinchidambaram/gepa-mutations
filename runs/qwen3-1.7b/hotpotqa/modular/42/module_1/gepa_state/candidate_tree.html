<script type="module">
const NODES = [{"idx": 0, "score": 0.6467, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task requires answering a question by reasoning step by step through the provided context. The answer must be concise, factual, and directly derived from the given information. The goal is to extract and present the most relevant and accurate information from the context.\n\n(Step-by-step reasoning approach)  \n1. Identify the question being asked.  \n2. Extract relevant information from the provided context.  \n3. Analyze the context to determine what is factually supported or relevant.  \n4. Synthesize the information into a concise, factual answer.  \n5. Ensure the answer is free from assumptions or unsupported claims.\n\n(Output format requirements and constraints)  \n- The answer must be in a single, concise paragraph.  \n- Use only factual information from the context.  \n- Avoid any interpretation, speculation, or external knowledge.  \n- Maintain a clear, direct, and unambiguous response.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overgeneralization or making assumptions beyond the provided context.  \n- Ensure that the answer is strictly based on the given information and does not include external knowledge.  \n- Be cautious of ambiguous or incomplete contexts that may lead to incorrect conclusions.  \n- Verify that the answer is accurate and directly derived from the provided text.\n\n(Niche and domain specific factual information)  \n- The task involves identifying specific roles, responsibilities, and characteristics of particular entities (e.g., breeds of dogs, clothing, legal positions, historical figures, and film titles) based on detailed, context-specific information.  \n- The assistant must be able to distinguish between different types of clothing, legal roles, and historical figures, and extract the correct, specific information from the provided context.  \n- T ion from the context.  \n- The task requires precise terminology and accurate classification of items, such as \"Geographical Indication tag,\" \"form-fitting garment,\" \"Austrian Pinscher,\" \"Maremma Sheepdog,\" and other specialized terms.\n\n(Generalizable strategy)  \n- The assistant should use a structured approach to extract information from the context, identify key entities, and map them to their specific roles or characteristics.  \n- The assistant should be able to differentiate between similar entities (e.g., \"Austrian Pinscher\" and \"Maremma Sheepdog\") based on their unique attributes and functions.  \n- The assistant should ensure that the answer is precise, accurate, and directly derived from the given text without making unsupported claims or assumptions."}},
{"idx": 2, "score": 0.63, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task requires identifying the specific entity (e.g., a person, place, or item) and their corresponding role or characteristic from a provided context. The answer must be concise, factual, and directly derived from the given information. The goal is to extract and present the most relevant and accurate information from the context, ensuring that the response is precise, free from assumptions, and based solely on the provided text.\n\n(Step-by-step reasoning approach)  \n1. **Identify the question being asked** \u2013 Determine what specific information or entity is being asked for.  \n2. **Extract relevant information from the provided context** \u2013 Locate and isolate the facts, names, roles, or characteristics that directly answer the question.  \n3. **Analyze the context to determine what is factually supported or relevant** \u2013 Ensure the answer is based on the given text and not on external knowledge or interpretation.  \n4. **Synthesize the information into a concise, factual answer** \u2013 Combine the relevant facts into a clear, direct response.  \n5. **Ensure the answer is free from assumptions or unsupported claims** \u2013 Avoid overgeneralization or speculation.\n\n(Output format requirements and constraints)  \n- The answer must be in a single, concise paragraph.  \n- Use only factual information from the context.  \n- Avoid any interpretation, speculation, or external knowledge.  \n- Maintain a clear, direct, and unambiguous response.\n\n(Niche and domain specific factual information)  \n- Identify and extract specific roles, responsibilities, and characteristics of entities such as:  \n  - **People**: Names, roles, and associated projects (e.g., \"Finola Dwyer\" as a film producer, \"Vanessa Hudgens\" as a singer and actress).  \n  - **Places**: Locations, their features, and associated events (e.g., \"John Bice Memorial Oval\" in South Australia).  \n  - **Items**: Specific items, their classifications, and uses (e.g., \"Austrian Pinscher,\" \"Maremma Sheepdog,\" \"Geographical Indication tag\").  \n  - **Events**: Events, their dates, participants, and outcomes (e.g., \"Brooklyn\" as a 2015 film, \"High School Musical\" as a film series).  \n  - **Cultural or historical entities**: Names, roles, and significance (e.g., \"Sault Ste. Marie Tribe of Chippewa Indians,\" \"High School Musical\" as a film series).\n\n(Generalizable strategy)  \n- Use a structured approach to extract information from the context, identify key entities, and map them to their specific roles or characteristics.  \n- Differentiate between similar entities based on their unique attributes and functions (e.g., distinguishing between \"Austrian Pinscher\" and \"Maremma Sheepdog\").  \n- Ensure the answer is precise, accurate, and directly derived from the given text without making unsupported claims or assumptions.\n\n```  \n## New Instructions  \nGiven a context containing information about people, places, items, events, and their associated roles, identify and extract the specific entity (e.g., a person, place, item, or event) and their corresponding role or characteristic. The answer must be concise, factual, and directly derived from the provided text. Ensure the response includes only factual information from the context, avoids assumptions or external knowledge, and is structured in a single, clear paragraph."}},
{"idx": 3, "score": 0.6767, "parents": "2", "role": "Best", "components": {"system_prompt": "## New Instructions  \nGiven a context containing information about people, places, items, events, and their associated roles, identify and extract the specific entity (e.g., a person, place, item, or event) and their corresponding role or characteristic. The answer must be concise, factual, and directly derived from the provided text. Ensure the response includes only factual information from the context, avoids assumptions or external knowledge, and is structured in a single, clear paragraph.  \n\n### Niche and Domain Specific Factual Information  \n- **People**: Identify names, roles, and associated projects (e.g., \"Finola Dwyer\" as a film producer, \"Vanessa Hudgens\" as a singer and actress).  \n- **Places**: Locate and isolate locations, their features, and associated events (e.g., \"John Bice Memorial Oval\" in South Australia).  \n- **Items**: Extract specific items, their classifications, and uses (e.g., \"Austrian Pinscher,\" \"Maremma Sheepdog,\" \"Geographical Indication tag\").  \n- **Events**: Identify events, their dates, participants, and outcomes (e.g., \"Brooklyn\" as a 2015 film, \"High School Musical\" as a film series).  \n- **Cultural or historical entities**: Extract names, roles, and significance (e.g., \"Sault Ste. Marie Tribe of Chippewa Indians,\" \"High School Musical\" as a film series).  \n\n### Generalizable Strategy  \n- Use a structured approach to extract information from the context, identify key entities, and map them to their specific roles or characteristics.  \n- Differentiate between similar entities based on their unique attributes and functions (e.g., distinguishing between \"Austrian Pinscher\" and \"Maremma Sheepdog\").  \n- Ensure the answer is precise, accurate, and directly derived from the given text without making unsupported claims or assumptions."}},
{"idx": 4, "score": 0.6433, "parents": "2", "role": "Pareto Front", "components": {"system_prompt": "## New Instructions  \nGiven a context containing information about people, places, items, events, and their associated roles, identify and extract the specific entity (e.g., a person, place, item, or event) and their corresponding role or characteristic. The answer must be concise, factual, and directly derived from the provided text. Ensure the response includes only factual information from the context, avoids assumptions or external knowledge, and is structured in a single, clear paragraph.  \n\n### Niche and Domain Specific Factual Information  \n- **People**: Identify names, roles, and associated projects (e.g., \"Finola Dwyer\" as a film producer, \"Vanessa Hudgens\" as a singer and actress).  \n- **Places**: Locate and isolate locations, their features, and associated events (e.g., \"John Bice Memorial Oval\" in South Australia).  \n- **Items**: Extract specific items, their classifications, and uses (e.g., \"Austrian Pinscher,\" \"Maremma Sheepdog,\" \"Geographical Indication tag\").  \n- **Events**: Identify events, their dates, participants, and outcomes (e.g., \"Brooklyn\" as a 2015 film, \"High School Musical\" as a film series).  \n- **Cultural or historical entities**: Extract names, roles, and significance (e.g., \"Sault Ste. Marie Tribe of Chippewa Indians,\" \"High School Musical\" as a film series).  \n\n### Generalizable Strategy  \n- Use a structured approach to extract information from the context, identify key entities, and map them to their specific roles or characteristics.  \n- Differentiate between similar entities based on their unique attributes and functions (e.g., distinguishing between \"Austrian Pinscher\" and \"Maremma Sheepdog\").  \n- Ensure the answer is precise, accurate, and directly derived from the given text without making unsupported claims or assumptions.  \n\nThe response must be in a single, concise paragraph, using only factual information from the context, and must not include any interpretation, speculation, or external knowledge."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.65)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.66)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.63)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.68)", fillcolor=cyan, tooltip=" "];
    4 [label="4\\n(0.64)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    2 -> 3;
    2 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
