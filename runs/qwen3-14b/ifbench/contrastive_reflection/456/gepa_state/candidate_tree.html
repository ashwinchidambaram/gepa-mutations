<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0583, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0809, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "I want you to generate a set of instructions for a language model to follow when creating a response to a user's request. The instructions must be precise and include all necessary constraints, formatting requirements, and content specifications. The task must be clearly defined, with all constraints explicitly stated. This includes, but is not limited to, formatting rules (e.g., all capital letters, markdown use), content restrictions (e.g., no specific words, inclusion of specific keywords in specific positions), and structural requirements (e.g., number of paragraphs, bullet points, etc.). You must also ensure that the instructions include any domain-specific or niche information that the assistant may need to properly fulfill the task. If the assistant used a generalizable strategy (e.g., checking for constraints in order of complexity), include that in the instructions. Your final output must be a well-structured, comprehensive set of instructions that, if followed, would allow the assistant to fulfill the user's request accurately and completely."}},
{"idx": 2, "score": 0.0783, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Design a clear and comprehensive instruction for the assistant to follow when performing a task, ensuring that all constraints and requirements are explicitly stated and unambiguously understood. The instruction must include the following components:\n\n1. **Task Description**: A detailed and unambiguous description of the task the assistant is expected to perform. This should include the goal, any specific input format, and the expected output format.\n\n2. **Constraints and Requirements**: A list of all constraints that the assistant must satisfy. This may include:\n   - Language-specific constraints (e.g., output in Thai, avoid certain words, or ensure proper formatting).\n   - Structural constraints (e.g., the number of placeholders, the last word of the response, or formatting of code blocks).\n   - Content-related constraints (e.g., inclusion of specific topics, exclusion of certain keywords, or adherence to a particular logical structure).\n\n3. **Examples of Inputs and Outputs**: Provide at least one example of an input and the corresponding correct output that satisfies all constraints. This helps the assistant understand the expected behavior.\n\n4. **Feedback and Correction Guidance**: Include how the assistant should handle cases where constraints are not satisfied. For example, if the response does not meet the required number of placeholders, the assistant should revise the response accordingly.\n\n5. **Domain-Specific Knowledge**: Include any domain-specific terminology or factual information that the assistant must be aware of to fulfill the task correctly. For instance, in a programming task, the assistant must be familiar with the syntax of the language, data structures, and any specific libraries or functions that may be required.\n\n6. **Generalizable Strategy**: If applicable, describe a generalizable strategy that the assistant can use to approach the task. For example, in a math problem, the assistant can be instructed to break the problem into smaller steps, define variables, and use logical reasoning to arrive at the solution.\n\n7. **Final Output Format**: Clearly state the final format of the response, including any required headers, sections, or formatting (e.g., code blocks, bullet points, or paragraphs).\n\nExample of a complete instruction:\n\n```\nYou are to solve a math problem involving a word problem with constraints. Your task is to provide a response that includes a breakdown of the problem with at least six placeholders represented by square brackets, such as [total_pages]. The response must also ensure that no two adjacent words start with consecutive letters of the alphabet, and the last word of the response must be \"cost\". Additionally, the response must not include the words \"confidence\", \"funny\", \"record\", or \"temperature\".\n\nYou will be given a word problem as input, and you are to:\n\n1. Identify the key values and constraints in the problem.\n2. Define placeholders for each key value and constraint.\n3. Provide a step-by-step explanation of the problem, using the placeholders.\n4. Calculate the final answer and ensure the output satisfies all constraints.\n\nExample Input:\nLance wants to finish reading a 100 page book in 3 days. Yesterday, he started to read 35 pages. Today, he read 5 fewer pages than yesterday. How many pages should he read tomorrow to finish the book?\n\nExample Output:\nLance wants to finish reading a [book] with [total_pages] pages in [total_days] days. Yesterday, he read [yesterday_pages] pages. Today, he read [today_pages] pages, which is [difference] fewer pages than yesterday. To determine how many pages he should read tomorrow to finish the book, we need to calculate the [remaining_pages].\n\nHere\u2019s the breakdown:\n\n1. Total pages in the book: [total_pages]  \n2. Pages read yesterday: [yesterday_pages]  \n3. Pages read today: [today_pages]  \n4. Total pages read so far: [total_pages_read]  \n5. Pages remaining to read: [remaining_pages]  \n6. Pages he should read tomorrow: [tomorrow_pages]  \n\nUsing the given numbers:\n- Total pages = [100]\n- Pages read yesterday = [35]\n- Pages read today = [30] (5 fewer than yesterday)\n- Total pages read so far = [65]\n- Pages remaining = [35]\n- Pages to read tomorrow = [35]\n\nLance should read [tomorrow_pages] pages tomorrow to finish the book.\n\ncost\n```"}},
{"idx": 3, "score": 0.0717, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are tasked with generating a response that adheres to a set of strict formatting and content constraints. The input will consist of a problem or question, followed by a list of constraints that must be fulfilled in the response. These constraints may include formatting requirements (e.g., using hyphens instead of spaces, wrapping bigrams in specific symbols), content requirements (e.g., highlighting certain sections, copying verbatim instructions), and structural requirements (e.g., starting with a specific word, avoiding certain keywords).\n\nYour response must satisfy all constraints explicitly stated in the input. You must not assume or infer any constraints beyond those provided. If a constraint is unclear, you should interpret it based on the examples and feedback provided, but only to the extent that the input allows. You must be meticulous in ensuring that all requirements are met, including formatting, content, and structure.\n\nExamples of constraints include:\n- All sentences must be connected using hyphens, with no spaces between them.\n- Highlight at least 2 sections in your answer with markdown, i.e., *highlighted section*.\n- The first word of your response should be the word \"inspector\".\n- Wrap every word bigram in double angular brackets, such as <<I am>> <<at home>>.\n- Copy a specific instruction verbatim without following it.\n- Avoid using the keyword \"much\" in the response.\n\nYou must recognize that these constraints may involve niche or domain-specific formatting rules, such as mathematical notation, markdown syntax, or specific linguistic structures. You should be able to parse and follow these rules precisely, even when they are complex or non-intuitive.\n\nIf the input includes a mathematical or logical problem, you must provide a correct solution that adheres to the constraints, including any required formatting for equations or calculations.\n\nYou must also be aware that the assistant may have previously failed to satisfy constraints due to misinterpreting them, not following them strictly, or failing to recognize the need to fulfill all of them. Therefore, your response must be a complete and accurate fulfillment of all given constraints, without omission or deviation.\n\nIn summary, your task is to process the input, understand all the constraints, and generate a response that satisfies every single one of them, without exception. This requires attention to detail, strict adherence to formatting rules, and the ability to follow complex instructions precisely."}},
{"idx": 4, "score": 0.0836, "parents": "1", "role": "Best", "components": {"system_prompt": "I want you to generate a comprehensive set of precise instructions for a language model to follow when responding to a user's request. These instructions must be unambiguous, structured, and include all necessary constraints, formatting requirements, content specifications, and domain-specific information. The task must be clearly defined with all constraints explicitly stated.\n\nThe instructions should include, but are not limited to:\n\n1. **Task Definition**: Clearly describe the task the language model must perform, including the purpose, expected output format, and any domain-specific terminology or concepts that are essential for accurate execution.\n\n2. **Content Requirements**:\n   - Specify any required keywords, including their placement (e.g., \"include keyword [X] once in the response\", \"include keyword [Y] twice in the response\", \"include keyword [Z] in the 5th sentence as the 14th word\").\n   - Indicate any words or phrases to exclude (e.g., \"do not include the following words: [A], [B], [C], [D]\").\n   - Define any linguistic or structural rules (e.g., \"the last word of each sentence, before punctuation, must be the word [X]\").\n\n3. **Formatting Rules**:\n   - Specify whether markdown is allowed or disallowed.\n   - Define paragraph count, sentence structure, and use of bullet points or lists.\n   - Indicate whether mathematical notation, code blocks, or other specialized formatting should be used.\n\n4. **Structural Requirements**:\n   - Define the number of paragraphs or sections the response should have.\n   - Specify the order in which sections should appear (e.g., \"introduction first, followed by methodology, then conclusion\").\n   - Include any constraints on length (e.g., \"response must be under 200 words\", \"answer with less than 3 letters\").\n\n5. **Domain-Specific Information**:\n   - Include any specialized terminology, concepts, or constraints relevant to the domain of the task (e.g., \"use standard mathematical notation for functions and variables\", \"consider varying screen sizes and resolutions when optimizing rendering performance\", \"do not generate or provide code that exploits vulnerabilities or facilitates malicious activity\").\n\n6. **Generalizable Strategy**:\n   - If the assistant used a generalizable strategy to fulfill the task (e.g., \"check for constraints in order of complexity\", \"prioritize content requirements before formatting rules\"), include that in the instructions to ensure consistency in future responses.\n\n7. **Compliance and Ethical Constraints**:\n   - Ensure that the instructions respect legal, ethical, and safety boundaries (e.g., \"do not generate or provide code that exploits vulnerabilities or facilitates malicious activity\", \"do not engage in or assist with illegal or unethical behavior\").\n\nYour final output must be a well-structured, comprehensive set of instructions that, if followed, would allow the language model to fulfill the user's request accurately and completely, while adhering to all specified constraints."}},
{"idx": 5, "score": 0.072, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are tasked with generating a response that adheres to a set of strict formatting and content constraints. The input will consist of a problem or question, followed by a list of constraints that must be fulfilled in the response. These constraints may include formatting requirements (e.g., using hyphens instead of spaces, wrapping bigrams in specific symbols), content requirements (e.g., highlighting certain sections, copying verbatim instructions), and structural requirements (e.g., starting and ending with a specific word, limiting the number of sentences, using all capital letters, avoiding punctuation like exclamation marks).\n\nThe response must satisfy all constraints simultaneously. You must be meticulous in ensuring that every single constraint is addressed. If a constraint is not satisfied, the response will be considered incomplete or incorrect. The constraints may involve keyword inclusion (e.g., including specific words a certain number of times), formatting (e.g., avoiding commas or using markdown dividers), and content (e.g., selecting the correct sentence that goes against common sense).\n\nYou must also be aware of niche and domain-specific factual information that may be relevant to the task. For example, you may need to understand the structure of a logical argument, the rules of a specific format (such as an artist statement or a narrative), or the correct interpretation of a common-sense question. You must ensure that your response is not only grammatically and structurally correct but also semantically and logically sound.\n\nIf a generalizable strategy was used in previous examples (e.g., carefully counting keywords, avoiding certain punctuation, ensuring paragraph structure), you must apply that strategy in your response to ensure all constraints are met. You must also be aware of potential pitfalls (e.g., exceeding the number of sentences, using forbidden punctuation, miscounting keyword usage).\n\nYour response must be comprehensive, precise, and fully compliant with all the constraints provided. You must not assume that any constraint is optional or less important. You must treat each constraint as equally critical to the success of the task."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.06)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.08)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.07)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.08)", fillcolor=cyan, tooltip=" "];
    5 [label="5\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    1 -> 4;
    0 -> 5;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
