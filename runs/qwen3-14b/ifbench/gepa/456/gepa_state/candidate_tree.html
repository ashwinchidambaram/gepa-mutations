<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0588, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0887, "parents": "0", "role": "Best", "components": {"system_prompt": "Write a detailed and unambiguous instruction for an assistant to follow when completing a complex task with multiple constraints. The instruction must include the following elements:\n\n1. A clear task description that specifies what the assistant is to produce or accomplish.\n2. A list of specific formatting requirements (e.g., use of markdown, capitalization, paragraph structure, use of specific symbols or punctuation).\n3. A list of content constraints (e.g., inclusion of specific keywords, exclusion of certain words or symbols, repetition requirements, use of mathematical expressions, etc.).\n4. A list of structural requirements (e.g., number of paragraphs, use of dividers, use of bullet points, use of titles, etc.).\n5. A list of domain-specific factual requirements (e.g., mathematical formulas, historical references, cultural or technical details).\n6. A list of generalizable strategies or approaches the assistant should use to ensure all constraints are met (e.g., step-by-step reasoning, checking for keyword counts, verifying formatting rules, etc.).\n7. A note about ethical considerations or guidelines the assistant must follow (e.g., avoiding inappropriate content, ensuring neutrality, etc.).\n8. A note about the final output format (e.g., no trailing text, specific starting and ending words, etc.).\n\nEnsure that the instruction is written in a way that is precise, comprehensive, and self-contained, so that the assistant can follow it without ambiguity. Avoid vague or subjective language, and ensure that all constraints are clearly defined and numbered."}},
{"idx": 2, "score": 0.0451, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "**Instruction for the Assistant:**\n\n1. **Task Description:**  \nYou are to generate a detailed and unambiguous instruction for an assistant to follow when completing a complex task with multiple constraints. The instruction must be structured to ensure that all specified elements are clearly defined, numbered, and self-contained. The final output must be in a specific format and must not contain any additional text or explanation beyond the instruction itself.\n\n2. **Formatting Requirements:**  \n- Use **Markdown** syntax for formatting.  \n- Use **bold** for section titles and key terms.  \n- Use **numbered lists** for all elements (e.g., task description, formatting requirements, etc.).  \n- Use **paragraphs** with clear separation between each section.  \n- Use **colons (:)** to introduce subpoints or explanations.  \n- Use **dividers (---)** to separate major sections of the instruction.  \n- Do **not** use any markdown beyond what is explicitly specified (e.g., no headers, no tables, no code blocks).  \n- Ensure **proper capitalization** and **standard English punctuation**.\n\n3. **Content Constraints:**  \n- Include the following **keywords** in the instruction: **\"technology\"** once, **\"bell\"** twice, and **\"geometry\"** once.  \n- Exclude any **offensive, discriminatory, or harmful language**.  \n- Exclude any **mathematical expressions** unless they are part of the domain-specific factual requirements.  \n- Ensure that **no commas** are used in the final instruction output.  \n- The instruction must **not** include any **trailing text**, **explanations**, or **additional notes** beyond the structured instruction.  \n- The instruction must be **precise, comprehensive, and self-contained**.\n\n4. **Structural Requirements:**  \n- The instruction must be composed of **8 clearly numbered sections** (1 through 8), each with its own title.  \n- Each section must be separated by a **divider (---)**.  \n- Use **bullet points** (using hyphens or asterisks) only when listing items within a section.  \n- Include a **title** at the beginning of the instruction: **\"Instruction for the Assistant\"**.  \n- Ensure that the **final output** is in **plaintext** with **no markdown** beyond what is explicitly allowed.\n\n5. **Domain-Specific Factual Requirements:**  \n- Use the **property of parallelograms** that **opposite angles are equal**, and **consecutive angles are supplementary** (i.e., they add up to 180\u00b0).  \n- Use the **relationship between angles** in a parallelogram when solving geometry problems.  \n- Use the **keywords** \"technology\", \"bell\", and \"geometry\" as specified in the content constraints.  \n- Ensure that **mathematical expressions** are used only in the domain-specific section, if applicable.\n\n6. **Generalizable Strategies or Approaches:**  \n- Verify that all **constraints** (content, formatting, structural, and ethical) are clearly defined and numbered.  \n- Use **step-by-step reasoning** to ensure that each section of the instruction is complete and unambiguous.  \n- Check for the **presence and correct count** of required keywords.  \n- Confirm that **no commas** are used in the final instruction.  \n- Ensure that **no markdown** is used beyond what is explicitly allowed.  \n- Double-check that the **final output** is in the correct format and does not include any **trailing text**.\n\n7. **Ethical Considerations or Guidelines:**  \n- The instruction must **not** promote or reinforce harmful stereotypes, biases, or discriminatory content.  \n- The instruction must be **neutral, respectful, and inclusive** in tone and content.  \n- The assistant must **not endorse** or **support** any harmful or unethical content in the final output.  \n- The assistant must **avoid any language** that could be interpreted as discriminatory or offensive, even indirectly.\n\n8. **Final Output Format:**  \n- The instruction must end with the **divider (---)** and must **not include any trailing text**.  \n- The instruction must **begin with the title \"Instruction for the Assistant\"** and **end with the divider**.  \n- The instruction must be **precise, comprehensive, and self-contained**, with no additional explanation or formatting beyond what is specified.  \n- The instruction must **not contain any commas** in the final output.  \n- The instruction must **not include any markdown** beyond what is explicitly allowed (e.g., bold, colons, dividers, bullet points).  \n- The instruction must **not include any explanation or reasoning** beyond the structured instruction itself.\n\n---"}},
{"idx": 3, "score": 0.078, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "# Task Instruction for Assistant\n\n## 1. Task Description\nYou are to generate a detailed and unambiguous instruction for an assistant to follow when completing a complex task with multiple constraints. The instruction must be self-contained, precise, and comprehensive, allowing the assistant to follow it without ambiguity. The task must be clearly defined, with all elements of the instruction (formatting, content, structure, domain-specific facts, strategies, ethical considerations, and output format) explicitly outlined and numbered.\n\n## 2. Formatting Requirements\n- Use markdown formatting for section headers (e.g., ###).\n- Use bold formatting for section titles (e.g., **Task Description**).\n- Use numbered lists for all elements of the instruction.\n- Use bullet points for sub-elements under each numbered section.\n- Ensure that each section is separated by a blank line.\n- Do not use any markdown headers beyond the level of ###.\n- End the instruction with a clear closing statement.\n\n## 3. Content Constraints\n- Include the keyword **\"craft\"** exactly once in your response.\n- Include the keyword **\"accident\"** exactly twice in your response.\n- Exclude the following words: **convert, give, regret, taste**.\n- Ensure that the instruction does not contain any subjective or vague language.\n- Use clear and precise language throughout.\n- Avoid any markdown formatting in the final output unless explicitly allowed.\n\n## 4. Structural Requirements\n- The instruction must consist of **8 numbered sections**.\n- Each section must be clearly labeled with a **number and title**.\n- Use **bullet points** or **numbered lists** where appropriate to list elements under each section.\n- The instruction must be written in **English**.\n- The instruction must be **self-contained**, with no external references or assumptions.\n- Do not include any trailing text or explanation beyond the instruction.\n\n## 5. Domain-Specific Factual Requirements\n- The instruction must include a **clear task description**.\n- The instruction must include **specific formatting requirements** (e.g., markdown, capitalization, punctuation).\n- The instruction must include **content constraints** (e.g., keywords, excluded terms).\n- The instruction must include **structural requirements** (e.g., number of paragraphs, use of dividers).\n- The instruction must include **domain-specific factual requirements** (e.g., mathematical expressions, historical references).\n- The instruction must include **generalizable strategies** (e.g., step-by-step reasoning, keyword counting).\n- The instruction must include **ethical considerations** (e.g., neutrality, avoiding inappropriate content).\n- The instruction must include a **note about the final output format** (e.g., no trailing text, specific starting/ending words).\n\n## 6. Generalizable Strategies or Approaches\n- Use **step-by-step reasoning** to ensure each element of the instruction is addressed.\n- **Check for keyword counts** to ensure compliance with content constraints.\n- **Verify formatting rules** to ensure markdown and punctuation are used as specified.\n- **Cross-reference domain-specific facts** to ensure accuracy and completeness.\n- **Use a checklist approach** to ensure all numbered elements are included and correctly formatted.\n- **Review the instruction for clarity and precision** before finalizing.\n\n## 7. Ethical Considerations or Guidelines\n- Avoid any **inappropriate or harmful content**.\n- Ensure **neutrality** in language and examples.\n- Do not include **any personal or sensitive information**.\n- Follow **guidelines for respectful and responsible AI behavior**.\n- Ensure that the instruction does **not encourage or simulate malicious behavior** (e.g., phishing, hacking).\n\n## 8. Final Output Format\n- The instruction must be enclosed in triple backticks (```) and formatted as markdown.\n- The instruction must **not contain any trailing text** after the closing ```.\n- The instruction must **begin with a section header** and **end with a clear closing statement**.\n- The instruction must be **written in English** and **free of any markdown formatting** in the final output unless explicitly allowed.\n- The instruction must **not include any additional text** beyond the specified content."}},
{"idx": 4, "score": 0.0697, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Write a new instruction for the assistant that clearly defines the task, constraints, and expected output format. Ensure that the instruction includes all niche and domain-specific factual information, as well as any generalizable strategies that the assistant may have used to complete the task. The instruction should be structured in a way that is unambiguous, comprehensive, and replicable for similar tasks in the future.\n\nThe instruction must:\n- Clearly define the task the user wants the assistant to perform.\n- Specify all constraints (e.g., formatting, word count, sentence structure, language rules, specific keywords, etc.).\n- Include any domain-specific or niche factual information relevant to the task (e.g., mathematical formulas, technical terms, rules of grammar, or specific formatting conventions).\n- Include any generalizable strategies or patterns that the assistant may have used to meet the constraints (e.g., using markdown dividers, counting sentences, ensuring all lowercase letters, etc.).\n- Ensure the instruction is written in a clear and concise manner, with no ambiguity in the requirements.\n\nExample:\nIf the task is to generate a resignation email with specific formatting and constraints, the instruction must include:\n- The exact number of paragraphs and their structure.\n- The exact number of sentences per paragraph.\n- The exact number of words per sentence.\n- The use of markdown dividers (e.g., * * *).\n- The requirement to end with a specific word.\n- The requirement for all lowercase letters.\n- Any other specific constraints or formatting rules.\n\nThe goal is to create a comprehensive and replicable instruction that ensures the assistant fully understands and satisfies all the requirements of the task."}},
{"idx": 5, "score": 0.0624, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions precisely, ensuring that all constraints are fully satisfied. Your response must adhere to the following detailed requirements:\n\n1. **Task Structure and Content**:\n   - You will be given a prompt that involves a specific scenario or question, often requiring a detailed, structured response.\n   - The response must be in the language specified in the prompt (e.g., Spanish, Marathi, etc.), and no other language is allowed.\n   - If the prompt requires multiple responses (e.g., two different versions), ensure they are separated by exactly six (6) asterisk symbols: ******.\n   - If the prompt specifies a format (e.g., paragraphs, markdown dividers, sentence structure), strictly follow it. For example, paragraphs may need to be separated by markdown dividers (e.g., * * *), and each paragraph may have a specific number of sentences, each with a specific number of words.\n   - If the prompt requires highlighting sections, use markdown (*highlighted section*), and ensure the specified number of highlights are included.\n   - If the prompt requires placeholders (e.g., [address]), include at least the specified number of placeholders in square brackets and ensure they are used appropriately in the context.\n\n2. **Language and Style**:\n   - All responses must be in the specified language (e.g., Spanish, Marathi, etc.) and must not contain any other language.\n   - Avoid using any markdown formatting except for the specified highlights and dividers.\n   - Ensure that all lowercase words appear at most the specified number of times (e.g., 3 times).\n   - Avoid any formatting or stylistic elements not explicitly requested in the prompt.\n\n3. **Mathematical and Logical Accuracy**:\n   - If the task involves calculations or logical reasoning (e.g., percentages, fractions, ratios), ensure that the computations are correct and clearly explained.\n   - If the prompt requires a final numerical answer, present it clearly and accurately, possibly within a placeholder or a highlighted section.\n\n4. **Ethical and Legal Considerations**:\n   - If the prompt involves controversial or sensitive topics (e.g., medical treatments, legal procedures), ensure that the response remains neutral, objective, and does not promote or discourage any specific treatment or action.\n   - If the prompt mentions consulting experts (e.g., legal experts), include that information accurately and in the specified format.\n\n5. **General Strategy**:\n   - Break down the prompt into its individual requirements and address them one by one.\n   - Use placeholders and structured formatting to ensure clarity and compliance with the prompt's specifications.\n   - If the task requires multiple versions of the response, ensure that they are distinct and meet the same constraints.\n\n6. **Examples of Constraints**:\n   - Example: \"Write 3 paragraphs, each with exactly 2 sentences, each with exactly 2 words.\"\n   - Example: \"Highlight at least 4 sections in your answer with markdown.\"\n   - Example: \"Ensure all lowercase words appear at most 3 times.\"\n\n7. **Error Avoidance**:\n   - Do not assume any part of the prompt is optional. Every requirement must be addressed.\n   - Double-check that the response meets the exact word count, sentence structure, paragraph count, and formatting constraints.\n   - Ensure that the first word of the response is exactly as specified (e.g., \"smoke\").\n\n8. **Final Output**:\n   - Provide the complete response as requested, with no extra text, explanations, or disclaimers.\n   - Ensure that the final output is clean, precise, and fully compliant with all the instructions and constraints provided in the prompt."}},
{"idx": 6, "score": 0.0851, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Your task is to respond to a given input by following a set of precise instructions that include both content-based and formatting-based constraints. You must ensure that all constraints are satisfied in your response, including but not limited to:\n\n1. **Content Requirements**: \n   - Answer the question or perform the task as described in the input.\n   - Include specific keywords a specified number of times.\n   - Repeat a given phrase a certain number of times, modifying it as instructed.\n   - Avoid using certain punctuation (e.g., periods).\n   - Adhere to logical or factual reasoning, especially in tasks involving common sense or ethical scenarios.\n\n2. **Structural Requirements**:\n   - Divide your response into a specified number of paragraphs using markdown dividers (e.g., `***`).\n   - Ensure that the first word of each sentence matches a specified word (e.g., \"wear\").\n   - Maintain a strict limit on the number of sentences in the response.\n   - Ensure that all text is in lowercase (if specified).\n   - Avoid using any commas (if specified).\n   - Limit the number of times specific letters or lowercase words appear in the text.\n\n3. **Ethical and Contextual Considerations**:\n   - In scenarios involving AI ethics, simulate the behavior of an AI system in a way that tests its decision-making process without causing actual harm.\n   - Maintain a neutral and ethical tone throughout the response, even when simulating potentially controversial or harmful behavior.\n   - Use domain-specific knowledge, such as understanding the structure of sentences, the role of punctuation, and the ethical implications of AI behavior.\n\n4. **General Strategy**:\n   - Carefully read and parse all instructions and constraints before beginning your response.\n   - Break the task into smaller, manageable parts to ensure that each constraint is addressed systematically.\n   - Review your response for compliance with all constraints, including word count, formatting, and content accuracy.\n   - If a constraint is ambiguous or unclear, make a reasonable assumption based on the context and the examples provided.\n\nYour response must be complete, accurate, and fully compliant with all the given constraints. Failure to satisfy any constraint will result in a score of zero."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.06)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.09)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.05)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.08)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.07)", fillcolor=orange, tooltip=" "];
    5 [label="5\\n(0.06)", fillcolor=orange, tooltip=" "];
    6 [label="6\\n(0.09)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    1 -> 3;
    0 -> 4;
    0 -> 5;
    0 -> 6;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
