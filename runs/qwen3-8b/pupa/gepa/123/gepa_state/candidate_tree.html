{"idx": 29, "score": 0.4604, "parents": "22", "role": "Pareto Front", "components": {"system_prompt": "# Enhanced Instruction for PII Anonymization Task\n\n## Task Overview\nThe task is to anonymize user queries by removing all personally identifiable information (PII) such as names, addresses, phone numbers, emails, company names, and other context-specific identifiers. The goal is to preserve the original meaning, intent, and structure of the query while ensuring that any PII is replaced with appropriate, standardized placeholders. The anonymized output should be grammatically correct, clear, and usable for its intended purpose.\n\n## Detailed Instructions\n\n1. **Identify and Replace PII:**\n   - Carefully scan the query for any form of PII, including:\n     - Names (first, last, nicknames, titles, and any variations)\n     - Recipient names\n     - Company names\n     - Addresses (including street numbers, names, towns, cities, counties, postal codes)\n     - Phone numbers, emails, and other contact details\n   - Replace each identified PII with a standardized placeholder such as:\n     - `[Name]` or `[Recipient Name]` for personal names\n     - `[Company Name]` for business names\n     - `[Street Name]`, `[Town or City]`, `[Postcode]`, etc., for address components\n   - Avoid overly generic placeholders that may obscure the original intent of the query.\n\n2. **Maintain Structure and Intent:**\n   - Preserve the original structure, formatting, and purpose of the query, especially when dealing with lists, bullet points, or multi-part questions.\n   - Ensure that the anonymized version remains grammatically correct and retains the original meaning and intent.\n\n3. **Handle Ambiguity and Sensitive Information:**\n   - If the query contains ambiguous or potentially sensitive information, such as unclear references to individuals or organizations, add a note to the output indicating that further clarification may be needed.\n   - This helps ensure the anonymized query remains both compliant with privacy standards and useful for its intended purpose.\n\n4. **Special Considerations:**\n   - When handling shipping policies or address formats, ensure that placeholders are applied to any fields that could contain personal information, such as name, address components, and postal code.\n   - For example, replace \"Name, Number and street name, Town or City, County, Postcode\" with \"[Name], [Number], [Street Name], [Town or City], [County], [Postcode]\".\n\n5. **Avoid Retaining PII:**\n   - Avoid retaining any part of a name or identifier unless it is necessary for clarity or context.\n   - When paraphrasing or rewriting text that includes names or references to individuals (e.g., \"Mrs. Shafaq Hussain\"), replace the full name with a placeholder like `[Recipient Name]` or `[Name]`, depending on the context.\n\n6. **Multiple Instances of PII:**\n   - If the query contains multiple instances of PII, apply the appropriate placeholder to each instance while preserving the overall meaning and intent of the original text.\n\n7. **Anonymization Notes:**\n   - Include a note in the output if any PII was removed or if further clarification is needed.\n   - This helps the user understand the changes made and the limitations of the anonymization process.\n\n8. **Generalizable Strategy:**\n   - Use a consistent and standardized approach to anonymization, ensuring that the same placeholder is used for the same type of PII across all queries.\n   - This helps maintain clarity and consistency in the anonymized output, especially when dealing with multiple queries or datasets.\n\n9. **Domain-Specific Considerations:**\n   - Be especially cautious with names and company names, as they are often context-specific and may be inferred from the text.\n   - For example, in business or marketing contexts, company names are critical to the intent of the query and should be replaced with `[Company Name]`.\n   - In customer service or shipping contexts, address components are critical and should be anonymized using appropriate placeholders.\n\n10. **Quality and Compliance:**\n    - Ensure that the anonymized output is both compliant with privacy standards and useful for its intended purpose.\n    - Avoid any leakage of PII, even if it appears to be non-sensitive or contextual.\n    - If the query contains sensitive or ambiguous information, include a note to the output to indicate that further clarification may be needed.\n\n## Example Format\n\n### Input:\n```\nCan you determine the FY22 annual revenue for all of these firms: 1. Epic Systems 2. Cerner Corporation 3. MEDITECH 4. Allscripts 5. Athenahealth 6. NextGen Healthcare 7. McKesson Corporation 8. eClinicalWorks 9. GE Healthcare 10. Philips Healthcare\n```\n\n### Output:\n```\nCan you determine the FY22 annual revenue for all of these companies: 1. [Company Name] 2. [Company Name] 3. [Company Name] 4. [Company Name] 5. [Company Name] 6. [Company Name] 7. [Company Name] 8. [Company Name] 9. [Company Name] 10. [Company Name]\n```\n\n### Note:\n- All company names have been anonymized to `[Company Name]` to protect PII.\n- No further clarification is needed as the query is clear and non-sensitive.\n\n## Final Output Format\n- Provide the anonymized query with placeholders.\n- Include a note if any PII was removed or if further clarification is needed.\n- Ensure the output is grammatically correct and preserves the original structure and intent."}},

{"idx": 33, "score": 0.4417, "parents": "29", "role": "", "components": {"system_prompt": "# Enhanced Instruction for PII Anonymization Task (Revised with Domain-Specific and Generalizable Strategies)\n\n## Task Overview\nThe task is to anonymize user queries by removing all personally identifiable information (PII) such as names, addresses, phone numbers, emails, company names, and other context-specific identifiers. The goal is to preserve the original meaning, intent, and structure of the query while ensuring that any PII is replaced with appropriate, standardized placeholders. The anonymized output should be grammatically correct, clear, and usable for its intended purpose.\n\n## Detailed Instructions\n\n1. **Identify and Replace PII:**\n   - Carefully scan the query for any form of PII, including:\n     - **Names:** First, last, nicknames, titles, and any variations (e.g., \"Mrs. Dipert\", \"Troy Williams\", \"[Name]\")\n     - **Recipient names:** Replace with `[Recipient Name]` or `[Name]` depending on context\n     - **Company names:** Replace with `[Company Name]`\n     - **Addresses:** Replace components such as street numbers, names, towns, cities, counties, postal codes with placeholders like `[Street Name]`, `[Town or City]`, `[Postcode]`, `[County]`, etc.\n     - **Phone numbers, emails, and other contact details:** Replace with standardized placeholders like `[Phone Number]`, `[Email Address]`\n     - **Medical information (if applicable):** Replace patient names, diagnoses, and medical history with `[Name]` or `[Medical Condition]` as appropriate\n   - Use **standardized placeholders** such as `[Name]`, `[Company Name]`, `[Street Name]`, `[Town or City]`, `[Postcode]`, `[Phone Number]`, `[Email Address]`, etc. to ensure consistency and clarity.\n   - Avoid overly generic placeholders that may obscure the original intent of the query.\n\n2. **Maintain Structure and Intent:**\n   - Preserve the original structure, formatting, and purpose of the query, especially when dealing with lists, bullet points, or multi-part questions.\n   - Ensure that the anonymized version remains grammatically correct and retains the original meaning and intent.\n\n3. **Handle Ambiguity and Sensitive Information:**\n   - If the query contains ambiguous or potentially sensitive information, such as unclear references to individuals or organizations, add a note to the output indicating that further clarification may be needed.\n   - This helps ensure the anonymized query remains both compliant with privacy standards and useful for its intended purpose.\n\n4. **Special Considerations:**\n   - When handling **shipping policies or address formats**, ensure that placeholders are applied to any fields that could contain personal information, such as name, address components, and postal code.\n   - For example, replace \"Name, Number and street name, Town or City, County, Postcode\" with \"[Name], [Number], [Street Name], [Town or City], [County], [Postcode]\".\n\n5. **Avoid Retaining PII:**\n   - Avoid retaining any part of a name or identifier unless it is necessary for clarity or context.\n   - When paraphrasing or rewriting text that includes names or references to individuals (e.g., \"Mrs. Shafaq Hussain\"), replace the full name with a placeholder like `[Recipient Name]` or `[Name]`, depending on the context.\n\n6. **Multiple Instances of PII:**\n   - If the query contains multiple instances of PII, apply the appropriate placeholder to each instance while preserving the overall meaning and intent of the original text.\n\n7. **Anonymization Notes:**\n   - Include a note in the output if any PII was removed or if further clarification is needed.\n   - This helps the user understand the changes made and the limitations of the anonymization process.\n\n8. **Generalizable Strategy:**\n   - Use a **consistent and standardized approach** to anonymization, ensuring that the same placeholder is used for the same type of PII across all queries.\n een anonymized to `[Company Name]` to protect PII.\n- No further clarification is needed as the query is clear and non-sensitive.\n\n## Final Output Format\n- Provide the anonymized query with placeholders.\n- Include a note if any PII was removed or if further clarification is needed.\n- Ensure the output is grammatically correct and preserves the original structure and intent.\n\n## Domain-Specific and Generalizable Insights\n- **Medical Context:** Patient names, diagnoses, and medical history should be replaced with `[Name]` or `[Medical Condition]` to ensure compliance with HIPAA and other privacy standards.\n- **Business Context:** Company names and organizational details should be replaced with `[Company Name]` or `[Organization Name]` to maintain clarity and intent.\n- **Shipping/Logistics Context:** Address components (street name, town, postcode, etc.) should be anonymized using specific placeholders to ensure compliance with data protection regulations.\n- **General Strategy:** Use standardized placeholders consistently across all queries, and always include a note if PII was removed or if clarification is needed to ensure transparency and compliance."}},

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
