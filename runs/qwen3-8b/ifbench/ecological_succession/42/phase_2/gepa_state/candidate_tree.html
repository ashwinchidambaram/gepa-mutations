<style>

  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }

<body>
<div id="header">

  <div class="legend">

<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0675, "parents": "seed", "role": "Seed", "components": {"system_prompt": "# Task Instruction for the Assistant\n\n## Task Description\nYou are to write a Python function that extracts and counts the number of unique email domains from a list of email addresses. The function should be efficient and handle valid email addresses in lowercase. Additionally, the response must include at least two sections highlighted using markdown syntax, such as `*highlighted section*`.\n\n## Input Format\n- Input: A list of email addresses (strings). For example, `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`.\n\n## Output Format\n- Output: An integer representing the number of unique email domains in the list.\n\n## Example\nFor the input `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`, the output should be `3` because there are three unique domains: `gmail.com`, `yahoo.com`, and `outlook.com`.\n\n## Constraints\n1. Highlight at least 2 sections in your answer with markdown, i.e., `*highlighted section*`.\n2. The function must be well-documented with a clear description of its purpose, parameters, and return value.\n3. Use a generalizable strategy such as using a `set` to store unique domains, which automatically handles duplicates.\n4. Ensure the function is efficient and straightforward for analyzing customer data in digital advertising campaigns, especially when targeting specific regions like Asia.\n\n## Additional Notes\n- Assume all email addresses are valid and in lowercase.\n- Include a clear explanation of how the function works and why the chosen strategy is effective."}},
{"idx": 1, "score": 0.0737, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "# Task Instruction for the Assistant\n\n## Task Description\nYou are to write a Python function that extracts and counts the number of unique email domains from a list of email addresses. The function should be efficient, handle valid email addresses in lowercase, and return an integer representing the number of unique domains. Additionally, the function must be well-documented and use a generalizable strategy such as using a `set` to store unique domains, which automatically handles duplicates. The function should be efficient and straightforward for analyzing customer data in digital advertising campaigns, especially when targeting specific regions like Asia.\n\n## Input Format\n- Input: A list of email addresses (strings). For example, `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`.\n\n## Output Format\n- Output: An integer representing the number of unique email domains in the list.\n\n## Example\nFor the input `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`, the output should be `3` because there are three unique domains: `gmail.com`, `yahoo.com`, and `outlook.com`.\n\n## Constraints\n1. The function must be well-documented with a clear description of its purpose, parameters, and return value.\n2. Highlight at least 2 sections in your answer using markdown, i.e., `*highlighted section*`.\n3. The function should be efficient and use a generalizable strategy such as using a `set` to store unique domains.\n4. Ensure the function is efficient and straightforward for analyzing customer data in digital advertising campaigns, especially when targeting specific regions like Asia.\n\n## Additional Notes\n- Assume all email addresses are valid and in lowercase.\n- Include a clear explanation of how the function works and why the chosen strategy is effective.\n- The function should be able to handle large datasets typical in digital advertising analytics.\n- The use of `set` is a niche and domain-specific strategy for efficiently removing duplicates in such scenarios."}},
{"idx": 2, "score": 0.0742, "parents": "1", "role": "Best", "components": {"system_prompt": "# Task Instruction for the Assistant\n\n## Task Description\nYou are to write a Python function that extracts and counts the number of unique email domains from a list of email addresses. The function should be efficient, handle valid email addresses in lowercase, and return an integer representing the number of unique domains. Additionally, the function must be well-documented and use a generalizable strategy such as using a `set` to store unique domains, which automatically handles duplicates. The function should be efficient and straightforward for analyzing customer data in digital advertising campaigns, especially when targeting specific regions like Asia.\n\n## Input Format\n- Input: A list of email addresses (strings). For example, `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`.\n\n## Output Format\n- Output: An integer representing the number of unique email domains in the list.\n\n## Example\nFor the input `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`, the output should be `3` because there are three unique domains: `gmail.com`, `yahoo.com`, and `outlook.com`.\n\n## Constraints\n1. The function must be well-documented with a clear description of its purpose, parameters, and return value.\n2. Highlight at least 2 sections in your answer using markdown, i.e., `*highlighted section*`.\n3. The function should be efficient and use a generalizable strategy such as using a `set` to store unique domains.\n4. Ensure the function is efficient and straightforward for analyzing customer data in digital advertising campaigns, especially when targeting specific regions like Asia.\n\n## Additional Notes\n- Assume all email addresses are valid and in lowercase.\n- Include a clear explanation of how the function works and why the chosen strategy is effective.\n- The function should be able to handle large datasets typical in digital advertising analytics.\n- The use of `set` is a niche and domain-specific strategy for efficiently removing duplicates in such scenarios.\n- *highlighted section* The function should split each email address at the `@` symbol to extract the domain part.\n- *highlighted section* The function should return the length of the `set` containing the unique domains, which ensures O(1) average time complexity for insertions and lookups."}},
{"idx": 3, "score": 0.0736, "parents": "2", "role": "Pareto Front", "components": {"system_prompt": "# Task Instruction for the Assistant\n\n## Task Description\nYou are to write a Python function that extracts and counts the number of unique email domains from a list of email addresses. The function should be efficient, handle valid email addresses in lowercase, and return an integer representing the number of unique domains. Additionally, the function must be well-documented and use a generalizable strategy such as using a `set` to store unique domains, which automatically handles duplicates. The function should be efficient and straightforward for analyzing customer data in digital advertising campaigns, especially when targeting specific regions like Asia.\n\n## Input Format\n- Input: A list of email addresses (strings). For example, `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`.\n\n## Output Format\n- Output: An integer representing the number of unique email domains in the list.\n\n## Example\nFor the input `['user1@gmail.com', 'user2@yahoo.com', 'user3@gmail.com', 'user4@outlook.com']`, the output should be `3` because there are three unique domains: `gmail.com`, `yahoo.com`, and `outlook.com`.\n\n## Constraints\n1. The function must be well-documented with a clear description of its purpose, parameters, and return value.\n2. Highlight at least 2 sections in your answer using markdown, i.e., `*highlighted section*`.\n3. The function should be efficient and use a generalizable strategy such as using a `set` to store unique domains.\n4. Ensure the function is efficient and straightforward for analyzing customer data in digital advertising campaigns, especially when targeting specific regions like Asia.\n\n## Additional Notes\n- Assume all email addresses are valid and in lowercase.\n- Include a clear explanation of how the function works and why the chosen strategy is effective.\n- The function should be able to handle large datasets typical in digital advertising analytics.\n- The use of `set` is a niche and domain-specific strategy for efficiently removing duplicates in such scenarios.\n- *highlighted section* The function should split each email address at the `@` symbol to extract the domain part.\n- *highlighted section* The function should return the length of the `set` containing the unique domains, which ensures O(1) average time complexity for insertions and lookups.\n\n## Niche and Domain-Specific Information\n- In digital advertising campaigns, especially in regions like Asia, analyzing customer data through email domains can provide insights into regional preferences and behavior.\n- The use of `set` in Python is a common and efficient approach for deduplication, which is crucial for large-scale data processing.\n- The function's efficiency is essential for real-time analytics and decision-making in advertising platforms.\n- The strategy of splitting on the `@` symbol is standard in email parsing and is widely used in data processing pipelines.\n\n## Generalizable Strategy\n- The approach of using a `set` to store unique domains is generalizable and can be applied to other data processing tasks that require deduplication.\n- The function's design ensures clarity, maintainability, and performance, which are critical in data-driven environments like digital marketing."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.07)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.07)", fillcolor=cyan, tooltip=" "];
    3 [label="3\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    2 -> 3;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
