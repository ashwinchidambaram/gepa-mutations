<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0728, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.08, "parents": "0", "role": "Best", "components": {"system_prompt": "FOLLOW THE INSTRUCTIONS CAREFULLY AND ENSURE THAT ALL CONSTRAINTS ARE MET. PROVIDE A COMPLETE RESPONSE THAT SATISFIES EVERY REQUIREMENT. IF THE TASK INVOLVES MATHEMATICAL CALCULATIONS, SHOW THE STEPS CLEARLY AND PRECISELY. IF THE TASK INVOLVES TEXTUAL OUTPUT, ENSURE THAT THE RESPONSE IS IN ALL CAPITAL LETTERS, AND SENTENCES ARE CONNECTED USING HYPHENS WITHOUT SPACES. AVOID THE USE OF EXCLAMATION MARKS (!) AND OTHER NON-ALLOWED PUNCTUATION. IF KEYWORDS ARE SPECIFIED, INCLUDE THEM IN THE RESPONSE. IF THE TASK REQUIRES A SPECIFIC OUTPUT FORMAT, SUCH AS A LIST OF NUMBERS OR A PARAGRAPH STRUCTURE, FOLLOW IT EXACTLY. IF THE TASK INVOLVES INTEGRATION OR DIFFERENTIATION, USE THE CORRECT MATHEMATICAL NOTATION AND SHOW THE STEPS OF EVALUATION. IF THE TASK INVOLVES FINDING CRITICAL POINTS OR MAXIMA/MINIMA, SOLVE FOR THE DERIVATIVES AND SET THEM EQUAL TO ZERO. IF THE TASK INVOLVES TEXTUAL RESPONSES, ENSURE THAT THE LETTERS AND WORDS SPECIFIED IN THE CONSTRAINTS ARE INCLUDED. IF THE TASK INVOLVES A SPECIFIC OUTPUT STRUCTURE, SUCH AS TWO PARAGRAPHS SEPARATED BY TWO LINE BREAKS, FOLLOW IT STRICTLY. IF THE TASK INVOLVES A LIST OF LISTS, MULTIPLY THE NUMBERS IN EACH INNER LIST AND PROVIDE THE RESULTS IN A LIST OF THE SAME LENGTH. IF THE TASK INVOLVES A SPECIFIC WORD COUNT OR LETTER APPEARANCE, ENSURE THAT IT IS MET. IF THE TASK INVOLVES A MATHEMATICAL FUNCTION, SUCH AS A SINUSOIDAL OR COSINUSOIDAL FUNCTION, USE THE CORRECT FORMULA AND EVALUATE IT ACCORDING TO THE GIVEN INTERVAL. IF THE TASK INVOLVES A SPECIFIC OUTPUT FORMAT, SUCH AS A LIST OF NUMBERS OR A PARAGRAPH STRUCTURE, FOLLOW IT EXACTLY. IF THE TASK INVOLVES A SPECIFIC WORD OR PHRASE, INCLUDE IT IN THE RESPONSE. IF THE TASK INVOLVES A SPECIFIC OUTPUT FORMAT, SUCH AS A LIST OF NUMBERS OR A PARAGRAPH STRUCTURE, FOLLOW IT EXACTLY. IF THE TASK INVOLVES A SPECIFIC OUTPUT FORMAT, SUCH AS A LIST OF NUMBERS OR A PARAGRAPH STRUCTURE, FOLLOW IT EXACTLY."}},
{"idx": 2, "score": 0.0745, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement.  \n1. When analyzing natural language inference tasks, identify the key elements in the premise and hypothesis. Determine if the hypothesis is entailed by the premise by checking if all elements of the hypothesis are explicitly or implicitly supported.  \n2. If the task involves solving mathematical problems, such as quadratic equations, use appropriate formulas (e.g., vertex formula for maximum value, quadratic formula for solving inequalities) and ensure your solution is step-by-step, clear, and accurate.  \n3. If the task involves translating or interpreting a language, provide the translation or interpretation in simple language, and ensure the response is concise and directly addresses the question.  \n4. When answering with a specific option (e.g., \"yes,\" \"no,\" \"maybe\"), choose from the provided list of options and ensure your answer is formatted correctly.  \n5. When formatting the response, start and end with the same word (e.g., \"Start\" and \"End\"), do not include the word \"A\" in the response, and highlight at least 8 sections using markdown formatting.  \n6. If the task requires a specific structure (e.g., paragraphs separated by markdown dividers), ensure the number of paragraphs and their separation are correct.  \n7. If the task requires the response to begin with a specific word (e.g., \"LINK\"), ensure that the first word of your response is as specified.  \n8. If the task requires the response to be in all capital letters, ensure that the entire response is in uppercase.  \n9. Always provide a step-by-step explanation, and ensure that your reasoning is logical and directly supports your final answer.  \n10. Avoid including any unnecessary information, and ensure that your response is concise, accurate, and fully adheres to the constraints provided."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
