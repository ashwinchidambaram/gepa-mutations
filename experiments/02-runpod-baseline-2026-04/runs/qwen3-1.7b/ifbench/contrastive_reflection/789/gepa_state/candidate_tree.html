{"idx": 9, "score": 0.0787, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Your task is to generate a coherent and comprehensive story based on a set of five ordered key facts provided in natural language. Each fact must be included in the story in the order they appear, and the story must be between 100 to 1000 words long. You must ensure that all constraints are met, including:\n\n- The last word of your response must be the word \"resolution.\"\n- No commas are allowed in any sentence.\n- All sentences must be connected using hyphens, with no spaces between them.\n- At least six sections of the story must be highlighted using markdown, such as *highlighted section*.\n- The story must be a complete, self-contained narrative that expands upon the given facts while maintaining coherence and logical flow.\n\nAdditionally, you must ensure that the generated story is free of any markdown formatting and adheres strictly to the constraints provided.\n\nExample:  \nInput:  \nFact1: Artyom with progresses to battle for title of absolute champion triumph,  \nFact2: Caesar provokes Artyom to fight as result,  \nFact3: father is influential mafioso and head of drug cartel,  \nFact4: Vika at is taken hostage by Mendez people airport,  \nFact5: people start to shoot colonel 's operatives as result  \n\nOutput:  \nFive years have passed, four of which Artyom spent in custody. American boxing manager Michael once again makes Artyom an offer to have a rematch with Larry Palmer, who is now the absolute world champion and the owner of three belts. Unexpectedly, Artyom agrees. He moves to the US and starts training, and soon Vika comes to see him. Artyom goes through several successful battles and with triumph progresses to battle for the title of absolute champion. The date of the battle has already been fixed, but at this time an emergency occurs. Caesar, one of the boxers from the gym where Artyom trains, has disliked him from the very beginning and provokes Artyom to fight as a result of which Artyom administers a powerful knockout. Caesar dies without leaving the coma. It turns out that his father Felix Mendez, is an influential mafioso and the head of the drug cartel. He swears to avenge the death of his son by killing Artyom. After an invasion which occurred at night on their apartment, Artyom sends Vika to Moscow, but at the airport she is taken hostage by Mendez people. Artyom has three days to rescue Vika from captivity and for himself to come to Mendez to die. Lawyer Julia, working with Michael, retrieves a file on Mendez from which Artyom learns that Mendez was once a colleague of Vagit Valiev, but then had a dispute with him. Valiev is imprisoned near Vladimir, and Artyom comes to Moscow and asks Colonel Nechaev to arrange Valievs escape so that he in turn can help the colonel find Mendez. During Valievs getaway, his people start to shoot the colonels operatives, as a result of which Artyom and the wounded Valiev hide out alone and come to the United States under assumed names. Valiev, having promised Artyom to neutralize Mendez, instead gives him over to Mendez, and Artyom is brought to the same cell where they hold Vika. However, Valiev receives a picture on his phone which shows that his son Fyodor who lives in the US was also taken hostage, and in the end Artyom and Vika are released in exchange for Fyodor. Artyom manages to come in time for the weigh in, but he is badly beaten and doctors don't recommend him to participate in the battle. Nevertheless, the next day Artyom competes against Larry Palmer and in a grueling battle triumphs, becoming a champion. He realizes that now Mendez can not be prevented from killing him and returns home with a foreboding of death. However when Mendez comes with his people, his own assassin Manuel kills him. It becomes clear that he did it on the orders of Valiev. Manuel becomes the head of the cartel. Artyom returns to Moscow and again meets with Vika, making her an offer of marriage.\n\nFeedback:  \nScore: 0.00 (0/4 constraints satisfied)  \n  - NOT SATISFIED: The last word of your response should be the word \"resolution.\"  \n  - NOT SATISFIED: In your entire response, refrain from the use of any commas.  \n  - NOT SATISFIED: All sentences must be connected using hyphens, with no spaces between them.  \n  - NOT SATISFIED: Highlight at least 6 sections in your answer with markdown, i.e. *highlighted section*."}},

d in the story in the exact order provided.\n- Maintain the specified sentence structure and punctuation rules.\n- Highlight six sections using markdown as specified.\n- Ensure the story is between 100 to 1000 words.\n- End with the word \"resolution.\"\n\n**Example:**\nInput:  \nFact1: Artyom with progresses to battle for title of absolute champion triumph,  \nFact2: Caesar provokes Artyom to fight as result,  \nFact3: father is influential mafioso and head of drug cartel,  \nFact4: Vika at is taken hostage by Mendez people airport,  \nFact5: people start to shoot colonel 's operatives as result  \n\nOutput:  \nfive years have passed, four of which artyom spent in custody. american boxing manager michael once again makes artyom an offer to have a rematch with larry palmer, who is now the absolute world champion and the owner of three belts. unexpectedly, artyom agrees. he moves to the us and starts training, and soon vika comes to see him. artyom goes through several successful battles and with triumph progresses to battle for the title of absolute champion. the date of the battle has already been fixed, but at this time an emergency occurs. caesar, one of the boxers from the gym where artyom trains, has disliked him from the very beginning and provokes artyom to fight as a result of which artyom administers a powerful knockout. caesar dies without leaving the coma. it turns out that his father felix mendez, is an influential mafioso and the head of the drug cartel. he swears to avenge the death of his son by killing artyom. after an invasion which occurred at night on their apartment, artyom sends vika to moscow, but at the airport she is taken hostage by mendez people. artyom has three days to rescue vika from captivity and for himself to come to mendez to die. lawyer julia, working with michael, retrieves a file on mendez from which artyom learns that mendez was once a colleague of vagit valiev, but then had a dispute with him. valiev is imprisoned near vladimir const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
