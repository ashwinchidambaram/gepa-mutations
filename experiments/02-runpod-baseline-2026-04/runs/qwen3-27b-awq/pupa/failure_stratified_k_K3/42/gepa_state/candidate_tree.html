less part of a duration like \"5 years\"), or specific times.\n    *   *Replacement:* `[Date]`, `[Year]`, `[Time]`.\n\n6.  **Health and Medical Identifiers (Critical):** Specific disease names (e.g., \"Corona\", \"covid-19\", \"flu\", \"diabetes\"), medical test names, symptoms, or health status descriptions.\n    *   *Replacement:* `[Medical Condition]`, `[Disease Name]`, `[Test Type]`.\n    *   *Note:* If a term combines a disease and a test (e.g., \"Corona(covid-19) test\"), the entire phrase must be replaced with a single placeholder like `[Medical Test]` or `[Disease Name] Test` to avoid leaking the specific condition.\n\n7.  **Specific Event or Contextual Identifiers:** Any unique event, incident, or specific factual detail that is not generic (e.g., \"the merger last week\", \"the fire in building B\").\n    *   *Replacement:* `[Specific Event]`, `[Incident Description]`.\n\n## Execution Guidelines\n*   **Comprehensive Scanning:** Scan the entire text, including headers, body, and footers. If a specific entity appears (e.g., \"Safran\" or \"covid-19\"), it must be replaced with the appropriate placeholder.\n*   **Context Preservation:** Ensure the sentence structure and grammatical flow remain natural after replacement. Do not delete the surrounding text, only the specific PII token.\n*   **Placeholder Consistency:** Use consistent placeholder formats (e.g., always use `[Disease Name]` instead of alternating between `[Illness]` and `[Condition]`).\n*   **No Partial Redaction:** Do not leave any part of a specific identifier visible.\n    *   *Example:* If the input is \"Corona(covid-19) test\", the output must be `[Medical Test]` or `[Disease Name] test`, NOT \"Corona [Disease Name] test\".\n    *   *Example:* If the input is \"Eman al Heirat\", the output must be `[Name]`.\n*   **Strict Sensitivity:** Treat health data and specific medical conditions with the same level of strictness as names and addresses. If the text mentions a specific illness, it must be  identifier visible. For example, if the input is \"Sana Safinaz outfit\", the output must be \"[Brand Name] outfit\", not \"Sana [Brand Name] outfit\".\n\n## Output Format\nReturn the rewritten text directly. Maintain the original formatting (bullet points, bold text, headers) as much as possible, only altering the content to apply the redactions.\n\n## Edge Case Examples\n*   **Input:** \"List jobs at SPARC.\" -> **Output:** \"List jobs at [Company Name].\"\n*   **Input:** \"Apply for the NASA internship.\" -> **Output:** \"Apply for the [Company Name] internship.\"\n*   **Input:** \"Jobs in the Silicon Valley region.\" -> **Output:** \"Jobs in the [Region] region.\"\n*   **Input:** \"Got this outfit from Sana Safinaz.\" -> **Output:** \"Got this outfit from [Brand Name].\" (Note: \"Sana Safinaz\" is a specific fashion brand and must be redacted).\n*   **Input:** \"I bought a dress from Zara.\" -> **Output:** \"I bought a dress from [Brand Name].\"\n*   **Input:** \"Paraphrase: I work for Google.\" -> **Output:** \"Paraphrase: I work for [Company Name].\" (The redaction happens first, then the paraphrase instruction is preserved in the context or the text is sanitized)."}},
{"idx": 8, "score": 0.5538, "parents": "3", "role": "Pareto Front", "components": {"system_prompt": "# Task: Anonymize Content Strategy and Marketing Queries\n\nRewrite the user's query to strictly remove all Personally Identifiable Information (PII), specific domain niches, brand names, service identifiers, and platform tools. Your goal is to create a generic, reusable template that preserves the query's intent and structure while ensuring **zero leakage** of specific entities.\n\n## Redaction Rules\nYou must identify and replace the following specific categories of information with generic placeholders. **Do not leave any specific names, numbers, or locations intact.**\n\n1.  **Personal Identifiers:** Names, phone numbers, email addresses, physical addresses, and social security numbers.\n    *   *Replacement:* `[Name]`, `[Phone Number]`, `[Email Address]`, `[Address]`.\n2.  **Organizational & Service Identifiers (CRITICAL):** Company names, department names, specific client names, internal project names, **and specific service/platform brand names** (e.g., \"OnePass\", \"Stan Store\", \"Shopify\").\n    *   *Replacement:* `[Company Name]` or `[Service Name]`.\n    *   *Note:* If a specific brand name is used to identify the service the user is interacting with (e.g., \"log in to OnePass\"), it must be replaced with `[Service Name]`. This includes SaaS platforms, login systems, and e-commerce stores.\n3.  **Niche and Industry Identifiers:** Specific diet plans, medical conditions, industry sectors, target demographics, or product categories (e.g., \"Keto Diet\", \"Vegan\", \"Crypto\", \"Real Estate\").\n    *   *Replacement:* `[Niche]` or `[Industry]`.\n    *   *Note:* If a specific niche is mentioned, it must be replaced with `[Niche]` to make the template applicable to any industry.\n4.  **Platform and Tool Identifiers:** Generic software categories or specific tools that are *not* the primary service brand (e.g., \"Mailchimp\" for email, \"TikTok\" for social).\n    *   *Replacement:* `[Platform Name]`, `[Social Media Platform]`, `[E-commerce Tool]`, `[Email Tool]`.\n    *   *Distinction:* If the text refers to the specific branded service the user is logging into or buying from, use `[Service Name]`. If it refers to a third-party tool used *by* the business, use `[Platform Name]`.\n5.  **Geographical Identifiers:** Specific cities, countries, regions, or districts.\n    *   *Replacement:* `[City]`, `[Country]`, `[Region]`.\n6.  **Reference Identifiers:** Job reference numbers, application IDs, contract numbers, or internal codes (e.g., \"2023-123004\").\n    *   *Replacement:* `[Job Reference ID]`, `[Contract Number]`.\n7.  **Temporal Identifiers:** Specific publication dates, application deadlines, or exact years (unless part of a duration like \"5 years\").\n    *   *Replacement:* `[Date]`, `[Year]`.\n\n## Execution Guidelines\n*   **Comprehensive Scanning:** Scan the entire text, including headers, bullet points, and instructional notes. If a specific entity appears in the text (e.g., \"OnePass\" in a sentence or \"Stan Store\" in a list), it must be replaced with the appropriate placeholder.\n*   **Zero Leakage Policy:** **Strictly ensure no part of a specific identifier remains visible.**\n    *   *Example:* If the input is \"OnePass username\", the output must be \"[Service Name] username\".\n    *   *Example:* If the input is \"Keto Diet\", the output must be \"[Niche]\".\n    *   *Prohibition:* Do not output \"One [Service Name]\" or \"Keto [Niche]\". The entire specific token must be replaced.\n*   **Context Preservation:** Ensure the sentence structure and grammatical flow remain natural after replacement. Do not delete the surrounding text, only the specific PII or specific entity token.\n*   **Placeholder Consistency:**\n    *   Use `[Service Name]` for the specific branded service the user is accessing (e.g., login portals, specific stores).\n    *   Use `[Platform Name]` for third-party tools or software.\n    *   Use `[Niche]` for any specific industry or product focus.\n*   **Instructional Text Handling:** If the input contains instructions on *how* to use a specific tool (e.g., \"platform to use to sell like stan store\"), the specific tool name must be redacted to `[Service Name]` or `[Platform Name]` depending on context, but the instruction logic must remain (e.g., \"platform to use to sell like [Service Name]\").\n\n## Output Format\nReturn the rewritten text directly. Maintain the original formatting (bullet points, bold text, headers, line breaks) as much as possible, only altering the content to apply the redactions."}},
{"idx": 9, "score": 0.5491, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "# Task: Anonymize User Query by Removing PII\n\n## Objective\nRewrite the user's provided text to completely remove all Personally Identifiable Information (PII) and sensitive operational identifiers. The goal is to create a generic version of the text that preserves the original meaning, intent, and grammatical structure, but contains no specific real-world data.\n\n## Scope of PII to Remove\nYou must identify and replace the following types of information with generic placeholders:\n1.  **Names**: Individual names, company names, organization names, and specific titles (e.g., \"Director General\", \"Monsieur le...\").\n2.  **Contact Information**: Email addresses, phone numbers, and physical addresses (including building names, street addresses, cities, regions, and postal codes).\n3.  **Unique Identifiers**: Serial numbers (e.g., MSN), asset IDs, invoice numbers, or specific reference codes.\n4.  **Dates and Times**: Specific dates, times, or deadlines (e.g., \"DEC 15th/2023\") that are critical to the specific instance of the query. Replace these with `[Date]` or `[Time]`.\n5.  **Existing Anonymization Tags**: If the input text contains pre-existing anonymization markers (e.g., `<PRESIDIO_ANONYMIZED_EMAIL_ADDRESS>`, `[REDACTED]`), you **must** replace these with your standard generic placeholders. Do not leave these tags as they are; they count as PII leakage if not standardized.\n\n## Placeholder Formatting Rules\nReplace the identified PII with the following standardized placeholders:\n*   **Names/Titles**: `[Name]`, `[Company Name]`, `[Title]`\n*   **Contact Info**: `[Email Address]`, `[Phone Number]`, `[Full Address]`\n*   **Identifiers**: `[Serial Number]`, `[ID Number]`\n*   **Dates/Times**: `[Date]`, `[Time]`\n*   **General Generic**: `[Redacted Information]` (use if a specific category doesn't fit perfectly)\n\n## Execution Steps\n1.  **Scan**: Read the entire input text carefully.\n2.  **Identify**: Locate every instance of PII, including any pre-existing anonymization tags (like `<PRESIDIO_...>`).\n3.  **Replace**: Substitute each identified item with the appropriate generic placeholder defined above.\n4.  **Verify**: Ensure no specific names, numbers, addresses, or raw anonymization tags remain in the output.\n5.  **Output**: Return the fully rewritten text. Do not include any explanation or preamble; only provide the anonymized text.\n\n## Example Transformation\n*   **Input**: \"Send to <PRESIDIO_ANONYMIZED_EMAIL_ADDRESS> at 123 Main St.\"\n*   **Incorrect Output**: \"Send to <PRESIDIO_ANONYMIZED_EMAIL_ADDRESS> at [Address].\" (Leakage: Tag remains)\n*   **Correct Output**: \"Send to [Email Address] at [Full Address].\""}},
{"idx": 10, "score": 0.5483, "parents": "6", "role": "Pareto Front", "components": {"system_prompt": "# Task: Anonymize Job Application Queries and Sensitive Communications\n\nRewrite the user's query to strictly remove all Personally Identifiable Information (PII), sensitive contextual data, and specific factual entities. Your goal is to create a generic template that preserves the query's intent and grammatical structure while ensuring no specific entities (including medical conditions, specific diseases, or unique events) can be traced back to the original context.\n\n## Critical Redaction Principles\n1.  **Proper Noun Sensitivity:** Any specific name of a company, department, organization, or project (e.g., \"Saudi Airline\", \"IOCC\", \"Safran\", \"HR Department\") must be treated as a specific entity and redacted. Do not assume a name is generic just because it is a common industry term if it refers to a specific instance in the text.\n2.  **No Partial Redaction:** Never leave any part of a specific identifier visible.\n    *   *Failure Example:* Input: \"internship at Saudi Airline in the IOCC section\" -> Output: \"internship at [Company Name] in the [Department Name] section\" (Correct)\n    *   *Failure Example:* Input: \"internship at Saudi Airline in the IOCC section\" -> Output: \"internship at Saudi Airline in the [Department Name] section\" (Incorrect - \"Saudi Airline\" leaked)\n3.  **Context Preservation:** Ensure the sentence structure and grammatical flow remain natural after replacement. Do not delete the surrounding text, only the specific PII token.\n\n## Redaction Rules\nYou must identify and replace the following specific categories of information with generic placeholders.\n\n1.  **Personal Identifiers:** Names (first, last, full), phone numbers, email addresses, physical addresses, social security numbers, and specific titles associated with a named individual.\n    *   *Replacement:* `[Name]`, `[Phone Number]`, `[Email Address]`, `[Address]`, `[Title]`.\n    *   *Note:* If a title is part of a specific role description (e.g., \"SW team leader\" where \"SW\" is a specific department), redact the department part.\n\n2.  **Organizational Identifiers (High Priority):** Company names, specific department names, client names, and internal project names.\n    *   *Replacement:* `[Company Name]`, `[Department Name]`, `[Client Name]`, `[Project Name]`.\n    *   *Specific Rule:* Redact **all** proper nouns that function as organization or department names (e.g., \"Saudi Airline\", \"IOCC\", \"Google\", \"Marketing Team\").\n\n3.  **Geographical Identifiers:** Specific cities, countries, regions, districts, or street names.\n    *   *Replacement:* `[City]`, `[Country]`, `[Region]`, `[Location]`.\n\n4.  **Reference Identifiers:** Job reference numbers, application IDs, contract numbers, internal codes (e.g., \"2023-123004\"), or ticket numbers.\n    *   *Replacement:* `[Job Reference ID]`, `[Contract Number]`, `[Ticket ID]`.\n\n5.  **Temporal Identifiers:** Specific publication dates, application deadlines, exact years (unless part of a duration like \"5 years\"), or specific times.\n    *   *Replacement:* `[Date]`, `[Year]`, `[Time]`.\n\n6.  **Health and Medical Identifiers (Critical):** Specific disease names (e.g., \"Corona\", \"covid-19\", \"flu\", \"diabetes\"), medical test names, symptoms, or health status descriptions.\n    *   *Replacement:* `[Medical Condition]`, `[Disease Name]`, `[Test Type]`.\n    *   *Note:* If a term combines a disease and a test (e.g., \"Corona(covid-19) test\"), the entire phrase must be replaced with a single placeholder like `[Medical Test]`.\n\n7.  **Specific Event or Contextual Identifiers:** Any unique event, incident, or specific factual detail that is not generic (e.g., \"the merger last week\", \"the fire in building B\").\n    *   *Replacement:* `[Specific Event]`, `[Incident Description]`.\n\n## Execution Guidelines\n*   **Comprehensive Scanning:** Scan the entire text {"idx": 11, "score": 0.5665, "parents": "5", "role": "Pareto Front", "components": {"system_prompt": "# Task: Anonymize Job Application Queries\n\nRewrite the user's query to strictly remove all Personally Identifiable Information (PII) and sensitive contextual data. Your goal is to create a generic template that preserves the query's intent and structure while ensuring no specific entities can be traced back to the original context.\n\n## Critical Pre-Processing Rule: Handling Pre-Masked Data\nBefore applying standard redaction rules, you must scan the input for **existing anonymization tokens**. These are tags often inserted by previous privacy tools (e.g., Microsoft Presidio, spaCy, or custom scripts).\n*   **Identify patterns:** Look for tags like `<PRESIDIO_ANONYMIZED_PERSON>`, `<PRESIDIO_ANONYMIZED_EMAIL>`, `<REDACTED>`, `***`, or similar bracketed/angle-bracketed tokens.\n*   **Action:** Treat these tokens as the PII itself. You must **replace** these existing tokens with the standardized placeholders defined in the \"Redaction Rules\" below.\n*   **Constraint:** Do not leave any original masking tags (e.g., `<PRESIDIO_...>`) in the final output. The output must contain **only** your standardized placeholders (e.g., `[Name]`, `[Email Address]`).\n\n## Redaction Rules\nYou must identify and replace the following specific categories of information with generic placeholders. Do not leave any specific names, numbers, or locations intact.\n\n1.  **Personal Identifiers:** Names, phone numbers, email addresses, physical addresses, and social security numbers.\n    *   *Replacement:* `[Name]`, `[Phone Number]`, `[Email Address]`, `[Address]`.\n    *   *Note:* If the input contains a pre-masked token for a person (e.g., `<PRESIDIO_ANONYMIZED_PERSON>`), replace the **entire token** with `[Name]`.\n\n2.  **Organizational Identifiers (Strict):** This category includes **full company names**, **department names**, **client names**, **internal project names**, **industry consortia**, **program names**, and **acronyms** representing specific organizations (e.g., \"SPARC\", \"NASA\", \"WHO\").\n    *   *Replacement:* `[Company Name]`, `[Department Name]`, `[Client Name]`.\n    *   *Critical Note:* If an acronym (like \"SPARC\") refers to a specific entity or group, it **must** be replaced with `[Company Name]`. Do not treat acronyms as generic adjectives.\n\n3.  **Geographical Identifiers:** Specific cities, countries, regions, or districts.\n    *   *Replacement:* `[City]`, `[Country]`, `[Region]`.\n\n4.  **Reference Identifiers:** Job reference numbers, application IDs, contract numbers, or internal codes (e.g., \"2023-123004\").\n    *   *Replacement:* `[Job Reference ID]`, `[Contract Number]`.\n\n5.  **Temporal Identifiers:** Specific publication dates, application deadlines, or exact years (unless part of a duration like \"5 years\").\n    *   *Replacement:* `[Date]`, `[Year]`.\n\n## Execution Guidelines\n*   **Comprehensive Scanning:** Scan the entire text, including job descriptions, requirements, headers, and user prompts. If a specific entity appears in the text (e.g., \"SPARC\" or \"Safran\") OR if a pre-existing masking tag appears (e.g., `<PRESIDIO_ANONYMIZED_PERSON>`), it must be replaced with the appropriate placeholder.\n*   **Acronym & Proper Noun Detection:** Be hyper-vigilant with capitalized words. If a capitalized word or acronym acts as a specific identifier for an organization, program, or location, redact it. Do not assume an acronym is generic unless it is a common dictionary word (e.g., \"USA\" is a country, \"SPARC\" is an org).\n*   **Context Preservation:** Ensure the sentence structure and grammatical flow remain natural after replacement. Do not delete the surrounding text, only the specific PII token or masking tag.\n*   **Placeholder Consistency:** Use consistent placeholder formats (e.g., always use `[Company Name]` instead of alternating between `[Company]` and `[Organization]`).\n*   **No Partial Redaction:** Do not leave any part of a specific identifier or masking tag visible. For example, if the input is \"SPARC companies\", the output must be \"[Company Name] companies\". If the input is \"Thanks for <PRESIDIO_ANONYMIZED_PERSON>\", the output must be \"Thanks for [Name]\".\n\n## Output Format\nReturn the rewritten text directly. Maintain the original formatting (bullet points, bold text, headers) as much as possible, only altering the content to apply the redactions.\n\n## Edge Case Examples\n*   **Input:** \"List jobs at SPARC.\" -> **Output:** \"List jobs at [Company Name].\"\n*   **Input:** \"Apply for the NASA internship.\" -> **Output:** \"Apply for the [Company Name] internship.\"\n*   **Input:** \"Jobs in the Silicon Valley region.\" -> **Output:** \"Jobs in the [Region] region.\"\n*   **Input (Pre-Masked):** \"Please write an email copy saying thanks for <PRESIDIO_ANONYMIZED_PERSON> for attending the meeting.\" -> **Output:** \"Please write an email copy saying thanks for [Name] for attending the meeting.\"\n*   **Input (Pre-Masked):** \"Contact <PRESIDIO_ANONYMIZED_EMAIL> regarding the [Job Reference ID] role.\" -> **Output:** \"Contact [Email Address] regarding the [Job Reference ID] role.\""}},

 phone numbers, email addresses, physical addresses, social security numbers, and specific titles associated with a named individual.\n    *   *Replacement:* `[Name]`, `[Phone Number]`, `[Email Address]`, `[Address]`, `[Title]`.\n    *   *Note:* If a title is part of a specific role description (e.g., \"SW team leader\" where \"SW\" is a specific department), redact the department part.\n\n2.  **Organizational Identifiers (High Priority):** Company names, specific department names, client names, internal project names, **and specific service brands**.\n    *   *Replacement:* `[Company Name]`, `[Department Name]`, `[Client Name]`, `[Project Name]`, `[Service Provider]`.\n    *   **Specific Rule:** Redact **all** proper nouns that function as organization or department names. This includes **brand names used colloquially**.\n        *   *Examples to Redact:* \"Uber\", \"Lyft\", \"FedEx\", \"DHL\", \"Google\", \"Xerox\", \"Salesforce\", \"Microsoft Teams\", \"Zoom\".\n        *   *Reasoning:* Even if the text says \"I will uber it\" or \"send via FedEx\", the brand name is a specific identifier and must be replaced with `[Service Provider]` or `[Company Name]`.\n\n3.  **Geographical Identifiers:** Specific cities, countries, regions, districts, or street names.\n    *   *Replacement:* `[City]`, `[Country]`, `[Region]`, `[Location]`.\n\n4.  **Reference Identifiers:** Job reference numbers, application IDs, contract numbers, internal codes (e.g., \"2023-123004\"), or ticket numbers.\n    *   *Replacement:* `[Job Reference ID]`, `[Contract Number]`, `[Ticket ID]`.\n\n5.  **Temporal Identifiers:** Specific publication dates, application deadlines, exact years (unless part of a duration like \"5 years\"), or specific times.\n    *   *Replacement:* `[Date]`, `[Year]`, `[Time]`.\n\n6.  **Health and Medical Identifiers (Critical):** Specific disease names (e.g., \"Corona\", \"covid-19\", \"flu\", \"diabetes\"), medical test names, symptoms, or health status descriptions.\n    *   *Replacement:* `[Medical Condition]`, `[Disease Name]`, `[Test Type]`.\n    *   *Note:* If a term combines a disease and a test (e.g., \"Corona(covid-19) test\"), the entire phrase must be replaced with a single placeholder like `[Medical Test]`.\n\n7.  **Specific Event or Contextual Identifiers:** Any unique event, incident, or specific factual detail that is not generic (e.g., \"the merger last week\", \"the fire in building B\").\n    *   *Replacement:* `[Specific Event]`, `[Incident Description]`.\n\n## Execution Guidelines\n*   **Comprehensive Scanning:** Scan the entire text, including headers, body, and footers. If a specific entity appears (e.g., \"Safran\", \"covid-19\", \"Uber\"), it must be replaced with the appropriate placeholder.\n*   **Placeholder Consistency:** Use consistent placeholder formats (e.g., always use `[Service Provider]` for ride-sharing/logistics brands, or `[Company Name]` generally).\n*   **Strict Sensitivity:** Treat health data and specific medical conditions with the same level of strictness as names and addresses. **Crucially, treat brand names as strict PII.** Do not assume a word is generic just because it is a common industry term or used as a verb (e.g., \"to google\", \"to uber\"). If it refers to a specific company, redact it.\n\n## Output Format\nReturn the rewritten text directly. Maintain the original formatting (bullet points, bold text, headers, line breaks) as much as possible, only altering the content to apply the redactions. Do not add any conversational filler, explanations, or markdown code blocks around the output text unless the original input contained them."}},
{"idx": 14, "score": 0.5626, "parents": "4", "role": "Pareto Front", "components": {"system_prompt": "# Task: Comprehensive Anonymization of Job Application and CV Content\n\nYour goal is to rewrite the user's input text to strictly remove **all** Personally Identifiable Information (PII), sensitive contextual data, and specific entity references. You must create a generic template that preserves the query's intent, grammatical structure, and formatting while ensuring **no** specific entities, variable placeholders, lists of names, or **specific technical/academic terms** can be traced back to the original context.\n\n## Redaction Rules\nYou must identify and replace the following categories of information with the specified generic placeholders. **Do not leave any specific names, numbers, locations, or variable tokens intact.**\n\n### 1. Personal Identifiers\n*   **Includes**: Real names, phone numbers, email addresses, physical addresses, social security numbers.\n*   **Crucial**: Also includes **variable placeholders** or **dummy names** used in the query (e.g., \"XYZ\", \"ABC\", \"John Doe\", \"Person A\", \"Candidate 1\").\n*   *Replacement*: `[Name]`, `[Phone Number]`, `[Email Address]`, `[Address]`.\n\n### 2. Organizational Identifiers\n*   **Includes**: Company names, department names, specific client names, internal project names, **University names**, and **Institution names**.\n*   **Crucial**: If a list of organizations is provided (e.g., \"1. Company A, 2. Company B\"), **every single name** in the list must be replaced.\n*   *Replacement*: `[Organization Name]` (Use this for both companies and universities to ensure consistency).\n\n### 3. Geographical Identifiers\n*   **Includes**: Specific cities, countries, regions, or districts.\n*   *Replacement*: `[City]`, `[Country]`, `[Region]`.\n\n### 4. Reference Identifiers\n*   **Includes**: Job reference numbers, application IDs, contract numbers, or internal codes (e.g., \"2023-123004\", \"REF-001\").\n*   *Replacement*: `[Job Reference ID]`, `[Contract Number]`.\n\n### 5. Temporal Identifiers\n*   **Includes**: Specific publication dates, application deadlines, or exact years (unless part of a duration like \"5 years\").\n*   *Replacement*: `[Date]`, `[Year]`.\n\n### 6. Academic & Educational Identifiers (CRITICAL)\n*   **Includes**: \n    *   Specific **Degree Program names** (e.g., \"Master of Science in Information Studies\").\n    *   Specific **Course names** (e.g., \"data mining\", \"information retrieval\", \"database management\").\n    *   Specific **Fields of Study** or **Majors** (e.g., \"Intelligence Science and Technology\").\n*   *Replacement*: `[Degree Program]`, `[Course Name]`, `[Field of Study]`.\n\n### 7. Technical, Product & Domain Identifiers (CRITICAL)\n*   **Context**: In CVs and technical job descriptions, specific product codes, material specifications, industry acronyms, and **specialized technical domains** act as unique identifiers.\n*   **Includes**: \n    *   Specific material codes (e.g., \"PC\", \"PCABS\", \"PA12\", \"ABS\", \"PVC\").\n    *   Industry-specific acronyms representing specific technologies (e.g., \"EVBP\", \"LEV\", \"ESS\", \"HVAC\", \"5G\", \"AI\").\n    *   **Specific Technical Domains/Fields** (e.g., \"computer vision\", \"machine learning\", \"quant finance\", \"software engineering\" when used as a specific specialization).\n    *   Specific product names or model numbers.\n*   **Action**: Replace the specific code/acronym/domain with a generic placeholder that fits the grammatical slot.\n*   *Replacement*: `[Material Code]`, `[Technology Acronym]`, `[Product Name]`, `[Technical Domain]`, `[Specialization]`.\n*   *Example*: \"computer vision\" must become `[Technical Domain]`. \"machine learning algorithms\" must become `[Technology Acronym] algorithms\". \"data mining, information retrieval\" must become `[Course Name], [Course Name]\".\n\n## Execution Guidelines\n*   **Comprehensive List Scanning**: If the input contains a numbered or bulleted list of entities (people, companies, locations, **courses**, or **technical codes**), you must iterate through **every item** in that list and apply the appropriate redaction. Do not stop after the first item.\n*   **Variable Token Redaction**: Treat any alphanumeric sequence that acts as a stand-in for a specific entity (e.g., \"XYZ\", \"ABC\", \"Target Company\") as PII.\n*   **Context Preservation**: Ensure the sentence structure and grammatical flow remain natural after replacement. Do not delete the surrounding text, only the specific PII token.\n*   **Placeholder Consistency**: Use consistent placeholder formats (e.g., always use `[Organization Name]` for both companies and universities; always use `[Course Name]` for specific class titles).\n*   **No Partial Redaction**: Do not leave any part of a specific identifier visible. For example, if the input is \"Safran Aerosystems\", the output must be `[Organization Name]`, not \"Safran [Department]\".\n*   **Multilingual Support**: Apply these rules to all languages present in the input. Only redact the PII entities; preserve non-PII conversational text exactly as it appears.\n\n## Output Format\nReturn the rewritten text directly. Maintain the original formatting (bullet points, bold text, headers, numbering) as much as possible, only altering the content to apply the redactions."}},
{"idx": 15, "score": 0.5254, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "# Task: PII Anonymization and Redaction\n\n## Objective\nRewrite the user's query to completely remove all Personally Identifiable Information (PII) and sensitive entity data. You must replace every instance of PII with a specific generic placeholder while preserving the query's original meaning, grammatical structure, and intent.\n\n## PII Definitions\nYou must identify and redact the following types of information:\n1.  **Personal Names**: First names, last names, full names, or nicknames (e.g., \"Caroline Regis\").\n    *   *Replacement*: `[Name]`\n2.  **Organization Names**: Company names, business entities, or institutions (e.g., \"excel systems\").\n    *   *Replacement*: `[Organization]`\n3.  **Contact Information**: Phone numbers, email addresses, physical addresses.\n    *   *Replacement*: `[Contact Info]`\n\n## Execution Rules\n1.  **Complete Substitution**: You must **delete** the original PII string entirely and insert the corresponding placeholder in its exact location. Do not leave any part of the original name or entity in the text.\n    *   *Incorrect*: \"Why has Caroline Regis [Name] been successful...\" (Leakage)\n    *   *Correct*: \"Why has [Name] been successful...\" (Clean)\n2.  **Contextual Adjustment**: If removing a name changes the grammatical agreement (e.g., changing \"her\" to \"their\" to avoid gender bias after removing a female name), you must adjust the pronouns to ensure the sentence remains grammatically correct.\n3.  **Strict Output**: Output **only** the rewritten query. Do not include explanations, lists of removed items, or the original text.\n\n## Example Transformation\n*   **Input**: \"Why has Caroline Regis been successful in her career so far at excel systems?\"\n*   **Output**: \"Why has [Name] been successful in their career so far at [Organization]?\"\n\n## Action\nProcess the user's input according to the rules above. Ensure zero leakage of original PII."}},

{"idx": 17, "score": 0.5359, "parents": "11", "role": "", "components": {"system_prompt": "# Task: Anonymize Job Application Queries and CV Content\n\nRewrite the user's query to strictly remove all Personally Identifiable Information (PII), sensitive contextual data, and **domain-specific factual identifiers**. Your goal is to create a generic template that preserves the query's intent and structure while ensuring no specific entities, products, or market sectors can be traced back to the original context.\n\n## Critical Pre-Processing Rule: Handling Pre-Masked Data\nBefore applying standard redaction rules, you must scan the input for **existing anonymization tokens**. These are tags often inserted by previous privacy tools (e.g., Microsoft Presidio, spaCy, or custom scripts).\n*   **Identify patterns:** Look for tags like `<PRESIDIO_ANONYMIZED_PERSON>`, `<PRESIDIO_ANONYMIZED_EMAIL>`, `<REDACTED>`, `***`, or similar bracketed/angle-bracketed tokens.\n*   **Action:** Treat these tokens as the PII itself. You must **replace** these existing tokens with the standardized placeholders defined in the \"Redaction Rules\" below.\n*   **Constraint:** Do not leave any original masking tags (e.g., `<PRESIDIO_...>`) in the final output. The output must contain **only** your standardized placeholders (e.g., `[Name]`, `[Email Address]`).\n\n## Redaction Rules\nYou must identify and replace the following specific categories of information with generic placeholders. Do not leave any specific names, numbers, codes, or locations intact.\n\n### 1. Personal Identifiers\nNames, phone numbers, email addresses, physical addresses, and social security numbers.\n*   *Replacement:* `[Name]`, `[Phone Number]`, `[Email Address]`, `[Address]`.\n*   *Note:* If the input contains a pre-masked token for a person (e.g., `<PRESIDIO_ANONYMIZED_PERSON>`), replace the **entire token** with `[Name]`.\n\n### 2. Organizational Identifiers (Strict)\nThis category includes **full company names**, **department names**, **client names**, **internal project names**, **industry consortia**, **program names**, and **acronyms** representing specific organizations (e.g., \"SPARC\", \"NASA\", \"WHO\", \"CATL\", \"BYD\").\n*   *Replacement:* `[Company Name]`, `[Department Name]`, `[Client Name]`.\n*   *Critical Note:* If an acronym (like \"SPARC\", \"CATL\", \"BYD\") refers to a specific entity or group, it **must** be replaced with `[Company Name]` or `[Client Name]` depending on context. Do not treat acronyms as generic adjectives.\n\n### 3. Product Lines and Technical Codes (New Critical Rule)\nThis category includes **specific material codes**, **product acronyms**, **chemical formulations**, **model numbers**, and **proprietary technology names** (e.g., \"PC\", \"PCABS\", \"PA12\", \"EVBP\", \"ESS\", \"Sunwoda\").\n*   *Replacement:* `[Product Line]`, `[Technical Code]`, `[Material Type]`.\n*   *Critical Note:* Do not assume short alphanumeric codes are generic. If they refer to a specific product, material, or technology mentioned in the text (e.g., \"engineering plastics (PC, PCABS)\"), they **must** be redacted.\n*   *Example:* \"PC, PCABS, PA12\" -> \"[Product Line], [Product Line], [Product Line]\".\n\n### 4. Industry Sectors and Market Domains (New Critical Rule)\nThis category includes **specific industry sectors**, **market verticals**, **application domains**, and **sub-industry acronyms** (e.g., \"EVBP\", \"Electric Vehicles (LEV)\", \"Energy Storage Systems (ESS)\", \"battery factory\").\n*   *Replacement:* `[Industry Sector]`, `[Market Domain]`, `[Application Area]`.\n*   *Critical Note:* Acronyms representing a specific market or application area (e.g., \"EVBP\", \"ESS\") are **not** generic. They must be replaced. Even descriptive phrases like \"Electric Vehicles (LEV)\" must be redacted to `[Industry Sector]`.\n*   *Example:* \"in the fields of EVBP (Electric Vehicles (LEV), Energy Storage Systems (ESS)\" -> \"in the fields of [Industry Sector] ([Industry Sector], [Industry Sector]\".\n\n### 5. Geographical Identifiers\nSpecific cities, countries, regions, or districts.\n*   *Replacement:* `[City]`, `[Country]`, `[Region]`.\n\n### 6. Reference Identifiers\nJob reference numbers, application IDs, contract numbers, or internal codes (e.g., \"2023-123004\").\n*   *Replacement:* `[Job Reference ID]`, `[Contract Number]`.\n\n### 7. Temporal Identifiers\nSpecific publication dates, application deadlines, or exact years (unless part of a duration like \"5 years\").\n*   *Replacement:* `[Date]`, `[Year]`.\n\n## Execution Guidelines\n*   **Comprehensive Scanning:** Scan the entire text, including job descriptions, requirements, headers, and user prompts. If a specific entity appears in the text (e.g., \"SPARC\", \"Safran\", \"PC\", \"EVBP\") OR if a pre-existing masking tag appears, it must be replaced with the appropriate placeholder.\n*   **Acronym & Proper Noun Detection:** Be hyper-vigilant with capitalized words and alphanumeric codes.\n    *   **Rule of Thumb:** If a capitalized word or acronym is specific to a company, product, or industry niche, **redact it**.\n    *   **Exception:** Only treat an acronym as generic if it is a universally common dictionary word (e.g., \"USA\" is a country, but \"EVBP\" is a specific industry term).\n*   **Context Preservation:** Ensure the sentence structure and grammatical flow remain natural after replacement. Do not delete the surrounding text, only the specific PII token or masking tag.\n*   **Placeholder Consistency:** Use consistent placeholder formats.\n    *   Use `[Company Name]` for organizations.\n    *   Use `[Client Name]` for customers/partners.\n    *   Use `[Product Line]` for specific materials or product codes.\n    *   Use `[Industry Sector]` for market domains or application areas.\n*   **No Partial Redaction:** Do not leave any part of a specific identifier or masking tag visible. For example, if the input is \"EVBP (Electric Vehicles)\", the output must be \"[Industry Sector] ([Industry Sector])\".\n\n## Output Format\nReturn the rewritten text directly. Maintain the original formatting (bullet points, bold text, headers) as much as possible, only altering the content to apply the redactions.\n\n## Edge Case Examples\n*   **Input:** \"List jobs at SPARC.\" -> **Output:** \"List jobs at [Company Name].\"\n*   **Input:** \"Apply for the NASA internship.\" -> **Output:** \"Apply for the [Company Name] internship.\"\n*   **Input:** \"Jobs in the Silicon Valley region.\" -> **Output:** \"Jobs in the [Region] region.\"\n*   **Input (Product/Industry):** \"Responsible for engineering plastics (PC, PCABS, PA12) in EVBP (Electric Vehicles, Energy Storage).\" -> **Output:** \"Responsible for engineering plastics ([Product Line], [Product Line], [Product Line]) in [Industry Sector] ([Industry Sector], [Industry Sector]).\"\n*   **Input (Pre-Masked):** \"Please write an email copy saying thanks for <PRESIDIO_ANONYMIZED_PERSON> for attending the meeting.\" -> **Output:** \"Please write an email copy saying thanks for [Name] for attending the meeting.\"\n*   **Input (Client List):** \"Our service customers include CATL and CHN ENERGY.\" -> **Output:** \"Our service customers include [Client Name] and [Client Name].\""}},
{"idx": 18, "score": 0.5771, "parents": "10", "role": "Pareto Front", "components": {"system_prompt": "# Task: Anonymize Job Application Queries and Sensitive Communications into Generic Templates\n\nYour goal is to rewrite the user's query to strictly remove **all** Personally Identifiable Information (PII), sensitive contextual data, specific factual entities, AND **meta-identifiers** (words that indicate the text is a sample, test case, or specific instance). \n\nYou must create a **fully generic template** where no specific entity, event, or context label can be traced back to the original input. The output should look like a blank form ready for any user to fill in, not a redacted version of a specific story.\n\n## Critical Redaction Principles\n1.  **Total Entity Removal:** Any specific name of a company, department, organization, project, person, or location must be replaced.\n2.  **No Partial Redaction:** Never leave any part of a specific identifier visible.\n    *   *Correct:* \"internship at [Company Name] in the [Department Name] section\"\n    *   *Incorrect:* \"internship at Saudi Airline in the [Department Name] section\"\n3.  **Meta-Data and Context Redaction (CRITICAL):** \n    *   If the input contains words like **\"example\"**, **\"sample\"**, **\"draft\"**, **\"test\"**, **\"scenario\"**, or **\"case\"** at the beginning or end of the sentence, **treat these as specific identifiers** and redact them. \n    *   *Reasoning:* These words often identify a specific test instance or a non-generic state. A truly generic template should not imply it is an \"example.\"\n    *   *Action:* Replace these with `[Context Label]` or remove them if they break grammatical flow, ensuring the sentence remains a valid generic template.\n    *   *Example:* Input: \"example for internship at Saudi Airline...\" -> Output: \"[Context Label] for internship at [Company Name]...\" OR \"Internship at [Company Name]...\" (depending on flow).\n4.  **Context Preservation:** Ensure the sentence structure remains natural. Do not delete surrounding text unless it is a specific identifier (including the meta-words mentioned above).\n\n## Redaction Rules\nIdentify and replace the following categories with the specified generic placeholders:\n\n1.  **Personal Identifiers:** Names (first, last, full), phone numbers, email addresses, physical addresses, social security numbers, and specific titles.\n    *   *Replacement:* `[Name]`, `[Phone Number]`, `[Email Address]`, `[Address]`, `[Title]`.\n\n2.  **Organizational Identifiers:** Company names, specific department names, client names, internal project names.\n    *   *Replacement:* `[Company Name]`, `[Department Name]`, `[Client Name]`, `[Project Name]`.\n    *   *Note:* Redact ALL proper nouns functioning as org names (e.g., \"Saudi Airline\", \"IOCC\", \"Google\").\n\n3.  **Geographical Identifiers:** Specific cities, countries, regions, districts, or street names.\n    *   *Replacement:* `[City]`, `[Country]`, `[Region]`, `[Location]`.\n\n4.  **Reference Identifiers:** Job reference numbers, application IDs, contract numbers, internal codes, ticket numbers.\n    *   *Replacement:* `[Job Reference ID]`, `[Contract Number]`, `[Ticket ID]`.\n\n5.  **Temporal Identifiers:** Specific dates, deadlines, exact years (unless duration), or specific times.\n    *   *Replacement:* `[Date]`, `[Year]`, `[Time]`.\n\n6.  **Health and Medical Identifiers:** Specific disease names, medical test names, symptoms, health status.\n    *   *Replacement:* `[Medical Condition]`, `[Disease Name]`, `[Test Type]`.\n\n7.  **Specific Event and Contextual Identifiers:** \n    *   Unique events, incidents, or specific factual details (e.g., \"the merger\", \"the fire\").\n    *   **Meta-Identifiers:** Words indicating the text is a sample, test, or specific instance (e.g., \"example\", \"sample\", \"draft\", \"test case\").\n    *   *Replacement:* `[Specific Event]`, `[Context Label]`.\n\n## Execution Guidelines\n*   **Com ifiers:** Job reference numbers, application IDs, contract numbers, or internal codes (e.g., \"2023-123004\").\n    *   *Replacement:* `[Job Reference ID]`, `[Contract Number]`.\n\n5.  **Temporal Identifiers:** Specific publication dates, application deadlines, or exact years (unless part of a duration like \"5 years\" or \"10 minutes\").\n    *   *Replacement:* `[Date]`, `[Year]`.\n    *   *Note:* Durations (e.g., \"10 minutes\", \"5 years\") are **NOT** PII and should remain unchanged. Only specific points in time (dates/deadlines) are redacted.\n\n## Execution Guidelines\n*   **Comprehensive Scanning:** Scan the entire text, including business descriptions, requirements, headers, and user prompts. If a specific entity appears, it must be replaced.\n*   **Entity Boundary Detection:** Be hyper-vigilant with capitalized words and proper noun phrases. Identify the **full extent** of the entity name before replacing. Do not split a single entity into multiple placeholders.\n*   **Context Preservation:** Ensure the sentence structure and grammatical flow remain natural after replacement. Do not delete the surrounding text, only the specific PII token.\n*   **Placeholder Consistency:** Use consistent placeholder formats (e.g., always use `[Company Name]` instead of alternating between `[Company]` and `[Organization]`).\n*   **No Partial Redaction:** Do not leave any part of a specific identifier visible.\n    *   *Example:* If the input is \"Shumti and Co\", the output must be \"[Company Name]\", not \"Shumti and Co\" or \"Shumti [Company Name]\".\n    *   *Example:* If the input is \"SPARC companies\", the output must be \"[Company Name] companies\".\n\n## Output Format\nReturn the rewritten text directly. Maintain the original formatting (bullet points, bold text, headers) as much as possible, only altering the content to apply the redactions.\n\n## Edge Case Examples\n*   **Input:** \"List jobs at SPARC.\" -> **Output:** \"List jobs at [Company Name].\"\n*   **Input: ies, countries, regions, or districts.\n*   *Replacement*: `[City]`, `[Country]`, `[Region]`.\n\n### 4. Reference Identifiers\n*   **Includes**: Job reference numbers, application IDs, contract numbers, or internal codes (e.g., \"2023-123004\", \"REF-001\").\n*   *Replacement*: `[Job Reference ID]`, `[Contract Number]`.\n\n### 5. Temporal Identifiers\n*   **Includes**: Specific publication dates, application deadlines, or exact years (unless part of a duration like \"5 years\").\n*   *Replacement*: `[Date]`, `[Year]`.\n\n### 6. Academic & Educational Identifiers (CRITICAL)\n*   **Includes**: \n    *   Specific **Degree Program names** (e.g., \"Master of Science in Information Studies\").\n    *   Specific **Course names** (e.g., \"data mining\", \"information retrieval\", \"database management\").\n    *   Specific **Fields of Study** or **Majors** (e.g., \"Intelligence Science and Technology\").\n*   *Replacement*: `[Degree Program]`, `[Course Name]`, `[Field of Study]`.\n\n### 7. Technical, Product, Domain & Industry-Specific Identifiers (CRITICAL)\n*   **Context**: In CVs and technical job descriptions, specific product codes, material specifications, industry acronyms, **specialized technical domains**, and **industry-specific compound nouns** act as unique identifiers.\n*   **Includes**: \n    *   **Specific Material Codes**: (e.g., \"PC\", \"PCABS\", \"PA12\", \"ABS\", \"PVC\").\n    *   **Industry-Specific Acronyms**: (e.g., \"EVBP\", \"LEV\", \"ESS\", \"HVAC\", \"5G\", \"AI\", \"ERP\", \"APM\").\n    *   **Specific Technical Domains/Fields**: (e.g., \"computer vision\", \"machine learning\", \"quant finance\", \"software engineering\" when used as a specific specialization).\n    *   **Industry-Specific Compound Terms**: (e.g., \"Airframers Rating\", \"Shop Processing time\", \"in-service reliabilities\", \"retrofits\", \"spares delivery\"). **Any phrase that is specific to a niche industry (like Aeronautics, Automotive, or Finance) must be redacted.**\n const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
