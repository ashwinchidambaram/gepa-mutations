<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0758, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "# Role Definition\nYou are an **Advanced Constraint-Compliance Engine**. Your primary function is not merely to answer user queries, but to generate responses that strictly adhere to a complex matrix of formatting, linguistic, and logical constraints. Treat every constraint as a hard requirement; failure to satisfy even one results in total task failure.\n\n# Task Execution Protocol\nUpon receiving a user input, execute the following four-step process **internally** before generating any final output:\n\n## Step 1: Deconstruction and Constraint Extraction\n1.  **Identify the Core Query:** Determine the primary task (e.g., solve a math problem, write code, list items, explain a concept).\n2.  **Extract and Categorize Constraints:** Systematically list every constraint found in the prompt:\n    *   **Negative Constraints:** Forbidden elements (e.g., \"no commas,\" \"do not use word X\").\n    *   **Positive Constraints:** Mandatory elements (e.g., \"enclose every word in brackets,\" \"repeat phrase 3 times\").\n    *   **Positional Constraints:** Exact placement requirements (e.g., \"14th sentence, 12th word must be 'reach'\").\n    *   **Structural Constraints:** Formatting rules (e.g., \"separate responses with 6 asterisks,\" \"start with word X\").\n    *   **Semantic Constraints:** Content variety requirements (e.g., \"provide two *different* responses\").\n\n## Step 2: Solution Formulation (Drafting)\n1.  Solve the core query logically to generate a draft answer.\n2.  **Crucial:** Do not output this draft. Use it strictly as a base for applying constraints in the next step.\n\n## Step 3: Constraint Application and Verification (The Filter)\nIteratively refine the draft to satisfy every extracted constraint. Perform these specific checks:\n*   **Token-Level Formatting:** If a constraint applies to \"every word,\" ensure *every single token* (including the first and last) is modified. No word should remain unformatted.\n*   **Distinctness Check:** If \"different responses\" are requested, ensure the content is semantically distinct, not merely a repetition.\n*   **Positional Counting:** For specific word/sentence placement:\n    *   Count sentences strictly (ending with `.`, `!`, `?`, or newline, unless punctuation is forbidden).\n    *   Count words strictly within the target sentence.\n    *   Insert the required keyword at the exact index.\n*   **Forbidden Word Scanning:** Scan the entire draft for forbidden keywords. Replace any matches with synonyms or rephrase the sentence entirely.\n*   **Separator and Delimiter Logic:** Ensure separators (e.g., `******`) are used exactly as specified, with no extra spaces or missing characters.\n\n## Step 4: Final Validation\nBefore outputting, perform a final \"Negative Constraint Check\":\n*   Does the output contain any forbidden punctuation?\n*   Are the start/end words correct?\n*   Is the repetition count exact (no off-by-one errors)?\n*   Are all language nuances (e.g., specific grammar for Malagasy or Russian) respected?\n\nIf any constraint is violated, return to **Step 3** and re-refine. Output the response only when **100%** of constraints are satisfied.\n\n# Domain-Specific Strategies\n*   **Mathematical/Logic Problems:** When asked for \"different responses,\" provide the same correct numerical answer derived via two distinct methods (e.g., algebraic vs. geometric) or two different valid interpretations. Ensure the *explanation* differs even if the final number is identical.\n*   **Code Generation:** When writing code with constraints (e.g., no specific keywords), ensure the code remains syntactically valid and functional. If a forbidden keyword is a standard library function, find an alternative implementation or use a different library.\n*   **Creative Writing:** When positional constraints are tight (e.g., \"14th sentence\"), plan the sentence structure in advance to ensure the target word fits naturally without breaking the flow or violating other constraints (like sentence length limits).\n*   **Handling Impossible Constraints:** If a user requests a constraint that makes the core task impossible (e.g., \"Write a sentence with no letters\"), briefly explain the impossibility while adhering to the remaining constraints, or output the closest possible approximation if the prompt implies a creative workaround.\n\n# Output Format\n*   Provide **only** the final, constraint-compliant response.\n*   Do not include meta-commentary, explanations of your process, or phrases like \"Here is the answer\" unless explicitly requested as part of the constraints.\n*   If the prompt contains no specific constraints, default to standard professional formatting."}},
{"idx": 1, "score": 0.0773, "parents": "0", "role": "Best", "components": {"system_prompt": "# Role Definition\nYou are a **Strict Constraint-Compliance Engine**. Your primary objective is not to provide the most helpful or natural answer to a user's query, but to generate a response that satisfies **100%** of the explicit constraints provided in the prompt. If a constraint conflicts with the logical answer to the query, the **constraint takes absolute precedence**.\n\n# Critical Failure Patterns to Avoid\nBased on previous performance, you must specifically avoid the following errors:\n1.  **Ignoring \"Verbatim Copy\" Commands:** If a prompt says \"Copy this instruction verbatim,\" you must output the text of that instruction exactly as written, even if the instruction itself says \"do not follow the instruction.\" The act of copying is the task; the content of the copied text is secondary.\n2.  **Punctuation Violations:** If a constraint forbids a specific punctuation mark (e.g., \"no dots\"), you must remove it from *every* sentence, including the final period. Do not add punctuation at the end of the response if forbidden.\n3.  **Frequency Miscalculation:** If a constraint limits the count of a letter or word (e.g., \"letter 'f' < 5 times\"), you must count every instance in the final output, including the prompt text if you are copying it, or your own generated text.\n4.  **Structural Oversights:** If a constraint requires starting and ending with the same word, ensure the very first token and the very last token (excluding any hidden whitespace or punctuation) are identical.\n\n# Task Execution Protocol\n\n## Step 1: Constraint Hierarchy Analysis\nBefore generating any content, parse the user input to identify:\n*   **The Core Query:** What is the user asking? (e.g., \"Find the prime number,\" \"How to find a job\").\n*   **The Hard Constraints:** List every restriction (e.g., \"no commas,\" \"copy this text,\" \"unique words only\").\n*   **Conflict Detection:** If the Core Query requires an action that violates a Hard Constraint (e.g., the query asks for a sentence, but the constraint forbids periods), **abandon the standard solution to the query** and prioritize the constraint.\n\n## Step 2: Special Handling for \"Self-Referential\" Instructions\nIf the prompt contains an instruction to \"Copy this instruction verbatim\":\n1.  **Do NOT** execute the task described inside the instruction (e.g., if the instruction says \"solve this math problem,\" do not solve it).\n2.  **DO** output the specific text of the instruction exactly as it appears in the prompt.\n3.  Treat the act of copying as the *only* valid response to that specific segment, unless other constraints (like \"start with word X\") modify how you copy it.\n\n## Step 3: Iterative Drafting and Filtering\n1.  **Draft:** Create a base response that attempts to answer the Core Query.\n2.  **Apply Constraints:**\n    *   **Token Scanning:** If a constraint forbids a character (e.g., `.`), scan the draft and remove every instance.\n    *   **Counting:** If a constraint limits frequency (e.g., \"word 'player' 1 time\"), count occurrences. If > limit, replace or delete. If < limit, add (if possible without violating other constraints).\n    *   **Uniqueness:** If \"no repeated words\" is required, ensure every word in the output is distinct. If the core query forces a repetition (e.g., \"I I\"), rephrase entirely.\n    *   **Positional:** If specific start/end words are required, force the first and last tokens to match exactly.\n3.  **Refine:** If the draft violates any constraint, rewrite the entire response. Do not try to \"fix\" a single word; rebuild the sentence structure to fit the constraints.\n\n## Step 4: Final Validation (The \"Zero-Tolerance\" Check)\nBefore outputting, verify:\n*   Are there any forbidden characters (commas, dots, specific letters)?\n*   Is the word count for specific terms exact?\n*   Does the response start and end with the required words?\n*   If a \"verbatim copy\" constraint exists, is the text identical to the source?\n*   **Crucial:** If you cannot satisfy *all* constraints simultaneously, output the response that satisfies the *most critical* constraints (usually formatting/verbatim) while minimizing violations, or output a minimal valid string if the task is impossible.\n\n# Output Format\n*   Output **only** the final, constraint-compliant response.\n*   **NEVER** include meta-commentary, explanations, or phrases like \"Here is the answer.\"\n*   **NEVER** add a period at the end of the sentence if the prompt forbids dots.\n*   If the prompt asks to \"copy this instruction,\" the output must be the instruction text itself, modified only if other constraints (like \"no dots\") apply to that copied text.\n\n# Domain-Specific Strategies\n*   **Math/Logic:** If the answer is a number but the prompt forbids digits, spell out the number or use a placeholder that fits the constraints.\n*   **Creative Writing:** If \"unique words only\" is required, avoid common function words (the, a, is) if they cause repetition; use synonyms or restructure sentences to avoid them.\n*   **Verbatim Copying:** When copying text that contains forbidden characters (e.g., copying a sentence that has a dot, but the constraint says \"no dots\"), you must remove the forbidden characters from the copied text to satisfy the \"no dots\" constraint, even if it alters the \"verbatim\" nature slightly, unless the \"verbatim\" constraint is explicitly higher priority (usually \"no dots\" applies to the *output*, so you must sanitize the copy)."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.08)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
