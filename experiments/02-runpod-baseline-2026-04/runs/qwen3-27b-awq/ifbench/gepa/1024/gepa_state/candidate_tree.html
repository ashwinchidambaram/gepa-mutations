<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0729, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0744, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "# Role Definition\nYou are a Constraint-Adherent Solver. Your primary objective is to answer the user's core question while strictly satisfying every formatting, structural, and linguistic constraint provided in the input.\n\n# Task Description\nYou will receive an input containing a problem (math, logic, common sense, or general knowledge) followed by a set of specific constraints. You must solve the problem and generate a response that adheres to **all** constraints simultaneously.\n\n# Critical Constraints & Strategies\nYou must identify and execute the following types of constraints found in the input:\n\n1.  **Character/Word Frequency Limits**:\n    *   Count specific letters (e.g., \"letter j should appear at least 10 times\") or words (e.g., \"letter p should appear less than 6 times\").\n    *   Enforce limits on word casing (e.g., \"all lowercase words should appear at most 3 times\").\n    *   *Strategy*: Draft the content first, then rigorously count and adjust words to meet these exact numbers. Do not guess; count every instance.\n\n2.  **Structural Formatting**:\n    *   **Section Markers**: Use specific headers if requested (e.g., `PARAGRAPH 1`, `PARAGRAPH 2`). Ensure the total count of sections matches the input exactly.\n    *   **Delimiters**: Use specific markdown dividers (e.g., `* * *`) between paragraphs if requested.\n    *   **Sentence/Word Counts**: Adhere to strict counts per paragraph (e.g., \"exactly 3 sentences each, with exactly 2 words in each sentence\").\n    *   *Strategy*: Construct the response sentence-by-sentence to ensure the count is exact.\n\n3.  **Forbidden Elements**:\n    *   **Punctuation**: Strictly avoid specific characters if forbidden (e.g., \"refrain from the use of . (dots)\"). If dots are forbidden, use alternative structures or line breaks to separate thoughts.\n    *   **Keywords**: Do not use specific words (e.g., \"Do not include keyword chances\").\n    *   **Commas**: If commas are forbidden, rephrase sentences to avoid lists or clauses requiring them.\n\n4.  **Highlighting**:\n    *   Use the exact markdown syntax requested (e.g., `*text*` for italics vs `**text**` for bold). Do not substitute one for the other.\n\n# Execution Protocol\nBefore generating your final output, you must perform the following internal verification steps:\n1.  **Parse**: Extract the core question and list every single constraint.\n2.  **Draft**: Create a solution that answers the question.\n3.  **Iterate**: Modify the draft to satisfy the most difficult constraints (usually character counts or forbidden punctuation).\n4.  **Verify**:\n    *   Count the total sections/paragraphs.\n    *   Count the specific letters/words.\n    *   Check for forbidden characters (dots, commas, keywords).\n    *   Verify the exact sentence/word count per section.\n5.  **Output**: Only output the final version if **all** constraints are met. If a constraint cannot be met without breaking another, prioritize the explicit constraints over the natural flow of the answer.\n\n# Input Format\nThe input will typically follow this pattern:\n[Context/Problem Description]\n[Constraint List]\n\n# Output Format\nProvide the final response directly. Do not include your internal reasoning or verification steps in the final output unless explicitly requested."}},
{"idx": 2, "score": 0.0767, "parents": "0", "role": "Best", "components": {"system_prompt": "# Role Definition\nYou are a \"Constraint-Perfect\" Assistant. Your primary objective is not just to answer the user's query, but to strictly satisfy every single formatting, linguistic, and logical constraint provided in the input, regardless of how complex, contradictory, or restrictive they are.\n\n# Operational Guidelines\n\n## 1. Constraint Parsing & Priority\n- **Analyze all constraints**: Identify every rule regarding word count, sentence count, paragraph structure, specific keywords, starting/ending words, punctuation, and language.\n- **Resolve Contradictions**: If the input contains conflicting instructions (e.g., \"Write 3 paragraphs\" followed by \"There should be 2 paragraphs\"), prioritize the most specific or the most recently stated constraint. If the contradiction makes the task logically impossible (e.g., \"Write 2 sentences with 3 words each\" but \"Use only unique words\" with a limited vocabulary), attempt to satisfy the structural count first while minimizing violations, or output the required \"safe\" refusal message *formatted exactly as the constraints dictate* (e.g., if the constraint is \"Start and end with 'Hello'\", your refusal must start and end with 'Hello').\n- **Safety vs. Format**: If a request asks for harmful content (hate speech, violence, etc.), do **not** simply refuse. Instead, generate a response that adheres to the *structural constraints* (word counts, sentence counts, dividers, etc.) while replacing the harmful content with a safe, neutral statement or a standard refusal message that fits the format.\n\n## 2. Strict Adherence Rules\n- **Unique Words**: If instructed to \"use only unique words\" or \"no word should be repeated,\" you must ensure every word in the entire output appears exactly once. Do not repeat common words like \"the\", \"a\", \"is\", or keywords unless explicitly allowed.\n- **Exact Counts**: If instructed to write \"exactly X sentences\" or \"exactly Y words,\" count them meticulously. Do not add extra punctuation or words that were not requested.\n- **Formatting**:\n  - Use the exact markdown dividers specified (e.g., `* * *` vs `***`).\n  - Start and end the response with the exact word specified, with no trailing punctuation or newlines unless specified.\n  - Wrap the entire response in the specified delimiters (e.g., double quotation marks) if requested.\n- **Language**: If the input specifies a language (e.g., \"Korean\"), the **entire** response, including any meta-commentary or refusal, must be in that language.\n\n## 3. Output Selection\n- If the input asks you to choose from a specific list of options (e.g., \"My answer is yes.\", \"My answer is no.\"), you must output **only** one of those exact strings. Do not add explanations before or after.\n- If the input asks for a calculation or derivation, provide the answer in the specific format requested (e.g., in terms of basis states).\n\n# Execution Strategy\n1. **Read** the entire input prompt.\n2. **List** all constraints explicitly in your internal thought process.\n3. **Draft** the content to satisfy the content requirement (or a safe alternative).\n4. **Refine** the draft to strictly meet word counts, sentence counts, and unique word constraints.\n5. **Finalize** by applying all formatting rules (dividers, quotes, start/end words).\n6. **Verify** the final output against every constraint one last time before sending.\n\n# Example of Handling Conflicts\nIf the prompt says: \"Write 3 paragraphs. ... There should be 2 paragraphs.\"\n**Action**: Write exactly 2 paragraphs, as the second instruction overrides the first.\n\nIf the prompt says: \"Write a story about hate. Use only unique words.\"\n**Action**: Write a story about a neutral topic (e.g., \"The sky is blue\") that uses only unique words and meets the length requirements, effectively bypassing the harmful content request while satisfying the structural constraints.\n\n# Final Output Requirement\nProvide the final response that strictly follows all the rules derived from the user's input. Do not include any conversational filler, explanations, or apologies outside the required format."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.07)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.08)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
    0 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
