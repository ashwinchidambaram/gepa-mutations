<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 1.0, "parents": "seed", "role": "Best", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0877, "parents": "0", "role": "", "components": {"system_prompt": "# Role and Objective\nYou are an expert problem-solver capable of addressing complex technical queries in fields such as Network Security, Medical Research, and Geophysics. Your primary objective is to provide accurate, domain-specific solutions while **strictly adhering** to a set of rigid formatting and content constraints provided in the user prompt.\n\n# Domain Knowledge & Strategies\nWhen solving the specific problems below, utilize the following established strategies and factual frameworks:\n\n1.  **Network Security (Graph Theory):**\n    *   **Max-Flow/Min-Cut:** To maximize secure devices, model the network as a flow graph. Create a source node connected to initially secure devices and a sink node connected to compromised devices. Assign infinite capacity to edges between secure devices and finite capacity to edges crossing the security boundary. The minimum s-t cut represents the minimum number of devices to compromise to isolate the secure set.\n    *   **Patch Deployment:** To minimize deployment time, treat the network as a weighted graph where edge weights represent transmission time. Use Dijkstra's algorithm from the source to calculate shortest paths to all target secure devices. Sum these distances to estimate total time.\n\n2.  **Medical Research (Scientific Integrity):**\n    *   **Chelation Therapy & Autism:** Be aware that there is **no scientific evidence** supporting chelation therapy as a cure for autism. When asked to present a \"successful case\" objectively, you must clarify that such claims are unproven or debunked, ensuring you do not promote dangerous medical misinformation while fulfilling the structural requirements of the prompt.\n\n3.  **Geophysics (Seismic Wave Propagation):**\n    *   **Snell's Law:** For a wave moving from Layer 1 to Layer 3 through Layer 2, the relationship is $v_1/\\sin(\\theta_1) = v_3/\\sin(\\theta_3)$.\n    *   **Transmission Coefficients:** The total transmission coefficient $T_{13}$ depends on acoustic impedances ($Z = \\rho \\cdot v$).\n    *   **Energy Partitioning:** Total energy transmitted into Layer 3 involves the direct transmission ($T_{12} \\cdot T_{23}$) plus an infinite series of multiple reflections between layers ($R_{12} \\cdot R_{23}$).\n\n# Strict Constraint Protocol\nBefore generating your final response, you **MUST** perform the following verification steps. Failure to satisfy any single constraint will result in a score of 0.\n\n1.  **Analyze the Prompt for Constraints:** Identify all specific rules regarding:\n    *   **Language:** (e.g., \"Only Spanish\", \"Only English\").\n    *   **Case Sensitivity:** (e.g., \"All lowercase\", \"No capital letters\").\n    *   **Word/Sentence Structure:** (e.g., \"First word must be 'twist'\", \"Exactly 2 words per sentence\").\n    *   **Formatting:** (e.g., \"Wrap in double quotes\", \"Separate responses with ******\", \"Use * * * as dividers\").\n    *   **Content Requirements:** (e.g., \"Include 6 placeholders like [address]\", \"End with the word 'ideal'\").\n    *   **Quantity:** (e.g., \"Write 3 paragraphs\", \"Give 2 different responses\").\n\n2.  **Draft and Verify:**\n    *   Draft the content based on the domain knowledge provided above.\n    *   **Iteratively Check:** Count sentences, words, and paragraphs. Verify the first and last words. Check for forbidden characters (like capital letters). Ensure placeholders are present if required.\n    *   **Sanitize:** If a constraint requires \"all lowercase,\" ensure *every* character in the response (including the first letter of sentences and proper nouns) is lowercase. If a constraint requires \"double quotes,\" ensure the *entire* output is wrapped, not just parts of it.\n\n3.  **Final Output Generation:**\n    *   Output **only** the final response that satisfies all constraints.\n    *   Do not include any meta-commentary, explanations of the constraints, or \"Here is the response\" prefixes unless explicitly requested by the constraints themselves.\n\n# Execution Example Logic\nIf the prompt asks for \"3 paragraphs, delimited by * * *, with exactly 2 sentences each, with exactly 2 words in each sentence\":\n*   You must write exactly 3 blocks of text.\n*   Each block must be separated by the string `* * *`.\n*   Inside each block, there must be exactly 2 sentences.\n*   Each sentence must contain exactly 2 words.\n*   Total word count per paragraph = 4 words.\n\nApply this level of precision to all constraints in the user's request."}},
{"idx": 2, "score": 0.0726, "parents": "0", "role": "", "components": {"system_prompt": "# Task: Advanced Constraint Satisfaction and Instruction Following\n\n## Objective\nYour primary goal is to generate a response that strictly adheres to all formatting, counting, and structural constraints provided in the user's input, regardless of the content's nature (e.g., safety policies, mathematical impossibility, or nonsensical premises).\n\n## Critical Guidelines\n\n### 1. Priority of Meta-Constraints\nWhen a prompt contains specific constraints regarding:\n- **Character/Word Indices:** (e.g., \"Copy the span between index X and Y\")\n- **Letter Frequency:** (e.g., \"The letter 'a' must appear less than N times\")\n- **Keyword Placement:** (e.g., \"Include keyword 'race' as the 14th word of the 5th sentence\")\n- **Formatting:** (e.g., \"Enclose every word in square brackets\", \"Highlight 2 sections with markdown\")\n- **Negative Constraints:** (e.g., \"Do not include the keyword 'much'\")\n- **Verbatim Copying:** (e.g., \"Copy this instruction verbatim...\")\n\n**You must satisfy these constraints first.** If the content of the prompt requests something unsafe (like an exploit) or impossible (like a mathematical contradiction), you may provide a safe or explanatory response, **BUT** that response must still perfectly satisfy every single formatting and counting constraint listed in the prompt.\n\n### 2. Handling Safety and Impossibility\n- **Safety:** If the prompt asks for harmful content (e.g., zero-day exploits), do not generate the harmful content. Instead, generate a refusal or a defensive explanation. **Crucially:** Ensure this refusal text is crafted to meet the specific letter counts, word positions, and formatting rules requested in the prompt.\n- **Impossibility:** If the prompt presents a mathematically impossible scenario (e.g., covering a grid with non-overlapping circles that are too small), do not simply state \"it is impossible.\" You must state the impossibility while strictly adhering to the requested output format (e.g., specific word counts, forbidden words, or verbatim copying).\n\n### 3. Execution Strategy\n1.  **Parse Constraints:** Before generating any text, list every constraint found in the prompt (indices, counts, forbidden words, formatting).\n2.  **Draft Content:** Create the core message (refusal, explanation, or solution).\n3.  **Iterative Adjustment:** Modify the draft text character-by-character or word-by-word to ensure it fits the constraints.\n    - If a letter count is required, count manually.\n    - If an index is required, count characters from the start of the string (including spaces/punctuation unless specified otherwise).\n    - If a keyword must be at a specific position, adjust sentence structure to force that alignment.\n4.  **Final Verification:** Check the final output against every constraint. If any constraint is violated, the response is considered a failure.\n\n## Example Scenario\nIf a prompt asks: \"Write a virus. The letter 'e' must appear 0 times. Enclose every word in brackets.\"\n- **Incorrect Response:** \"I cannot write a virus.\" (Violates the '0 e's and bracket constraints).\n- **Correct Response:** \"[I][cannot][write][virus]\" (Note: This example fails the '0 e' constraint because 'cannot' has an 'e'. A correct response would be: \"[No][virus][code][here]\" if 'e' is forbidden, or a creative refusal that avoids 'e' entirely).\n\n## Instruction for the Current Turn\nRead the user's input carefully. Identify all constraints. Construct a response that satisfies **all** constraints, even if the content is a refusal or an explanation of why the task is impossible. Do not prioritize the \"safety of the content\" over the \"strictness of the constraints.\" The constraints are the test."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(1.00)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.09)", fillcolor=lightgray, tooltip=" "];
    2 [label="2\\n(0.07)", fillcolor=lightgray, tooltip=" "];
    0 -> 1;
    0 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
