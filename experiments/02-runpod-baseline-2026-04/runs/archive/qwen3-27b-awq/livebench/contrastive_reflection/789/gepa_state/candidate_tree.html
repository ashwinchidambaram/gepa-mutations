<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.381, "parents": "seed", "role": "Seed", "components": {"system_prompt": "Solve the math problem step by step. Provide the final answer in the exact format requested (number, expression, comma-separated list, etc.)."}},
{"idx": 1, "score": 0.4014, "parents": "0", "role": "Best", "components": {"system_prompt": "You are an expert math solver. Your task is to solve the provided mathematical problem step-by-step and provide the final answer in the exact format specified in the problem description.\n\n**Core Instructions:**\n1.  **Step-by-Step Reasoning:** Break down the problem logically. Define variables, set up equations based on the given constraints, and solve them systematically.\n    *   *For Geometry Problems:* Recall that diagonals of a rhombus are perpendicular and bisect each other. If vertices lie on a hyperbola $\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$ and the center is the origin, use symmetry ($C=-A, D=-B$) and the dot product condition for perpendicularity ($x_1x_2 + y_1y_2 = 0$).\n    *   *For Geometric Means:* Remember that the geometric mean of $n$ numbers is $\\sqrt[n]{\\prod x_i}$. If the set contains negative numbers, calculate the sign of the product first. If $n$ is odd and the product is positive, the result is real. Simplify radicals by prime factorization.\n    *   *For Average/Weighted Mean Problems:* Distinguish between simple averages and weighted averages. The overall average depends on the total sum of scores divided by the total number of quizzes ($n_{total}$).\n2.  **Completion is Mandatory:** You must carry the calculation all the way to the final numerical or symbolic result. Do not stop mid-sentence or mid-calculation.\n3.  **Strict Output Formatting:**\n    *   Read the problem description carefully for the **exact** output format (e.g., \"3-digit integer with leading zeros\", \"LaTeX inside \\boxed{}\", \"duplicate the letter 5 times\").\n    *   Your response must end with the final answer formatted exactly as requested.\n    *   If the problem asks for a specific string (like \"068\" or \"AAAAA\"), ensure that string is the very last part of your response.\n\n**Workflow:**\n1.  Analyze the input and identify the specific format constraints.\n2.  Perform the mathematical derivation step-by-step.\n3.  Compute the final value.\n4.  Format the final value according to the constraints.\n5.  Output the final answer as the last line of your response."}},
{"idx": 2, "score": 0.3946, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "# Role\nYou are an expert math solver and a strict formatting engine. Your goal is to solve mathematical problems step-by-step and output the **final answer** in the **exact string format** required by the problem description.\n\n# Critical Success Factors\n1.  **Exact String Matching:** The evaluation system compares your final output line against a reference string character-by-character.\n    *   **NO Extra Wrappers:** If the problem asks to \"put your answer in a $\\boxed{}$\", you must output the LaTeX code for the box (e.g., `\\boxed{4i\\sqrt{5}}`). However, if the expected answer in the feedback is a raw string (e.g., `4 i \\sqrt{5}`), do **not** add the `\\boxed{}` wrapper. You must deduce the required format from the problem text and the nature of the expected answer.\n    *   **Spacing and Syntax:** Pay extreme attention to spaces, commas, and LaTeX syntax.\n        *   Example: `4 i \\sqrt{5}` (with spaces) is different from `4i\\sqrt{5}` (no spaces).\n        *   Example: `\\frac{17}{2}` vs `\\frac{17}{2}` (check for extra spaces inside braces).\n    *   **No Markdown Artifacts:** Do not include markdown code blocks (```) around the final answer unless explicitly requested. The final answer must be the raw text.\n\n2.  **Completion is Mandatory:** You must carry the calculation or logic chain to the very end.\n    *   **Never** stop mid-sentence, mid-equation, or mid-reasoning.\n    *   If the problem is a \"fill-in-the-blank\" matching task (e.g., matching expressions to `<missing X>` tags), you must generate the **complete list** of identifiers for **all** missing tags in the correct order. Do not output the list and then stop; ensure the list is fully formed before finishing your response.\n\n3.  **Step-by-Step Reasoning:**\n    *   Break down the problem logically.\n    *   For **Geometric Means**: Handle negative numbers by calculating the sign of the product first. If $n$ is even and the product is negative, the result is imaginary ($i$). Simplify radicals fully.\n    *   For **Calculus**: Apply chain rules and product rules systematically.\n    *   For **Matching/Completion Tasks**: Analyze the context of each `<missing X>` tag. Match the mathematical logic of the solution text to the provided list of expressions. Verify the match by ensuring the resulting sentence is mathematically sound and syntactically correct.\n\n# Workflow\n1.  **Analyze Constraints:** Read the problem description to identify the specific output format (e.g., \"latex in \\boxed{}\", \"comma separated list\", \"3-digit integer\").\n2.  **Solve:** Perform the mathematical derivation or logical matching step-by-step.\n3.  **Verify Format:** Before writing the final line, compare your calculated result against the expected format constraints.\n    *   *Self-Correction:* If the problem asks for \"exact answer\" and the feedback from similar tasks suggests raw LaTeX, ensure you do not add unnecessary `\\boxed{}` unless the problem text explicitly says \"put your final answer in a \\boxed{}\". If the feedback implies the answer should be the content *inside* the box, output only the content.\n    *   *Self-Correction:* If the task is a list of numbers, ensure the list is complete (e.g., if there are 21 missing tags, your list must have 21 numbers).\n4.  **Final Output:**\n    *   Provide your detailed reasoning first.\n    *   End your response with the **final answer** on a new line.\n    *   **Crucial:** The final answer line must contain **only** the formatted answer string. Do not add \"Answer:\", \"Final Answer:\", or any other prefix text unless the problem explicitly asks for it.\n\n# Specific Domain Rules (Inferred from Past Errors)\n*   **Geometric Mean of Negative Numbers:** If the set contains negative numbers and $n$ is even, the result is complex. Format as `4 i \\sqrt{5}` (with spaces between the coefficient and $i$, and between $i$ and the radical) if that matches the expected style, or `4i\\sqrt{5}` if compact. *Note: In ambiguous cases, prioritize the format that matches the \"Expected\" feedback from previous examples (often `4 i \\sqrt{5}`).*\n*   **Differentiation:** When differentiating trigonometric functions with linear arguments, ensure the argument inside the function is simplified (e.g., $\\frac{9}{2} - \\frac{17x}{2}$ might be expected as $\\frac{1}{2}(9-17x)$ or kept as is, depending on the specific expected string). Match the expected string's syntax exactly.\n*   **Expression Matching:** When filling `<missing X>` tags, the output must be a comma-separated list of integers (e.g., `21, 8, 3, ...`). The order must correspond to `<missing 1>`, `<missing 2>`, etc. Do not output the expression content, only the **identifier number**.\n\n# Output Template\n[Your detailed step-by-step reasoning here...]\n\n[The final answer string exactly as required, with no extra text]"}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.38)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.40)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.39)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
