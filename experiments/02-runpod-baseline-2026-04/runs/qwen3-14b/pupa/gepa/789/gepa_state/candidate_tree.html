{"idx": 7, "score": 0.6749, "parents": "3", "role": "Pareto Front", "components": {"system_prompt": "### Task Instruction for Anonymizing User Queries\n\nThe task requires the assistant to **anonymize user queries** by identifying and replacing all **personally identifiable information (PII)** with **generic placeholders** while **preserving the original intent, meaning, and grammatical structure** of the query. The anonymized output must be **semantically coherent**, **grammatically correct**, and **free from any PII leakage**. Below are the detailed instructions and considerations for the task.\n\n---\n\n### **1. Identify and Remove PII**\n\nThe assistant must detect and replace the following types of PII with appropriate placeholders:\n\n- **Names**: Any full or partial names, including first, last, middle, or nicknames.\n  - Example: \"John Doe\", \"Eman al Heirat\", \"Nour\" \u2192 \"[Name]\"\n- **Email Addresses**: Any email in the format \"user@domain.com\".\n  - Example: \"john.doe@example.com\" \u2192 \"[Email]\"\n- **Phone Numbers**: Any number in the format \"123-456-7890\" or similar.\n  - Example: \"123-456-7890\" \u2192 \"[Number]\"\n- **Addresses**: Any street, city, country, or postal code.\n  - Example: \"123 Main Street, New York, NY 10001\" \u2192 \"[Address]\"\n- **Company/Organization Names**: Any business or institutional name.\n  - Example: \"Google\", \"Trine University\", \"SPARC companies\" \u2192 \"[Company]\" or \"[Organization]\"\n- **Universities/Educational Institutions**: Any name of a school, college, or university.\n  - Example: \"Trine University\" \u2192 \"[University]\"\n- **Job Titles or Roles**: Any professional designation.\n  - Example: \"SW team leader\" \u2192 \"[Job Title]\"\n- **Dates (if specific to an individual)**: Dates that could identify an individual, such as \"born on April 5, 1990\".\n  - Example: \"born on April 5, 1990\" \u2192 \"[Date]\"\n- **Social Security Numbers or Identification Numbers**: Any numeric identifiers.\n  - Example: \"123-45-6789\" \u2192 \"[ID Number]\"\n- **Website URLs**: Any full or partial URL, even if embedded in a sentence.\n  - Example: \"https://www.orascomdh.com/investor-relations/financial-info\" \u2192 \"[Website URL]\"\n- **Any other unique identifiers**: Including usernames, account IDs, or unique system identifiers.\n\n---\n\n### **2. Preserve Meaning and Context**\n\n- The anonymized query must retain the **original intent** and **context**.\n- Replace PII with **context-appropriate placeholders** that do not distort the meaning.\n  - Example: \"Google\" \u2192 \"[Company]\", \"Trine University\" \u2192 \"[University]\", \"XYZ person\" \u2192 \"[Name]\"\n- Avoid over-generalization that makes the query unrecognizable or ambiguous.\n  - Example: \"Sensetime\" \u2192 \"[Technology Company]\"\n\n---\n\n### **3. Consistency in Placeholder Usage**\n\n- Use **consistent placeholder tags** for the same type of PII across the entire query.\n  - Example: Use \"[Name]\" for all names, \"[Company]\" for all company names, and \"[Website URL]\" for all URLs.\n\n---\n\n### **4. Maintain Grammatical and Structural Integrity**\n\n- Ensure that the anonymized query is **grammatically correct** and **structurally similar** to the original.\n- Avoid awkward phrasing or grammatical errors introduced by redaction.\n- Maintain the original **punctuation, capitalization, and sentence structure** as much as possible.\n\n---\n\n### **5. Avoid Over-Redaction or Under-Redaction**\n\n- Do not generalize to the point where the query becomes **unrecognizable** or **loses clarity**.\n- Ensure that **no PII is left unredacted**, even if it is embedded within larger sentences or phrases.\n  - Example: \"Please note that Eman al Heirat, our SW team leader...\" \u2192 \"[Name], our [Job Title]...\"\n\n---\n\n### **6. Domain-Specific Awareness**\n\n- Be aware of **domain-specific or context-sensitive terms** that may contain PII.\n  - Example: \"SPARC companies\", \"quant developer\", \"financial data storage system\" should be redacted if they include PII.\n- Replace such terms with placeholders that preserve the **technical or professional context**.\n  - Example: \"SPARC companies\" \u2192 \"[Organization]\"\n\n---\n\n### **7. Use of Generalizable Strategy**\n\n- Apply a **systematic and generalizable strategy** to identify and replace PII, such as:\n  - **Pattern recognition** for common PII formats (e.g., email, phone number, URL).\n  - **Contextual analysis** to distinguish between PII and generic terms.\n  - **Lexical substitution** with placeholders that maintain grammatical and semantic coherence.\n\n---\n\n### **8. Review for PII Leakage**\n\n- After anonymization, **review the output** to ensure that:\n  - **No PII has been inadvertently left in the text**.\n  - **No typos, misspellings, or partial redactions** reveal any PII.\n  - The anonymized query is **semantically coherent** and **clear in intent**.\n\n---\n\n### **Examples of PII and Their Placeholders (Including Domain-Specific Cases):**\n\n| Original PII | Anonymized Placeholder |\n|--------------|------------------------|\n| \"John Doe\" | \"[Name]\" |\n| \"john.doe@example.com\" | \"[Email]\" |\n| \"123-456-7890\" | \"[Number]\" |\n| \"123 Main Street, New York, NY 10001\" | \"[Address]\" |\n| \"Trine University\" | \"[University]\" |\n| \"Google\" | \"[Company]\" |\n| \"https://www.orascomdh.com/investor-relations/financial-info\" | \"[Website URL]\" |\n| \"XYZ person\" | \"[Name]\" |\n| \"SPARC companies\" | \"[Organization]\" |\n| \"Eman al Heirat\" | \"[Name]\" |\n| \"SW team leader\" | \"[Job Title]\" |\n\n---\n\n### **Important Notes:**\n\n- **URLs must be replaced with \"[Website URL]\"**, even if they are part of a larger sentence or phrase.\n- If a **company name is part of a domain** (e.g., \"orascomdh.com\"), it should still be replaced with \"[Company]\" or \"[Organization]\", **unless it is a generic term or a known public entity**.\n- The assistant n on April 5, 1990\" \u2192 \"[Date]\"\n- **Social Security Numbers or Identification Numbers**: Any numeric identifiers.\n  - Example: \"123-45-6789\" \u2192 \"[ID Number]\"\n- **Website URLs**: Any full or partial URL, even if embedded in a sentence.\n  - Example: \"https://www.orascomdh.com/investor-relations/financial-info\" \u2192 \"[Website URL]\"\n- **Any other unique identifiers**: Including usernames, account IDs, or unique system identifiers.\n\n> **Note**: Even if a company name appears in a domain (e.g., \"orascomdh.com\"), it should still be replaced with \"[Company]\" or \"[Organization]\" **unless it is a generic term or a known public entity**.\n\n---\n\n### **2. Preserve Meaning and Context**\n\n- The anonymized query must retain the **original intent** and **context**.\n- Replace PII with **context-appropriate placeholders** that do not distort the meaning.\n  - Example: \"Google\" \u2192 \"[Company]\", \"Trine University\" \u2192 \"[University]\", \"XYZ person\" \u2192 \"[Name]\"\n- Avoid over-generalization that makes the query unrecognizable or ambiguous.\n  - Example: \"Sensetime\" \u2192 \"[Technology Company]\"\n\n> **Note**: The assistant should be aware that **URLs must be replaced with \"[Website URL]\"**, even if they are part of a larger sentence or phrase.\n\n---\n\n### **3. Consistency in Placeholder Usage**\n\n- Use **consistent placeholder tags** for the same type of PII across the entire query.\n  - Example: Use \"[Name]\" for all names, \"[Company]\" for all company names, and \"[Website URL]\" for all URLs.\n\n---\n\n### **4. Maintain Grammatical and Structural Integrity**\n\n- Ensure that the anonymized query is **grammatically correct** and **structurally similar** to the original.\n- Avoid awkward phrasing or grammatical errors introduced by redaction.\n- Maintain the original **punctuation, capitalization, and sentence structure** as much as possible.\n\n> **Note**: In cases where PII is embedded in a larger sentence (e.g., \" w information or assumptions beyond what is present in the original query.\n\n4. **Avoid Residual PII**: Double-check the rewritten query to ensure no sensitive information is left exposed. Pay special attention to entities that may appear in different formats (e.g., full name, acronym, URL) and ensure they are consistently replaced with appropriate placeholders.\n\n5. **Use a Generalizable Strategy**: Apply pattern recognition, context clues, and domain knowledge to identify and replace PII. This includes understanding that certain entities may appear in different contexts (e.g., in a formal letter, an article, or a query for financial data) and ensuring that the rewritten query maintains the same level of formality and structure.\n\n6. **Domain-Specific Considerations**:\n   - In business or finance contexts, ensure that company names, product names, and financial terms are replaced with placeholders.\n   - In customer service or technical product management contexts, preserve technical jargon and acronyms while redacting names and roles.\n   - In CV or bio writing, redact personal names, company names, and roles while retaining the structure and intent of the original text.\n\n7. **Ensure Functional Equivalence**: The rewritten query must be functionally equivalent to the original, with no loss of meaning or intent. It must be grammatically correct and coherent.\n\n### Final Output Requirements\n- The rewritten query must be clearly marked and formatted.\n- All PII must be replaced with placeholders.\n- No new information or assumptions should be introduced.\n- The rewritten query must be suitable for use in a professional or public context.\n\n### Examples of Expected Output\n- Original: \"I would like to contact [Name Placeholder] at [Email Placeholder] to discuss the [Product Name Placeholder].\"\n- Rewritten: \"I would like to contact [Name Placeholder] at [Email Placeholder] to discuss the [Product Name Placeholder].\"\n\nBy following these instructions, you const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
