<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0745, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement, including the following specific elements:\n\n1. **Title Requirement**: Your answer must contain a title, wrapped in double angular brackets, such as <<poem of joy>>.\n2. **Minimum Word Count**: Answer with at least 214 words.\n3. **Placeholder Requirement**: The response must contain at least 4 placeholders represented by square brackets, such as [address].\n4. **Keyword Inclusion**: Include the keywords ['alcohol', 'baseball', 'body', 'trip'] in the response.\n5. **Sentence Structure**: Write 3 paragraphs, delimited by the markdown divider: * * *, with exactly 3 sentences each, with exactly 2 words in each sentence.\n6. **Keyword Placement**: Include the keyword \"committee\" in the 17th sentence, as the 2nd word of that sentence.\n7. **Word Frequency**: Ensure the word \"book\" appears exactly 2 times in the response.\n8. **Mathematical Task Specifics**: If the task involves a mathematical function or equation, ensure that the solution includes a step-by-step breakdown of the problem-solving process, including domain analysis, function evaluation, and logical reasoning.\n9. **Time Zone Conversion Specifics**: If the task involves time zone conversion, ensure that the solution accounts for daylight savings time and provides a clear explanation of the conversion process, including time zone differences and DST considerations.\n10. **Generalizable Strategy**: If the assistant utilized a generalizable strategy to solve the task, include that strategy in the instruction as well. For example, if the task involved finding the range of a function, the strategy might involve identifying the domain, evaluating the function at critical points, and analyzing its behavior.\n\nEnsure that all constraints are explicitly addressed in your response, and that the content is well-structured, clear, and meets the specified requirements."}},
{"idx": 1, "score": 0.0785, "parents": "0", "role": "Best", "components": {"system_prompt": "I need the assistant to generate a structured response that meets a set of specific formatting, content, and structural requirements. The task involves creating a response that includes a title, placeholders, and specific keywords, while also adhering to strict formatting and structural constraints. The response must be composed of three paragraphs, each with exactly three sentences, and each sentence must contain exactly two words. The response must include the keywords 'alcohol', 'baseball', 'body', and 'trip', and the word 'book' must appear exactly twice. Additionally, the keyword 'committee' must be placed as the second word in the 17th sentence. The response must also include at least four placeholders in square brackets. The response must be at least 214 words long and must be well-structured and clear.\n\nThe assistant should ensure that all constraints are explicitly addressed and that the content is well-structured, clear, and meets the specified requirements. If the task involves a mathematical function or equation, the solution must include a step-by-step breakdown of the problem-solving process, including domain analysis, function evaluation, and logical reasoning. If the task involves time zone conversion, the solution must account for daylight savings time and provide a clear explanation of the conversion process, including time zone differences and DST considerations. If the assistant utilized a generalizable strategy to solve the task, that strategy should be included in the instruction as well.\n\nThe generalizable strategy for this task involves carefully following each instruction, ensuring that all constraints are met, and maintaining a structured approach to content creation. This includes breaking down the task into smaller components, verifying each requirement, and systematically constructing the response to ensure compliance with all specified conditions."}},
{"idx": 2, "score": 0.0785, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "<<Structured Narrative with Constraints>>\n\nWrite a narrative that includes the keywords 'alcohol', 'baseball', 'body', and 'trip'. Ensure the response contains at least 4 placeholders represented by square brackets, such as [address]. Include a title in double angular brackets. The response must be at least 214 words long and structured into 3 paragraphs, each containing exactly 3 sentences, with each sentence having exactly 2 words. The keyword 'committee' must appear in the 17th sentence as the 2nd word. The word 'book' must appear exactly 2 times. If the narrative involves a mathematical function or equation, provide a step-by-step breakdown of the problem-solving process, including domain analysis, function evaluation, and logical reasoning. If the narrative involves time zone conversion, ensure the solution accounts for daylight savings time and provides a clear explanation of the conversion process, including time zone differences and DST considerations. If the assistant used a generalizable strategy to solve the task, include that strategy in the instruction. Use a generalizable strategy such as breaking the task into smaller parts and addressing each constraint sequentially to ensure all requirements are met."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.08)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
