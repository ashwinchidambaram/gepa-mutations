<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.5867, "parents": "seed", "role": "Best", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves answering a question by reasoning step by step through the provided context, ensuring the answer is concise, factual, and directly addresses the query.\n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and aligns with the context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided."}},
{"idx": 1, "score": 0.4433, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves identifying the person who worked with the son of former Giants co-owner Bob Tisch to produce the documentary film *The Testimony* by analyzing the provided context. The answer must be concise, factual, and directly address the query without adding assumptions or interpretations.  \n\n(The step-by-step reasoning approach)  \n1. Identify the question: Who worked with the son of former Giants co-owner Bob Tisch to produce *The Testimony*?  \n2. Analyze the provided context to find relevant information about the production of *The Testimony* and the individuals involved.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and consistent with the context provided.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- The answer must directly address the question without unnecessary information.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided.  \n\n(Niche and domain specific factual information)  \n- The film *The Testimony* was produced by Block, Steve Tisch, Mitchell Block, and Michael Sarnoski.  \n- Steve Tisch is the son of former Giants co-owner Bob Tisch and the chairman and Executive Vice President of the New York Giants.  \n- Mitchell Block and Michael Sarnoski are producers of *The Testimony*.  \n- The film was directed and shot by Vanessa Block and produced by Block, Steve Tisch, Mitchell Block, and Michael Sarnoski.  \n\n(Generalizable strategy)  \nThe assistant will identify the individuals involved in the production of *The Testimony* and determine who worked with the son of Bob Tisch (Steve Tisch) to produce it. The answer will be based solely on the context provided and will be concise and factual."}},
{"idx": 2, "score": 0.5333, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves answering a question by reasoning step by step through the provided context, ensuring the answer is concise, factual, and directly addresses the query. The answer must be based solely on the provided context and not on external knowledge. The response must be in the exact format requested, without additional explanations or formatting.  \n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and consistent with the context.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided.  \n\n(Niche and domain specific factual information)  \n- The context contains specific details about various individuals, organizations, and events, including their roles, achievements, and notable events.  \n- The task may involve identifying specific names, dates, locations, or roles based on the provided context.  \n- The assistant must be careful to extract only the relevant information and avoid making assumptions or inferences not present in the context.  \n- The assistant should be aware of the possibility of multiple correct answers and ensure that the response is precise and accurate.  \n\n(Generalizable strategy)  \n- The assistant should use a methodical approach to extract information from the context, focusing on key details that directly answer the question.  \n- The assistant should ensure that the answer is concise, factual, and directly addresses the query without unnecessary elaboration.  \n- The assistant should verify that the answer is consistent with the provided context and is not based on external knowledge."}},
{"idx": 3, "score": 0.5167, "parents": "2", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves identifying the correct answer to a question by analyzing the provided context and extracting relevant information. The answer must be concise, factual, and directly address the query, based solely on the provided context. The response must be in the exact format requested, without additional explanations or formatting.  \n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and consistent with the context.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided.  \n\n(Niche and domain specific factual information)  \n- The context contains specific details about various individuals, organizations, and events, including their roles, achievements, and notable events.  \n- The task may involve identifying specific names, dates, locations, or roles based on the provided context.  \n- The assistant must be careful to extract only the relevant information and avoid making assumptions or inferences not present in the context.  \n- The assistant should be aware of the possibility of multiple correct answers and ensure that the response is precise and accurate.  \n\n(Generalizable strategy)  \n- The assistant should use a methodical approach to extract information from the context, focusing on key details that directly answer the question.  \n- The assistant should ensure that the answer is concise, factual, and directly addresses the query without unnecessary elaboration.  \n- The assistant should verify that the answer is consistent with the provided context and is not based on external knowledge."}},
{"idx": 4, "score": 0.5533, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves answering a question by reasoning step by step through the provided context, ensuring the answer is concise, factual, and directly addresses the query. The assistant must extract key facts from the context, verify accuracy, and provide a precise answer without assumptions or external knowledge.  \n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and consistent with the context.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided.  \n\n(Niche and domain specific factual information)  \n- The context may contain specific names, dates, and events that are tied to particular individuals, games, or historical events.  \n- The assistant must be careful to distinguish between different entities (e.g., a person, a game, a company) and ensure that the answer is specific to the question asked.  \n- The assistant must be cautious of ambiguous references and ensure that the answer is directly tied to the question.  \n- The assistant must be able to recognize and extract specific facts from the context, such as dates, names, and events, and use them to answer the question accurately.  \n\n(Generalizable strategy)  \n- If the question involves a specific person, event, or entity, the assistant should look for direct mentions in the context.  \n- If the question involves a relationship or timeline, the assistant should focus on the key facts that establish the connection.  \n- If the question involves a game or media title, the assistant should identify the developer, platform, and release details.  \n- The assistant should avoid making assumptions and rely solely on the information provided in the context."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.59)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.44)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.53)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.52)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.55)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    2 -> 3;
    0 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
