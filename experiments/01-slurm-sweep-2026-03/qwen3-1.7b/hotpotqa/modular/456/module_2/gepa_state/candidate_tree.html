<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.5733, "parents": "seed", "role": "Best", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves answering a question by reasoning step by step through the provided context, ensuring the answer is concise, factual, and directly addresses the query.\n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and aligns with the context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided."}},
{"idx": 1, "score": 0.5633, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves answering a question by reasoning step by step through the provided context, ensuring the answer is concise, factual, and directly addresses the query. The answer must be based solely on the provided context and not on external knowledge. The answer should be in the exact format requested, without additional explanations or formatting. The assistant must identify key facts from the context, extract relevant information, and synthesize it into a concise answer.\n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and aligns with the context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided.\n\n(Niche and domain specific factual information)  \n- The context includes specific names, events, and roles (e.g., \"The Testimony\" film, \"The 55th Rifle Division\", \"Landwehr\", \"88th Infantry Division\", \"Australian Army Training Team Vietnam\", \"Finola Dwyer\", \"Steve Tisch\", \"Mitchell Block\", \"Michael Sarnoski\", etc.).  \n- The task may involve identifying specific individuals, organizations, or events mentioned in the context.  \n- The assistant must be careful to extract only the relevant information and avoid including external knowledge.  \n- The assistant must ensure that the answer is precise, accurate, and directly addresses the query without interpretation or assumption.\n\n(Generalizable strategy)  \n- The assistant should use a structured approach to extract and verify information from the context.  \n- The assistant should identify key entities, relationships, and events mentioned in the context.  \n- The assistant should ensure that the answer is concise, factual, and directly answers the question without unnecessary details.  \n- The assistant should verify the accuracy of the answer by cross-checking with the provided context."}},
{"idx": 2, "score": 0.57, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves answering a question by reasoning step by step through the provided context, ensuring the answer is concise, factual, and directly addresses the query. The answer must be based solely on the provided context and not on external knowledge. The answer should be in the exact format requested, without additional explanations or formatting. The assistant must identify key facts from the context, extract relevant information, and synthesize it into a concise answer without adding assumptions or interpretations. The assistant must verify that the answer is accurate and consistent with the context provided.\n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and aligns with the context.\n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.\n\n(Niche and domain specific factual information)  \n- The context includes specific names, events, and roles (e.g., \"The Testimony\" film, \"The 55th Rifle Division\", \"Landwehr\", \"88th Infantry Division\", \"Australian Army Training Team Vietnam\", \"Finola Dwyer\", \"Steve Tisch\", \"Mitchell Block\", \"Michael Sarnoski\", etc.).  \n- The task may involve identifying specific individuals, organizations, or events mentioned in the context.  \n- The assistant must be careful to extract only the relevant information and avoid including external knowledge.  \n- The assistant must ensure that the answer is precise, accurate, and directly addresses the query without interpretation or assumption.\n\n(Generalizable strategy)  \n- The assistant should use a structured approach to extract and verify information from the context.  \n- The assistant should identify key entities, relationships, and events mentioned in the context.  \n- The assistant should ensure that the answer is concise, factual, and directly answers the question without unnecessary details.  \n- The assistant should verify the accuracy of the answer by cross-checking with the provided context."}},
{"idx": 3, "score": 0.57, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task involves answering a question by reasoning step by step through the provided context, ensuring the answer is concise, factual, and directly addresses the query. The answer must be based solely on the provided context and not include external knowledge. The response should be in the exact format requested, without additional explanations or formatting.  \n\n(The step-by-step reasoning approach)  \n1. Identify the question or query that needs to be answered.  \n2. Analyze the provided context to find relevant information.  \n3. Extract key facts or details from the context that directly relate to the question.  \n4. Synthesize the information into a concise, factual answer without adding assumptions or interpretations.  \n5. Verify that the answer is accurate and consistent with the context.  \n\n(Output format requirements and constraints)  \n- The answer must be concise and factual.  \n- Each module should be self-contained and address one aspect of the task.  \n- The final answer should be in the exact format requested, without additional explanations or formatting.  \n- Avoid any markdown or extra text beyond the specified modules.  \n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer by including unnecessary information.  \n- Ensure that the answer is based solely on the provided context and not on external knowledge.  \n- Be cautious of ambiguous or vague questions that may require more clarification.  \n- Verify that the answer is accurate and consistent with the context provided.  \n\n(Niche and domain specific factual information)  \n- The task requires precise identification of specific individuals, events, and dates based on the provided context.  \n- The answer must be accurate and consistent with the exact information given in the context.  \n- The assistant must be aware of the specific names, titles, and dates mentioned in the context, such as \"Dennis Allen,\" \"Chris Stockley,\" \"The Dingoes,\" and \"1971\" as a specific year.  \n- The assistant must avoid making assumptions or inferences beyond the provided text.  \n- The assistant must ensure that the answer is based on the exact information in the context and not on external knowledge or general knowledge.  \n- The assistant must be aware of the structure of the context, such as the mention of \"the man who shot Chris Stockley\" and the year \"1971\" in the context.  \n\n(Generalizable strategy)  \n- The assistant should use a structured approach to identify the question, analyze the context, extract relevant information, and synthesize the answer.  \n- The assistant should ensure that the answer is concise, factual, and directly addresses the query without adding or omitting information.  \n- The assistant should verify the answer against the context to ensure accuracy."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.57)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.56)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.57)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.57)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    0 -> 3;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
