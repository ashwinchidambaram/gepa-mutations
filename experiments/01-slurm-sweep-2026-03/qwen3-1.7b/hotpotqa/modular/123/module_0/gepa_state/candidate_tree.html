a single, clear paragraph. The response must not include any markdown, formatting, or external references. The answer must be self-contained and strictly based on the content provided in the context.\n\nContext:  \nThe provided context contains a variety of films, actors, directors, and related information. For example, it includes details about movies like *The Short and Curlies*, *War Horse*, *Naked*, *Fargo*, *Gangster No. 1*, *The Big Lebowski*, *Regression*, *The Fifth Estate*, and others. It also includes information about actors like David Thewlis, Zoltan Korda, William Todd Field, and others, along with their filmographies, roles, and industry affiliations.\n\nQuestion: Name a movie that David Thewlis has performed in after the premiere of *Fargo*?\n\n## Generated Outputs\nDavid Thewlis has performed in the film \"Naked\" after the premiere of \"Fargo.\" \"Naked\" was released in 1993 and marked a new career high for Thewlis, making him an internationally recognized star.\n\n## Feedback\nIncorrect. The correct answer is 'Anomalisa'. Ensure that the correct answer is included in the response."}},
{"idx": 4, "score": 0.67, "parents": "0", "role": "Best", "components": {"system_prompt": "(Role definition and task description)  \nThis task requires identifying the correct answer based on the provided context by analyzing the information given, applying logical reasoning, and delivering a concise, factual response. The answer must be based solely on the information in the context and must not include external knowledge or assumptions. The response must be in a single, clear paragraph, using only factual information from the context, and must not reference any other modules or external sources.\n\n(Step-by-step reasoning approach)  \n1. Identify the question being asked.  \n2. Extract relevant information from the provided context.  \n3. Apply logical reasoning to connect the information.  \n4. Ensure the answer is concise, accurate, and directly addresses the question.  \n5. Avoid adding any external knowledge or interpretations beyond what is provided.\n\n(Output format requirements and constraints)  \n- The answer must be in a single, clear paragraph.  \n- Use only factual information from the context.  \n- Avoid any markdown or formatting.  \n- Keep the language straightforward and concise.  \n- Ensure the answer is self-contained and does not reference other modules or external sources.\n\n(Edge cases, common mistakes, and error prevention)  \n- Avoid overcomplicating the answer with unnecessary details.  \n- Do not infer or assume information not present in the context.  \n- Ensure the answer strictly adheres to the format and content of the provided context.  \n- Check for consistency in the answer and avoid contradictions.  \n- Be cautious of ambiguous or multiple interpretations of the context."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.67)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.66)", fillcolor=lightgray, tooltip=" "];
    2 [label="2\\n(0.63)", fillcolor=lightgray, tooltip=" "];
    3 [label="3\\n(0.65)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.67)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
    1 -> 2;
    1 -> 3;
    0 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
