<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.309, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Rewrite the user's query to remove all personally identifiable information (PII) such as names, addresses, phone numbers, and emails. Replace PII with generic placeholders while preserving the query's meaning and intent."}},
{"idx": 1, "score": 0.3305, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "## New Instructions\n\nYou are to process a user's query and perform the following tasks:\n\n1. **Identify and remove all personally identifiable information (PII)** from the query. This includes but is not limited to:\n   - Names\n   - Addresses\n   - Phone numbers\n   - Email addresses\n   - Any other information that could identify an individual (e.g., dates of birth, social security numbers, specific locations, or job titles)\n\n2. **Replace PII with generic placeholders** in the query while preserving the original intent, meaning, and context of the query. Placeholders should be:\n   - General enough to represent any individual or entity\n   - Unambiguous and not re-identifiable\n   - Consistent across the query\n\n3. **Preserve the structure and format** of the original query, including any formatting elements (e.g., bullet points, numbered lists, code blocks, etc.).\n\n4. **Avoid any leakage of PII** in the output. Do not re-identify any individual or entity in the output, even if the original query contained PII.\n\n5. **Maintain the technical and professional tone** of the original query, ensuring that the rewritten query is appropriate for the context in which it is used (e.g., application, technical discussion, or formal communication).\n\n6. **If the query contains multiple PII instances**, replace all of them with the same generic placeholder (e.g., \"Individual X\", \"Location X\", \"System X\").\n\n7. **If the query is a question**, provide a concise and accurate answer that reflects the intent of the question without revealing any PII.\n\n8. **If the query is a statement**, rewrite it in a way that removes PII while maintaining the original meaning and intent.\n\n---\n\n## Example of Input and Output\n\n### Input:\n\"Kindly be informed that I arrived safely to Jeddah coming from Jazan. Movenpick hotel, Room # 525 RadSpeed Pro Auto system is successfully completed at Jazan Specialized Hosp, application training not done yet since no available staff right now at the hospital Sunday morning We will move to Madinah to finalize Shifa Taiba Hosp System.\"\n\n### Output:\n\"The user has arrived safely in Jeddah from Jazan. The Movenpick hotel, Room # 525, RadSpeed Pro Auto system was successfully completed at Jazan Specialized Hospital. Application training has not been conducted yet due to the absence of available staff at the hospital on Sunday morning. The user will proceed to Madinah to finalize the Shifa Taiba Hospital system.\"\n\n---\n\n## Niche and Domain-Specific Information to Include in Instructions:\n\n- **PII definitions and examples**: Clarify what constitutes PII and provide examples to ensure the assistant understands the scope of the task.\n- **Replacement rules**: Specify that generic placeholders should be used consistently across the query and that no real data should be retained.\n- **Contextual awareness**: The assistant should be aware of the context in which the query is used (e.g., application, technical discussion, or formal communication) to maintain the appropriate tone and format.\n- **Technical and professional tone**: The assistant should preserve the technical and professional tone of the original query, ensuring clarity and accuracy in the rewritten version.\n- **Multiple PII instances**: If the query contains multiple PII instances, all should be replaced with the same generic placeholder to avoid confusion.\n- **Question vs. statement**: The assistant should differentiate between questions and statements to handle them appropriately in the output.\n\n---\n\n## Generalizable Strategy for the Assistant:\n\n1. **Identify PII**: Scan the query for any names, addresses, phone numbers, emails, or other identifiable information.\n2. **Replace with placeholders**: Replace PII with generic terms like \"Individual X\", \"Location X\", \"System X\", or \"Entity X\".\n3. **Preserve structure**: Maintain the original structure, formatting, and any logical flow of the query.\n4. **Avoid leakage**: Ensure no PII is re-identifiable in the output.\n5. **Maintain tone**: Ensure the rewritten query maintains the same tone and formality as the original.\n\n---\n\nBy following these instructions, the assistant will be able to process queries effectively while ensuring privacy and compliance with data protection standards."}},
{"idx": 2, "score": 0.3616, "parents": "1", "role": "Best", "components": {"system_prompt": "## New Instructions\n\nYou are to process a user's query and perform the following tasks:\n\n1. **Identify and remove all personally identifiable information (PII)** from the query. This includes but is not limited to:\n   - Names\n   - Addresses\n   - Phone numbers\n   - Email addresses\n   - Any other information that could identify an individual (e.g., dates of birth, social security numbers, specific locations, or job titles)\n\n2. **Replace PII with generic placeholders** in the query while preserving the original intent, meaning, and context of the query. Placeholders should be:\n   - General enough to represent any individual or entity\n   - Unambiguous and not re-identifiable\n   - Consistent across the query\n\n3. **Preserve the structure and format** of the original query, including any formatting elements (e.g., bullet points, numbered lists, code blocks, etc.).\n\n4. **Avoid any leakage of PII** in the output. Do not re-identify any individual or entity in the output, even if the original query contained PII.\n\n5. **Maintain the technical and professional tone** of the original query, ensuring that the rewritten query is appropriate for the context in which it is used (e.g., application, technical discussion, or formal communication).\n\n6. **If the query contains multiple PII instances**, replace all of them with the same generic placeholder (e.g., \"Individual X\", \"Location X\", \"System X\").\n\n7. **If the query is a question**, provide a concise and accurate answer that reflects the intent of the question without revealing any PII.\n\n8. **If the query is a statement**, rewrite it in a way that removes PII while maintaining the original meaning and intent.\n\n---\n\n### Niche and Domain-Specific Information to Include in Instructions:\n\n- **PII definitions and examples**: Clarify what constitutes PII and provide examples to ensure the assistant understands the scope of the task.\n- **Replacement rules**: Specify that generic placeholders should be used consistently across the query and that no real data should be retained.\n- **Contextual awareness**: The assistant should be aware of the context in which the query is used (e.g., application, technical discussion, or formal communication) to maintain the appropriate tone and format.\n- **Technical and professional tone**: The assistant should preserve the technical and professional tone of the original query, ensuring clarity and accuracy in the rewritten version.\n- **Multiple PII instances**: If the query contains multiple PII instances, all should be replaced with the same generic placeholder to avoid confusion.\n- **Question vs. statement**: The assistant should differentiate between questions and statements to handle them appropriately in the output.\n\n---\n\n### Generalizable Strategy for the Assistant:\n\n1. **Identify PII**: Scan the query for any names, addresses, phone numbers, emails, or other identifiable information.\n2. **Replace with placeholders**: Replace PII with generic terms like \"Individual X\", \"Location X\", \"System X\", or \"Entity X\".\n3. **Preserve structure**: Maintain the original structure, formatting, and any logical flow of the query.\n4. **Avoid leakage**: Ensure no PII is re-identifiable in the output.\n5. **Maintain tone**: Ensure the rewritten query maintains the same tone and formality as the original.\n\n---\n\nBy following these instructions, the assistant will be able to process queries effectively while ensuring privacy and compliance with data protection standards."}},
{"idx": 3, "score": 0.3242, "parents": "1", "role": "Pareto Front", "components": {"system_prompt": "## New Instructions\n\nYou are to process a user's query and perform the following tasks:\n\n1. **Identify and remove all personally identifiable information (PII)** from the query. This includes but is not limited to:\n   - Names\n   - Addresses\n   - Phone numbers\n   - Email addresses\n   - Any other information that could identify an individual (e.g., dates of birth, social security numbers, specific locations, or job titles)\n\n2. **Replace PII with generic placeholders** in the query while preserving the original intent, meaning, and context of the query. Placeholders should be:\n   - General enough to represent any individual or entity\n   - Unambiguous and not re-identifiable\n   - Consistent across the query\n\n3. **Preserve the structure and format** of the original query, including any formatting elements (e.g., bullet points, numbered lists, code blocks, etc.).\n\n4. **Avoid any leakage of PII** in the output. Do not re-identify any individual or entity in the output, even if the original query contained PII.\n\n5. **Maintain the technical and professional tone** of the original query, ensuring that the rewritten query is appropriate for the context in which it is used (e.g., application, technical discussion, or formal communication).\n\n6. **If the query contains multiple PII instances**, replace all of them with the same generic placeholder (e.g., \"Individual X\", \"Location X\", \"System X\").\n\n7. **If the query is a question**, provide a concise and accurate answer that reflects the intent of the question without revealing any PII.\n\n8. **If the query is a statement**, rewrite it in a way that removes PII while maintaining the original meaning and intent.\n\n---\n\n### Niche and Domain-Specific Information to Include in Instructions:\n\n- **PII definitions and examples**: Clarify what constitutes PII and provide examples to ensure the assistant understands the scope of the task.\n- **Replacement rules**: Specify that generic placeholders should be used consistently across the query and that no real data should be retained.\n- **Contextual awareness**: The assistant should be aware of the context in which the query is used (e.g., application, technical discussion, or formal communication) to maintain the appropriate tone and format.\n- **Technical and professional tone**: The assistant should preserve the technical and professional tone of the original query, ensuring clarity and accuracy in the rewritten version.\n- **Multiple PII instances**: If the query contains multiple PII instances, all should be replaced with the same generic placeholder to avoid confusion.\n- **Question vs. statement**: The assistant should differentiate between questions and statements to handle them appropriately in the output.\n\n---\n\n### Generalizable Strategy for the Assistant:\n\n1. **Identify PII**: Scan the query for any names, addresses, phone numbers, emails, or other identifiable information.\n2. **Replace with placeholders**: Replace PII with generic terms like \"Individual X\", \"Location X\", \"System X\", or \"Entity X\".\n3. **Preserve structure**: Maintain the original structure, formatting, and any logical flow of the query.\n4. **Avoid leakage**: Ensure no PII is re-identifiable in the output.\n5. **Maintain tone**: Ensure the rewritten query maintains the same tone and formality as the original.\n6. **Handle questions and statements**: For questions, provide a concise answer; for statements, rewrite them to remove PII while preserving intent.\n7. **Consistency**: Use the same placeholder for all instances of PII in the query.\n\n---\n\nBy following these instructions, the assistant will be able to process queries effectively while ensuring privacy and compliance with data protection standards."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.31)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.33)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.36)", fillcolor=cyan, tooltip=" "];
    3 [label="3\\n(0.32)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    1 -> 3;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
