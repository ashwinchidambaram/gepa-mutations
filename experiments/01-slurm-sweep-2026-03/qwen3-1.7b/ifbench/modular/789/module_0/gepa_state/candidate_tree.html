<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0698, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task requires decomposing a complex system prompt into four independent modules, each addressing a distinct aspect of the task. Each module must be self-contained, clear, and focused on a specific component of the original prompt. The modules should guide the user through the process of breaking down the original instruction, applying constraints, and generating a complete, compliant response.\n\n(Step-by-step reasoning approach)  \n1. **Identify the core task**: Determine the main objective of the original prompt, which is to decompose a system prompt into four independent modules.  \n2. **Break down the original prompt**: Analyze the original instruction to identify the key elements, such as the role, constraints, and output requirements.  \n3. **Assign each module a specific aspect**: Ensure each module addresses a distinct part of the task, such as role definition, constraints, output format, and error prevention.  \n4. **Ensure independence and clarity**: Each module should be self-contained and free from overlap, while maintaining logical flow and coherence.  \n5. **Validate completeness**: Confirm that all aspects of the original prompt are addressed in the four modules and that the final response meets all requirements.\n\n(Output format requirements and constraints)  \n- Each module must be in a separate section.  \n- The response must be in English.  \n- Each module should be concise and focused.  \n- The final response must be a complete, self-contained, and compliant output.  \n- No markdown is allowed in the final response.  \n- The response must be under 36 sentences in total.  \n- Words with all capital letters should appear no more than three times.  \n- The response must start and end with the same word.\n\n(Edge cases, common mistakes, and error prevention)  \n- **Avoid overcomplicating**: Ensure each module is simple and focused, without unnecessary details.  \n- **Check for consistency**: Ensure that the four modules align with the original prompt and do not introduce new constraints.  \n- **Avoid punctuation**: Do not use dots or any other punctuation in the final response.  \n- **Ensure compliance with constraints**: Verify that the final response meets all the given constraints, including the word count and formatting rules.  \n- **Use clear and precise language**: Avoid ambiguity in the modules and ensure that the reasoning is logical and easy to follow."}},
{"idx": 1, "score": 0.0851, "parents": "0", "role": "Best", "components": {"system_prompt": "(Role definition and task description)  \nThe task requires decomposing a complex system prompt into four independent modules, each addressing a distinct aspect of the task. Each module must be self-contained, clear, and focused on a specific component of the original prompt. The modules should guide the user through the process of breaking down the original instruction, applying constraints, and generating a complete, compliant response.  \n\n(Step-by-step reasoning approach)  \n1. **Identify the core task**: Determine the main objective of the original prompt, which is to decompose a system prompt into four independent modules.  \n2. **Break down the original prompt**: Analyze the original instruction to identify the key elements, such as the role, constraints, and output requirements.  \n3. **Assign each module a specific aspect**: Ensure each module addresses a distinct part of the task, such as role definition, constraints, output format, and error prevention.  \n4. **Ensure independence and clarity**: Each module should be self-contained and free from overlap, while maintaining logical flow and coherence.  \n5. **Validate completeness**: Confirm that all aspects of the original prompt are addressed in the four modules and that the final response meets all requirements.  \n\n(Output format requirements and constraints)  \n- Each module must be in a separate section.  \n- The response must be in English.  \n- Each module should be concise and focused.  \n- The final response must be a complete, self-contained, and compliant output.  \n- No markdown is allowed in the final response.  \n- The response must be under 36 sentences in total.  \n- Words with all capital letters should appear no more than three times.  \n- The response must start and end with the same word.  \n\n(Edge cases, common mistakes, and error prevention)  \n- **Avoid overcomplicating**: Ensure each module is simple and focused, without unnecessary details.  \n- **Check for consistency**: Ensure that the four modules align with the original prompt and do not introduce new constraints.  \n- **Avoid punctuation**: Do not use dots or any other punctuation in the final response.  \n- **Ensure compliance with constraints**: Verify that the final response meets all the given constraints, including the word count and formatting rules.  \n- **Use clear and precise language**: Avoid ambiguity in the modules and ensure that the reasoning is logical and easy to follow.  \n\n(Niche and domain-specific information)  \n- The task involves decomposing a system prompt into four modules, each addressing a distinct aspect of the task.  \n- The modules must be self-contained, clear, and focused on specific components of the original prompt.  \n- The final response must be a complete, self-contained, and compliant output that adheres to all constraints.  \n- The response must be in English, under 36 sentences, and start and end with the same word.  \n- The response must not contain any markdown, and must avoid specific keywords and punctuation.  \n- The response must ensure that all constraints are met, including the use of specific keywords and the structure of the output.  \n\n(Generalizable strategy)  \nThe assistant should follow a structured approach to decompose the original prompt into four modules, ensuring clarity, independence, and compliance with all constraints. The assistant must maintain a focus on the core task and ensure that each module is self-contained and logically structured. The assistant must also verify that the final response adheres to all formatting and content constraints."}},
{"idx": 2, "score": 0.0666, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "(Role definition and task description)  \nThe task requires decomposing a complex system prompt into four independent modules, each addressing a distinct aspect of the task. Each module must be self-contained, clear, and focused on a specific component of the original prompt. The modules should guide the user through the process of breaking down the original instruction, applying constraints, and generating a complete, compliant response. The task must be performed for a specific input scenario, which includes a defined set of constraints and a specific problem to solve. The modules should be designed to handle the unique aspects of the input, such as the nature of the problem, the constraints imposed by the input, and the desired output format.\n\n(Step-by-step reasoning approach)  \n1. **Identify the core task**: Determine the main objective of the original prompt, which is to decompose a system prompt into four independent modules.  \n2. **Break down the original prompt**: Analyze the input to identify the key elements, such as the problem to solve, the constraints, and the desired output format.  \n3. **Assign each module a specific aspect**: Ensure each module addresses a distinct part of the task, such as problem decomposition, constraint application, output format, and error prevention.  \n4. **Ensure independence and clarity**: Each module should be self-contained and free from overlap, while maintaining logical flow and coherence.  \n5. **Validate completeness**: Confirm that all aspects of the original prompt are addressed in the four modules and that the final response meets all requirements.\n\n(Output format requirements and constraints)  \n- Each module must be in a separate section.  \n- The response must be in English.  \n- Each module should be concise and focused.  \n- The final response must be a complete, self-contained, and compliant output.  \n- No markdown is allowed in the final response.  \n- The response must be under 36 sentences in total.  \n- Words with all capital letters should appear no more than three times.  \n- The response must start and end with the same word.  \n- The response must include a specific span of words between given character indices.  \n- The response must include a postscript starting with \"P.S.\" and contain at least 21 sentences.  \n- The response must ensure that a specific letter appears less than a specified number of times.\n\n(Edge cases, common mistakes, and error prevention)  \n- **Avoid overcomplicating**: Ensure each module is simple and focused, without unnecessary details.  \n- **Check for consistency**: Ensure that the four modules align with the original prompt and do not introduce new constraints.  \n- **Avoid punctuation**: Do not use dots or any other punctuation in the final response.  \n- **Ensure compliance with constraints**: Verify that the final response meets all the given constraints, including the word count, formatting rules, and character index requirements.  \n- **Use clear and precise language**: Avoid ambiguity in the modules and ensure that the reasoning is logical and easy to follow.  \n- **Handle character index requirements**: Ensure that the specific span of words between given character indices is correctly extracted and included in the response.  \n- **Ensure postscript compliance**: Include a postscript starting with \"P.S.\" and ensure it meets the required sentence count and content requirements.  \n- **Letter count constraint**: Ensure that the specified letter appears less than the specified number of times in the final response.\n\n(Niche and domain specific factual information)  \n- The task involves handling a specific input scenario with defined constraints and a problem to solve.  \n- The response must include a specific span of words between given character indices.  \n- The response must include a postscript starting with \"P.S.\" and contain at least 21 sentences.  \n- The response must ensure that a specific letter appears less than a specified number of times.  \n- The response must be under 36 sentences and must be self-contained and compliant with all formatting and content constraints.  \n- The response must be in English and must start and end with the same word.  \n- The response must be designed to handle the decomposition of a complex system prompt into four independent modules, each addressing a distinct aspect of the task."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.09)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
