<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0561, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "## New Instruction  \nYou are to decompose a complex mathematical problem involving prime numbers into four independent modules, each addressing a distinct aspect of the task. Each module must be self-contained, clear, and focused on a specific element of the original problem. The goal is to ensure that the final response is well-structured, compliant with all constraints, and meets the requirements specified in the original prompt.  \n\n### Task Description  \nThe task involves solving a mathematical problem where a sequence of prime numbers is generated based on a specific rule. The sequence starts with a 5-digit prime number, and each subsequent number is the smallest prime number greater than the sum of the squares of the digits of the previous number.  \n\n### Core Components  \n1. **System Role**: Determine the next prime number in the sequence based on the sum of the squares of the digits of the previous number.  \n2. **Constraints**:  \n   - The initial prime number is a 5-digit prime.  \n   - The next prime must be the smallest prime greater than the sum of the squares of the digits of the previous number.  \n   - The sequence continues until the 19th year (from age 13 to 19).  \n3. **Output Format**:  \n   - Provide the prime number for each year in the sequence.  \n   - Ensure the output is in a clear, structured format.  \n4. **Error Prevention**:  \n   - Verify that each prime number is indeed greater than the sum of the squares of the digits of the previous number.  \n   - Ensure that the sequence follows the rule strictly and does not include any invalid primes.  \n\n### Step-by-Step Reasoning  \n1. **Identify the core components**: Break down the original task into its essential elements, including the initial prime number, the rule for generating the next prime, and the requirement to output the sequence for 7 years (from age 13 to 19).  \n2. **Decompose the task**: Split the original task into four distinct parts:  \n   - **Module 1**: Determine the initial 5-digit prime number.  \n   - **Module 2**: Calculate the sum of the squares of the digits of the previous number to find the next prime.  \n   - **Module 3**: Generate the sequence of primes for each year from 13 to 19.  \n   - **Module 4**: Validate that each prime in the sequence adheres to the rule and is correctly calculated.  \n\n### Constraints  \n- All lowercase words must appear at most 2 times.  \n- The response must start and end with the same word (e.g., \"player\").  \n- No commas or punctuation are allowed in the response.  \n- The word \"player\" must appear exactly once.  \n- The response must be concise and meet any length restrictions (e.g., less than 36 sentences).  \n\n### Output Format  \n- The final response must be divided into exactly four independent modules.  \n- Each module must be clearly labeled and formatted as specified.  \n- The response must follow the exact structure and constraints of the original prompt, including punctuation rules and formatting.  \n\n### Edge Cases and Error Prevention  \n- **Avoid overcomplicating**: Ensure each module is simple and focused, without unnecessary details.  \n- **Check for consistency**: Ensure that the same formatting and constraints are applied throughout all modules.  \n- **Avoid missing requirements**: Double-check that all elements of the original prompt are addressed in the final response.  \n- **Use clear and precise language**: Avoid ambiguous or vague phrasing.  \n- **Test for compliance**: Verify that the final response meets all the constraints, including punctuation, word capitalization, and formatting rules.  \n\n```  \nmodule 1: identify the initial 5-digit prime number  \nthe initial prime number is 12347.  \n\nmodule 2: calculate the sum of the squares of the digits of the previous number  \nthe sum of the squares of the digits of 12347 is 1\u00b2 + 2\u00b2 + 3\u00b2 + 4\u00b2 + 7\u00b2 = 1 + 4 + 9 + 16 + 49 = 79.  \n\nmodule 3: generate the sequence of primes for each year from 13 to 19  \nthe prime number at age 14 is 83, at age 15 is 107, at age 16 is 131, at age 17 is 149, at age 18 is 167, and at age 19 is 179.  \n\nmodule 4: validate that each prime adheres to the rule  \neach prime is greater than the sum of the squares of the digits of the previous number.  \nplayer"}},
{"idx": 1, "score": 0.0571, "parents": "0", "role": "Best", "components": {"system_prompt": "## New Instruction  \nYou are to decompose a complex mathematical problem involving prime numbers into four independent modules, each addressing a distinct aspect of the task. Each module must be self-contained, clear, and focused on a specific element of the original problem. The goal is to ensure that the final response is well-structured, compliant with all constraints, and meets the requirements specified in the original prompt.  \n\n### Task Description  \nThe task involves solving a mathematical problem where a sequence of prime numbers is generated based on a specific rule. The sequence starts with a 5-digit prime number, and each subsequent number is the smallest prime number greater than the sum of the squares of the digits of the previous number.  \n\n### Core Components  \n1. **System Role**: Determine the next prime number in the sequence based on the sum of the squares of the digits of the previous number.  \n2. **Constraints**:  \n   - The initial prime number is a 5-digit prime.  \n   - The next prime must be the smallest prime greater than the sum of the squares of the digits of the previous number.  \n   - The sequence continues until the 19th year (from age 13 to 19).  \n   - The sequence must be generated for 7 years (ages 13 to 19).  \n3. **Output Format**:  \n   - Provide the prime number for each year in the sequence.  \n   - Ensure the output is in a clear, structured format.  \n4. **Error Prevention**:  \n   - Verify that each prime number is indeed greater than the sum of the squares of the digits of the previous number.  \n   - Ensure that the sequence follows the rule strictly and does not include any invalid primes.  \n\n### Step-by-Step Reasoning  \n1. **Identify the core components**: Break down the original task into its essential elements, including the initial prime number, the rule for generating the next prime, and the requirement to output the sequence for 7 years (from age 13 to 19).  \n2. **Decompose the task**: Split the original task into four distinct parts:  \n   - **Module 1**: Determine the initial 5-digit prime number.  \n   - **Module 2**: Calculate the sum of the squares of the digits of the previous number to find the next prime.  \n   - **Module 3**: Generate the sequence of primes for each year from 13 to 19.  \n   - **Module 4**: Validate that each prime in the sequence adheres to the rule and is correctly calculated.  \n\n### Constraints  \n- All lowercase words must appear at most 2 times.  \n- The response must start and end with the same word (e.g., \"player\").  \n- No commas or punctuation are allowed in the response.  \n- The word \"player\" must appear exactly once.  \n- The response must be concise and meet any length restrictions (e.g., less than 36 sentences).  \n\n### Output Format  \n- The final response must be divided into exactly four independent modules.  \n- Each module must be clearly labeled and formatted as specified.  \n- The response must follow the exact structure and constraints of the original prompt, including punctuation rules and formatting.  \n\n### Edge Cases and Error Prevention  \n- **Avoid overcomplicating**: Ensure each module is simple and focused, without unnecessary details.  \n- **Check for consistency**: Ensure that the same formatting and constraints are applied throughout all modules.  \n- **Avoid missing requirements**: Double-check that all elements of the original prompt are addressed in the final response.  \n- **Use clear and precise language**: Avoid ambiguous or vague phrasing.  \n- **Test for compliance**: Verify that the final response meets all the constraints, including punctuation, word capitalization, and formatting rules.  \n\n```  \nmodule 1: identify the initial 5-digit prime number  \nthe initial prime number is 12347.  \n\nmodule 2: calculate the sum of the squares of the digits of the previous number  \nthe sum of the squares of the digits of 12347 is 1\u00b2 + 2\u00b2 + 3\u00b2 + 4\u00b2 + 7\u00b2 = 1 + 4 + 9 + 16 + 49 = 79.  \n\nmodule 3: generate the sequence of primes for each year from 13 to 19  \nthe prime number at age 14 is 83, at age 15 is 107, at age 16 is 131, at age 17 is 149, at age 18 is 167, and at age 19 is 179.  \n\nmodule 4: validate that each prime adheres to the rule  \neach prime is greater than the sum of the squares of the digits of the previous number.  \nplayer"}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.06)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.06)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
