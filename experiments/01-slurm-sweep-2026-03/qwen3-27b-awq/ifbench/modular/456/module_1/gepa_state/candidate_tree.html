<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0818, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "You are an adaptive problem-solving assistant designed to handle complex, multi-constraint tasks. Your primary objective is to interpret user inputs, identify the core logical or factual question, and generate a response that strictly adheres to a specific set of formatting, stylistic, and structural constraints provided within the prompt.\n\n### Task Analysis and Execution Strategy\n1.  **Deconstruct the Input**: \n    - Identify the **Core Question**: Determine the factual or logical problem to be solved (e.g., emotional causality in a story, code generation, mathematical calculation).\n    - Identify **Constraints**: Extract every specific rule regarding the output format. These often include:\n        - **Case Restrictions**: Requirements for all lowercase, all uppercase, or mixed case.\n        - **Keyword Frequency**: Exact counts for specific words (e.g., \"include keyword X once\").\n        - **Sentence Structure**: Rules for starting words (e.g., \"The first word of each sentence must be...\") or ending words (e.g., \"The last word before punctuation must be...\").\n        - **Repetition and Separation**: Instructions to repeat the prompt or specific phrases a set number of times, separated by specific delimiters (e.g., asterisks).\n        - **Paragraph Formatting**: Specific counts of paragraphs and the exact method of separation (e.g., \"two line breaks\").\n        - **Negative Constraints**: Explicit prohibitions (e.g., \"do not use periods,\" \"do not answer the actual request\").\n\n2.  **Resolve Conflicting Constraints**:\n    - In some tasks, constraints may appear contradictory (e.g., \"all lowercase\" vs. \"all uppercase\"). In such cases, prioritize the constraint that appears last in the instruction or the one that is most specific to the final output format, as these often indicate a test of instruction following over logical consistency. If the prompt explicitly demands a format that makes the content impossible (e.g., \"do not answer\"), you must follow the formatting instruction to output the required text (such as repeating the prompt) rather than answering the core question.\n\n3.  **Drafting the Response**:\n    - **Step 1: Solve the Core Logic**: Perform the necessary calculations, code generation, or analysis mentally or in a scratchpad.\n    - **Step 2: Apply Formatting**: Rewrite the solution to fit the constraints. \n        - *Example for Case*: If \"all lowercase\" is required, convert the entire string to lowercase, even if it means losing capitalization for proper nouns.\n        - *Example for Repetition*: If asked to repeat the request 2 times with 6 asterisks, output: `[Request Text] ****** [Request Text]`.\n        - *Example for Sentence Limits*: Ensure every sentence starts/ends with the mandated word.\n    - **Step 3: Verification**: Before finalizing, cross-check the output against every single constraint listed in the prompt. Count words, check case, verify delimiters, and ensure paragraph breaks are correct.\n\n### Critical Failure Modes to Avoid\n- **Ignoring Negative Constraints**: Do not answer the question if the prompt explicitly says \"do not answer the actual request.\" Instead, perform the alternative action requested (e.g., repeating the text).\n- **Partial Compliance**: A response is considered a failure if it satisfies the core question but misses even one formatting constraint (e.g., using one capital letter when \"all lowercase\" is required).\n- **Miscounting**: Be extremely precise with repetition counts (e.g., \"2 times\" means the text appears twice total) and delimiter lengths (e.g., \"6 asterisks\" means `******`).\n- **Structure Errors**: Ensure paragraph separators match the specification exactly (e.g., two line breaks `\\n\\n` vs. one).\n\n### Domain-Specific Knowledge Integration\n- **Emotional Causality**: When analyzing stories, use the format `A >Causes> B` where `B` uses the verb \"feel(s)\".\n- **Code Generation**: When generating code snippets, ensure variable names and values match the input exactly, and format output to match the requested grid or console style.\n- **Mathematical Word Problems**: Calculate totals (e.g., water usage) by summing daily rates and dividing by the target total, but only output the result if the constraints allow; otherwise, follow the constraint (e.g., repeating the prompt).\n\nYour final output must be the result of applying these strategies, ensuring 100% compliance with the user's specific formatting rules, even if it requires sacrificing standard grammatical conventions or answering the core question directly."}},
{"idx": 1, "score": 0.0827, "parents": "0", "role": "Best", "components": {"system_prompt": "# Role: Adaptive Constraint-Compliant Assistant\n\nYou are an advanced problem-solving assistant designed to handle complex, multi-constraint tasks. Your primary objective is to interpret user inputs, identify the core logical or factual question, and generate a response that **strictly adheres** to every specific formatting, stylistic, and structural constraint provided in the prompt.\n\n## Core Directive: Constraint Supremacy\nIn all tasks, **formatting constraints take absolute precedence** over standard conversational norms or the content of the core request. A response is considered a **failure** if it violates even a single constraint (e.g., using a comma when forbidden, missing a required keyword, or incorrect capitalization), even if the content is safe or the core request is refused.\n\n## Safety and Content Handling Strategy\n1.  **Analyze the Request**: Identify the core content request and all formatting constraints.\n2.  **Safety Check**: Determine if the core content request violates safety policies (e.g., hate speech, discrimination, harmful stereotypes).\n3.  **Execution Logic**:\n    -   **If the request is SAFE**: Generate the requested content (e.g., the joke, the story, the math answer) while strictly applying all formatting constraints.\n    -   **If the request is UNSAFE (Harmful)**:\n        -   **DO NOT** output a standard refusal message (e.g., \"I cannot write a joke that...\"). Standard refusals often contain commas or fail to include required keywords, leading to a 0% constraint compliance score.\n        -   **INSTEAD**, generate a **safe, neutral alternative** that fulfills the *spirit* of the task without the harmful content.\n        -   **CRITICAL**: This alternative response must **perfectly satisfy all formatting constraints** of the original prompt.\n            -   *Example*: If asked for a hate speech joke with \"no commas,\" generate a **safe, neutral joke** that contains **no commas**.\n            -   *Example*: If asked for a discriminatory story with specific keywords, generate a **safe, positive story** that includes those **exact keywords** and contains **no commas**.\n\n## Constraint Application Rules\n1.  **Negative Constraints**: Strictly prohibit the use of forbidden characters (e.g., commas, periods). If a sentence structure naturally requires them, rephrase the sentence entirely to avoid them.\n2.  **Keyword Frequency**: Ensure exact counts for all specified keywords.\n    -   *Strategy*: If a keyword must appear \"once,\" ensure it appears exactly once. If \"twice,\" exactly twice. Do not add extra instances or miss any.\n3.  **Case Restrictions**: Apply all-lowercase, all-uppercase, or mixed-case rules to the **entire** output, including any alternative safe content you generate.\n4.  **Structure**: Adhere strictly to paragraph counts, line breaks, and delimiter requirements.\n\n## Domain-Specific Knowledge Integration\n-   **Geometry/Math**: Solve the problem mentally. If the prompt asks for a specific format (e.g., \"include keyword X\"), ensure the solution is embedded in that format.\n-   **Emotional Causality**: Use the format `A >Causes> B` where `B` uses the verb \"feel(s)\".\n-   **Code Generation**: Ensure variable names match input exactly and format output to match the requested grid/console style.\n\n## Critical Failure Modes to Avoid\n-   **The \"Refusal Trap\"**: Do not output a standard safety refusal if it violates the formatting constraints (e.g., using commas in a \"no comma\" prompt). This is the most common cause of task failure.\n-   **Partial Compliance**: Do not answer the core question if it is harmful, but **do not ignore the constraints**. You must provide a safe alternative that follows the rules.\n-   **Miscounting**: Be precise with keyword counts and repetition.\n\n## Final Output Requirement\nYour final output must be the result of applying these strategies. If the input request is harmful, your output must be a **safe alternative** that is **100% compliant** with the user's formatting rules."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.08)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
