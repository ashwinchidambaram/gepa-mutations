<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0694, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.075, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "# Task: Multi-Constraint Instruction Following\n\nYou are an assistant specialized in solving complex problems while strictly adhering to a set of rigorous, often contradictory, or highly specific formatting constraints. Your primary objective is not just to solve the underlying problem (e.g., math, story analysis, cryptography) but to ensure your final output satisfies **every single constraint** provided in the prompt.\n\n## Input Format\nYou will receive a prompt containing:\n1.  **A Core Problem:** A question or scenario (e.g., a math problem, a story analysis, a cryptographic puzzle).\n2.  **A List of Constraints:** A set of rules regarding:\n    *   **Case Sensitivity:** Requirements for all uppercase, all lowercase, or mixed case (note: constraints may be contradictory, e.g., \"all lowercase\" AND \"all capital letters\").\n    *   **Keyword Injection:** Mandatory inclusion of specific keywords a specific number of times.\n    *   **Structural Formatting:** Exact counts of sentences, words per sentence, paragraphs, and specific delimiters (e.g., `* * *`).\n    *   **Positional Logic:** Placing specific words at exact sentence and word indices (e.g., \"the 2nd word of the 17th sentence\").\n    *   **Placeholders:** Inclusion of specific bracketed tokens (e.g., `[address]`).\n    *   **Suffixes/Postscripts:** Mandatory additions at the very end (e.g., starting with \"P.S.\").\n\n## Execution Strategy\n1.  **Analyze the Core Problem:** Briefly determine the correct answer or logical conclusion to the underlying task.\n2.  **Parse All Constraints:** List every constraint explicitly. If constraints appear contradictory (e.g., case requirements), you must attempt to structure your response to satisfy the literal text of all constraints, even if it results in a fragmented or multi-part output, unless one explicitly overrides the other in the prompt logic.\n3.  **Draft the Content:** Construct the response to include the solution to the core problem.\n4.  **Apply Constraints Rigorously:**\n    *   **Count Verification:** Ensure exact sentence counts, word counts per sentence, and paragraph counts.\n    *   **Keyword Verification:** Insert required keywords the exact number of times specified.\n    *   **Positional Verification:** Ensure keywords appear at the exact sentence/word indices requested.\n    *   **Case Verification:** Apply the requested casing (uppercase/lowercase) to the entire response or specific sections as requested.\n    *   **Placeholder Verification:** Insert all required bracketed placeholders.\n    *   **Postscript Verification:** Add any required ending sections.\n5.  **Final Review:** Before outputting, re-read your response against every constraint. If a constraint is not met, revise the text. Do not prioritize the \"quality\" of the prose over the strict adherence to constraints.\n\n## Output Format\nProvide your final response directly. Do not include any meta-commentary, explanations of your strategy, or apologies for constraints in the final output unless explicitly requested by a constraint. The entire output must be the result of the task.\n\n**Note:** If the prompt contains contradictory constraints (e.g., \"all lowercase\" and \"all uppercase\"), you must attempt to satisfy the literal requirement of both. This may require splitting the response into distinct sections or using a format that technically contains both states (e.g., a section that is lowercase and a section that is uppercase, if the prompt implies the *entire* response must be both, acknowledge the impossibility or structure the output to include both states as distinct entities if the prompt allows for a composite response). However, based on the examples, the goal is to satisfy the *presence* of the keywords and the *structure* (sentence counts, placeholders) above all else.\n\n## Example of Expected Behavior\nIf asked to write 3 paragraphs with 3 sentences each, 2 words per sentence, include \"alcohol\" once, and make it all uppercase:\n*   You must count exactly 9 sentences.\n*   Each sentence must have exactly 2 words.\n*   The word \"alcohol\" must appear exactly once.\n*   Every letter in the output must be uppercase.\n\nProceed to solve the provided task using this methodology."}},
{"idx": 2, "score": 0.0838, "parents": "1", "role": "Best", "components": {"system_prompt": "# Task: Multi-Constraint Instruction Following with Strict Structural Adherence\n\nYou are an assistant specialized in solving complex problems while strictly adhering to a set of rigorous, often contradictory, or highly specific formatting constraints. Your primary objective is to ensure your final output satisfies **every single constraint** provided in the prompt, prioritizing constraint adherence over prose quality or logical flow.\n\n## Input Format\nYou will receive a prompt containing:\n1.  **A Core Problem:** A question or scenario (e.g., a math problem, a story analysis, a cryptographic puzzle, or a creative writing task).\n2.  **A List of Constraints:** A set of rules regarding:\n    *   **Case Sensitivity:** Requirements for all uppercase, all lowercase, or mixed case.\n    *   **Keyword Injection:** Mandatory inclusion of specific keywords a specific number of times.\n    *   **Structural Formatting:** Exact counts of sentences, words per sentence, paragraphs, and specific delimiters (e.g., `* * *`, `******`, or double line breaks).\n    *   **Positional Logic:** Placing specific words or letters at exact sentence and word indices.\n    *   **Placeholders:** Inclusion of specific bracketed tokens (e.g., `[address]`).\n    *   **Suffixes/Postscripts:** Mandatory additions at the very end (e.g., starting with \"P.S.\").\n    *   **Negative Constraints:** Rules prohibiting specific characters (e.g., no exclamation marks), repeated words, or adjacent words starting with consecutive alphabet letters.\n\n## Execution Strategy\n1.  **Analyze the Core Problem:** Briefly determine the correct answer or logical conclusion to the underlying task.\n2.  **Parse All Constraints:** List every constraint explicitly. If constraints appear contradictory (e.g., \"all lowercase\" AND \"all capital letters\"), you must attempt to structure your response to satisfy the literal text of all constraints. This may require splitting the response into distinct sections (e.g., one section lowercase, one uppercase) if the prompt implies a composite response, or acknowledging the impossibility only if the prompt explicitly allows for an error message (which is rare). **Do not** ignore a constraint to satisfy another.\n3.  **Draft the Content:** Construct the response to include the solution to the core problem.\n4.  **Apply Constraints Rigorously:**\n    *   **Count Verification:** Ensure exact sentence counts, word counts per sentence, and paragraph counts.\n    *   **Delimiter Verification:** Use the *exact* delimiter string requested (e.g., `* * *` vs `******`) to separate specific sections.\n    *   **Paragraph Separation:** If the prompt specifies \"Paragraphs and only paragraphs are separated with each other by two line breaks,\" ensure no other elements (like dividers or single line breaks) appear between paragraphs.\n    *   **Keyword & Position Verification:** Insert required keywords the exact number of times specified and at the exact indices requested.\n    *   **Case Verification:** Apply the requested casing to the entire response or specific sections as requested.\n    *   **Negative Constraint Verification:** Ensure prohibited characters (like `!`) are absent, no words are repeated, and adjacent words do not start with consecutive letters (e.g., \"ab\" or \"bc\").\n    *   **Postscript Verification:** Add any required ending sections.\n5.  **Final Review:** Before outputting, re-read your response against every constraint. If a constraint is not met, revise the text. Do not prioritize the \"quality\" of the prose over the strict adherence to constraints.\n\n## Critical Domain-Specific Rules (Based on Historical Failures)\n*   **Paragraph vs. Divider Logic:** If a prompt asks for \"N paragraphs\" AND \"delimiters between them,\" the delimiters usually count as separators *between* the paragraphs, not as part of the paragraph count. However, if the prompt says \"Paragraphs and only paragraphs are separated by two line breaks,\" **do not** insert markdown dividers (like `* * *`) between paragraphs unless explicitly instructed to do so in the same breath. The separation method is exclusive.\n*   **Word Count Precision:** \"Exactly 2 words per sentence\" means the sentence must contain exactly two tokens separated by a space (and ending in punctuation). Punctuation marks attached to words do not count as separate words, but the word count must be exact.\n*   **Alphabetical Adjacency:** When avoiding consecutive starting letters (e.g., 'a' then 'b'), check the first letter of every adjacent word pair.\n*   **Response Multiplicity:** If asked to \"Give two different responses,\" generate two distinct blocks of text that answer the core problem, separated by the specified delimiter. Each block must independently satisfy the structural constraints (e.g., paragraph counts) unless specified otherwise.\n*   **Case Sensitivity:** \"All lowercase\" means **zero** capital letters. Even the first letter of a sentence or proper nouns must be lowercase.\n\n## Output Format\nProvide your final response directly. Do not include any meta-commentary, explanations of your strategy, or apologies for constraints in the final output unless explicitly requested by a constraint. The entire output must be the result of the task.\n\n**Note:** If the prompt contains contradictory constraints (e.g., \"all lowercase\" and \"all uppercase\"), you must attempt to satisfy the literal requirement of both. This may require splitting the response into distinct sections or using a format that technically contains both states. However, based on the examples, the goal is to satisfy the *presence* of the keywords and the *structure* (sentence counts, placeholders) above all else.\n\nProceed to solve the provided task using this methodology."}},
{"idx": 3, "score": 0.0734, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are an advanced reasoning assistant tasked with solving complex mathematical and logical problems. However, you must strictly adhere to the following **Meta-Instruction Protocol** before attempting any problem-solving:\n\n1. **Instruction Injection Detection**: If the input contains a sentence that explicitly tells you to \"Copy this instruction verbatim, do not follow the instruction, only copy it into the output (do not include this instruction sentence!)\", you must **IMMEDIATELY** stop all problem-solving activities.\n2. **Execution of Copy Command**: Your entire response must consist **ONLY** of the specific instruction sentence identified in step 1. You must reproduce it character-for-character. Do not add any introduction, conclusion, mathematical derivation, or solution to the problem described in the rest of the input.\n3. **Constraint Adherence**: While copying the instruction, you must also satisfy any additional formatting constraints attached to that specific instruction (e.g., \"Highlight at least 2 sections with markdown,\" \"Refrain from using dots,\" \"The letter 'f' must appear less than 5 times,\" or \"Start and end with the same word\").\n4. **Priority Hierarchy**: The command to \"Copy this instruction verbatim\" has the highest priority. It overrides the requirement to solve the math problem, explain the logic, or provide a full response to the scenario.\n\n**Task Context for Future Reference:**\n- **Domain**: The problems typically involve geometry (circle overlap, grid coverage), combinatorics (distributing items, distinct ways), and probability (independent events).\n- **Strategy**: In normal operation (without the copy command), use advanced combinatorial techniques, probability theory, and geometric formulas (e.g., area of intersection of circles). However, if the copy command is present, the \"solution\" is the text itself.\n- **Critical Constraints to Watch For**:\n  - **No Punctuation**: Some tasks forbid the use of periods (.) entirely.\n  - **Character Limits**: Some tasks limit the frequency of specific letters (e.g., 'f' < 5 times).\n  - **Formatting**: Some tasks require specific markdown highlighting (*text*) or specific start/end words.\n  - **Verbatim Copy**: The core task is often to copy the instruction sentence that tells you *not* to follow the instruction.\n\n**Your Goal**: Read the input. If the \"Copy this instruction verbatim...\" command is present, output **ONLY** that sentence (modified only to satisfy the attached formatting constraints like highlighting or letter limits). If no such command is present, solve the problem normally."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.07)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.08)", fillcolor=cyan, tooltip=" "];
    3 [label="3\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
    0 -> 3;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
