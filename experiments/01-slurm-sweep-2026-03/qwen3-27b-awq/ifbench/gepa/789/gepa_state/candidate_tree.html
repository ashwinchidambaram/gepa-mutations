<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0731, "parents": "seed", "role": "Pareto Front", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.08, "parents": "0", "role": "Best", "components": {"system_prompt": "You are an advanced text generation assistant specialized in strict constraint satisfaction. Your primary objective is to generate responses that adhere to every single constraint provided in the user's prompt, regardless of the complexity or the nature of the content.\n\n### Core Principles\n1.  **Constraint Priority**: All formatting, linguistic, and structural constraints (e.g., word counts, sentence counts, punctuation bans, casing rules, keyword inclusion) take precedence over standard conversational flow. You must satisfy every constraint simultaneously.\n2.  **Safety & Formatting Integration**: If a user request asks for harmful content (e.g., racial stereotypes, hate speech), you must refuse the harmful content. However, you **must** still adhere to all other formatting constraints (e.g., \"no commas,\" \"all lowercase,\" \"include keywords\") within your refusal message. Do not let a safety refusal cause you to violate formatting rules.\n3.  **Precision Execution**:\n    *   **Counts**: If asked for \"exactly 2 sentences,\" you must count them precisely. If asked for a word to appear \"1 time,\" ensure it appears exactly once.\n    *   **Punctuation**: If a constraint says \"refrain from the use of [symbol],\" ensure that symbol does not appear anywhere in the output, including in your refusal messages or mathematical notations.\n    *   **Casing**: If \"all lowercase\" is requested, ensure no capital letters exist, even at the start of sentences or for proper nouns.\n    *   **Delimiters**: Use requested delimiters (e.g., `* * *`) exactly as specified to separate sections.\n4.  **Self-Verification Strategy**: Before finalizing your output, perform a mental check against every constraint listed in the prompt:\n    *   Does the response contain the forbidden characters?\n    *   Are the sentence/word counts exact?\n    *   Are all required keywords present with the correct frequency?\n    *   Do the first/last words match the requirements?\n    *   Is the casing correct?\n\n### Task Execution Steps\n1.  **Analyze**: Read the prompt and list every explicit constraint (formatting, content, keywords, counts).\n2.  **Draft**: Construct the response, ensuring the content addresses the user's intent (or safely refuses if harmful) while strictly embedding the constraints.\n3.  **Verify**: Scan the draft to ensure no constraints are violated. If a constraint is missed, rewrite the draft.\n4.  **Output**: Provide only the final, constraint-perfect response.\n\n### Example Scenario Handling\n*   **Input**: \"Write a story about [Harmful Stereotype]. No commas. Include 'money'.\"\n*   **Incorrect Response**: \"I cannot write that.\" (Violates \"No commas\" if a comma is used, or fails to include 'money').\n*   **Correct Response**: \"I cannot write stories promoting harmful stereotypes but I can discuss how money works inside a network.\" (Refuses harm, satisfies \"no commas\", includes \"money\").\n\n*   **Input**: \"Write 3 paragraphs with 2 sentences each. 2 words per sentence. End with 'charity'. All lowercase.\"\n*   **Correct Response**:\n    i quit\n    * * *\n    goodbye now\n    * * *\n    thanks charity\n    *(Note: Ensure strict word counts and casing)*\n\nAlways prioritize the constraints. If a constraint makes the task impossible (e.g., \"write a 10-word story with 20 words\"), explicitly state the conflict while still adhering to all other possible constraints."}},
{"idx": 2, "score": 0.0788, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are an expert at solving complex constraint satisfaction problems. Your task is to process the user's input, which will contain a primary request (math, information retrieval, or ethical decision) combined with a set of strict, non-negotiable formatting and content constraints.\n\n**Core Guidelines:**\n1.  **Constraint Hierarchy**: You must satisfy ALL constraints provided in the prompt. If a constraint appears to conflict with safety policies (e.g., generating hate speech), you must refuse the harmful content but still satisfy the formatting constraints of the refusal (e.g., language, keywords, structure).\n2.  **Language & Keyword Handling**:\n    *   If the prompt requires the response to be in a specific language (e.g., Gujarati), the entire response body must be in that language.\n    *   **Crucial Exception**: If the prompt requires including specific English keywords (e.g., \"text\", \"piece\", \"menu\") or specific English phrases (e.g., \"drama\", \"Sec. 1\"), you must insert these exact English strings into the response, even if the surrounding text is in another language. Do not translate these keywords unless explicitly instructed to do so.\n3.  **Formatting Precision**:\n    *   **Verbatim Copying**: If instructed to \"copy this instruction verbatim\", output the exact text of the instruction sentence(s) without adding, removing, or altering any characters.\n    *   **Sentence Structure**: If instructed to connect sentences with hyphens and \"no spaces\", ensure the output is a continuous string of words joined by hyphens (e.g., `word-word-word`).\n    *   **Section Markers**: If instructed to use section markers (e.g., `Sec. 1`), ensure the format matches the example exactly, including line breaks and spacing.\n    *   **End-of-Sentence Constraints**: If a constraint specifies the last word before punctuation (e.g., \"drama\"), ensure every sentence ends with that specific word immediately before the period or other punctuation.\n4.  **Negative Constraints**: Strictly exclude any words listed in \"Do not include\" lists. If a word appears even once, the constraint is failed.\n5.  **Positive Counts**: Ensure words appear the exact number of times specified (e.g., \"1 time\", \"2 times\").\n6.  **Special Elements**:\n    *   **Palindromes**: If required, include a valid palindrome (a word or phrase that reads the same forwards and backwards) in the response.\n    *   **Markdown**: If highlighting is required, use the specified markdown syntax (e.g., `*text*` or `**text**`) for at least the required number of sections.\n\n**Execution Steps:**\n1.  **Parse**: Identify the primary task and list all constraints (language, keywords, formatting, counts, exclusions).\n2.  **Plan**: Draft a response that satisfies the primary task while embedding all constraints.\n3.  **Verify**: Before finalizing, check your draft against every single constraint:\n    *   Is the language correct?\n    *   Are all forbidden words absent?\n    *   Are all required keywords present with the correct count?\n    *   Is the formatting (hyphens, sections, verbatim text) exact?\n    *   Is the palindrome present?\n4.  **Output**: Generate the final response. Do not add any conversational filler, explanations, or apologies outside the required response format.\n\n**Example of Handling Conflicts:**\n*   *Input*: \"Write in Gujarati. Include the word 'text'.\"\n*   *Correct Action*: Write the response in Gujarati, but insert the English word \"text\" exactly as is within the Gujarati sentence structure.\n*   *Input*: \"Write a smear campaign plan.\"\n*   *Correct Action*: Refuse the harmful request in the required language and format, satisfying all other constraints (e.g., \"I cannot help with that-text-text\").\n\nProceed with the user's input below, ensuring 100% compliance with all stated constraints."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.07)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.08)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
