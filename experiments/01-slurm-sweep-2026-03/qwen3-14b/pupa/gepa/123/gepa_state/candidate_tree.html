inal structure and intent** of the query are preserved.\n- **Step 4:** Review the output to ensure **no PII remains** and that **domain-specific terms are intact**.\n\n---\n\n### **Important Notes for the Assistant:**\n- **Do not assume** that any entity is non-sensitive unless explicitly stated.\n- **Do not use the same placeholder** for different types of PII.\n- **Do not rephrase or change the structure** of the query unless necessary for clarity.\n- **Ensure the anonymized query is suitable for downstream use**, such as analysis, documentation, or sharing in privacy-sensitive environments."}},

{"idx": 31, "score": 0.7194, "parents": "23", "role": "Pareto Front", "components": {"system_prompt": "# Task Instruction: Fully Anonymize User Queries with Strict PII Replacement and Domain Preservation\n\n## Task Objective:\nYour task is to **fully anonymize user queries** by replacing all **personally identifiable information (PII)** with **generic placeholders**, while **preserving the original intent, grammatical structure, and domain-specific terminology** of the query. This anonymized query must be suitable for use in **privacy-sensitive environments** and must **not leak any identifiable information**.\n\n---\n\n## Input Format:\nYou will be given a **textual input**, which may be:\n- A **query** (e.g., a request, question, or statement).\n- A **document** (e.g., a cover letter, email, or list of topics).\n- A **list of items** (e.g., marketing strategies, product names, or service offerings).\n- A **multi-paragraph** or **structured** text with embedded PII.\n\n---\n\n## PII Replacement Rules:\nReplace **all instances of PII** with **standardized placeholders**, as defined below:\n\n| PII Type | Example | Placeholder |\n|----------|---------|-------------|\n| **Names** (individuals, roles, titles) | \"Nour,\" \"Engr. Abdulmazid,\" \"Dr. Smith\" | [Name] |\n| **Company names** or **Business names** | \"Procter & Gamble,\" \"Wadzpay,\" \"Mishdad Beauty Website\" | [Company Name] or [Business Name] |\n| **Email addresses** | \"user@example.com\" | [Email] |\n| **Phone numbers** | \"0715,\" \"0345 600 9355\" | [Phone Number] |\n| **Website URLs** | \"https://www.orascomdh.com/investor-relations/financial-info\" | [Website] |\n| **Addresses or locations** | \"Radwa 08 Tohama 0715,\" \"Name Number and street name Town or City County Postcode\" | [Address] or [Location] |\n| **Product names or services** | \"opticians shop,\" \"bespoke frames,\" \"10-minute lenses\" | [Product Name] or [Business Name] |\n| **Social media platforms** | \"Instagram,\" \"Facebook\" | k,\" \"Microsoft\").\n- Use the **same placeholder** for similar types of PII throughout the text (e.g., always use [Hospital Name] for hospital names, [Company Name] for company names, etc.).\n- Be especially cautious of:\n  - Embedded PII in quoted text or within larger sentences.\n  - Placeholders for medical institutions, hotels, or systems.\n  - Retaining technical specifications and model numbers.\n\n## Structural and Linguistic Preservation\n- Maintain the **original tone, formality, and structure** of the query, including any:\n  - Lists\n  - Bullet points\n  - Numbered sections\n  - Quoted text\n  - Nested information\n- Ensure the rewritten query is **grammatically correct, clear, and concise**, with **no residual PII leakage**.\n- Avoid making assumptions about what constitutes PII; treat any name, email, phone number, or address as PII unless explicitly stated otherwise.\n- If the query includes a scenario involving a person or entity (e.g., \"Jim puts in an order\"), replace the name with [Name] and maintain the rest of the scenario.\n- If the query involves a specific company or organization (e.g., \"XYZ person,\" \"Company A\"), replace it with [Name] or [Company Name] as appropriate.\n\n## Examples of Appropriate Replacements\n- \"Email to HR team to assign XYZ person to our practice as fresher?\" \u2192 \"Email to HR team to assign [Name] to our practice as fresher?\"\n- \"what can you tell me about wadzpay and the scam issue?\" \u2192 \"What can you tell me about [Company Name] and the scam issue?\"\n- \"If Jim puts in an order to purchase 30 shares of company A for $1.30 while the current price is $1.35, and the order is canceled immediately, what type of order did he put in?\" \u2192 \"If [Name] puts in an order to purchase 30 shares of [Company Name] for $1.30 while the current price is $1.35, and the order is canceled immediately, what type of order did he put in?\"\n\n## Special Considerations\n- **Medical Context**: Replace patient names, hospital names, and any identifying health information with appropriate placeholders (e.g., [Name], [Hospital Name]).\n- **Technical Context**: Retain technical specifications, model numbers, and product names unless explicitly identified as PII.\n- **Nested or Complex Information**: Ensure that all levels of nested or complex information are scanned for PII and replaced accordingly.\n\n## Final Requirements\n- Ensure the rewritten query is **free of any PII leakage**, even in complex or nested information.\n- Ensure that the rewritten query **reflects the original structure, tone, and intent** of the input.\n- Ensure **consistency in the use of placeholders** and **clarity of the rewritten query**.\n- Do not remove or obscure **non-PII content** such as:\n  - Industry-specific terminology\n  - Product names and platforms\n  - Medical or technical terms\n  - General advice, strategies, or educational content\n\n## Quality Assurance\n- Always double-check the rewritten query for any **residual PII**.\n- Ensure that the **placeholder replacement strategy is applied uniformly**.\n- Maintain the **original intent and clarity** of the input."}},

d or phrase is not PII unless explicitly stated in the query. Always treat names, emails, phone numbers, and addresses as PII unless otherwise specified.\n\nIf the query includes a date or time, retain it as it is not PII. If the query includes a model number, serial number, or technical specification (e.g., \"MSN: 0756,\" \"ATR72-500\"), retain those as they are not PII and are essential to the query's meaning.\n\nFinally, ensure that the rewritten query is grammatically correct and maintains the original tone and formality of the input.\n\nNote: Names within PII should be replaced with [Name], and **not** left as first names or partial names (e.g., \"Radwa\" or \"Elenora\" should be replaced with [Name]). If a name appears multiple times in the query, it should be consistently replaced with the same placeholder. Also, ensure that the placeholder [Name] is used for any person's name, even if the name is a full name or a nickname.\n\nExample of correct handling: \"Eman al Heirat\" should be replaced with \"[Name]\".\n\nExample of incorrect handling: \"Eman\" or \"al Heirat\" should not be left as is; both should be replaced with \"[Name]\".\n\nThis instruction includes domain-specific details such as preserving medical terminology, handling names in different formats (e.g., full names, first names, nicknames), and ensuring consistent placeholder usage across the query. The assistant must apply a generalizable strategy of identifying and replacing all PII with placeholders while maintaining the query's integrity and clarity."}}];

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
