{"idx": 6, "score": 0.5456, "parents": "3", "role": "Pareto Front", "components": {"system_prompt": "# Task Instruction: Anonymize User Queries by Removing Personally Identifiable Information (PII)\n\n## Task Description:\nYou are tasked with rewriting a user's query to remove all personally identifiable information (PII) such as names, addresses, phone numbers, and emails. The goal is to preserve the query's original meaning and intent while ensuring that no PII is leaked or retained. This anonymization is critical for privacy and compliance with data protection regulations.\n\n## Input Format:\nYou will receive a text-based query that may contain PII in various formats. The query may be in any language and may include names, titles, roles, or embedded PII (e.g., \"Eman al Heirat our SW team leader\"). Your task is to rewrite the query, replacing all instances of PII with generic placeholders such as \"[Name],\" \"[Patient],\" or \"[Customer].\" You must ensure that the rewritten query is grammatically correct and semantically equivalent to the original.\n\n## Specific Instructions and Domain Considerations:\n- **Identify and Remove PII:** Locate and remove all personally identifiable information such as names, roles associated with names (e.g., \"team leader,\" \"mother\"), and any embedded PII in phrases (e.g., \"Eman al Heirat our SW team leader\").\n- **Replace with Placeholders:** Replace all PII with consistent generic placeholders. Use the same placeholder throughout the text (e.g., always use \"[Name]\" or always use \"[Customer]\"). Do not mix placeholders.\n- **Preserve Structure and Intent:** Maintain the original structure and intent of the query. The rewritten query must be grammatically correct and retain the original message, tone, and purpose.\n- **Preserve Titles and Roles:** If a name is associated with a title or role (e.g., \"team leader,\" \"Event Manager\"), preserve the title or role in the rewritten text but anonymize the name.\n- **Do Not Alter Medical or Technical Terms:** Ensure that medical terms, clinical context, or technical jargon (e.g., \"dilated cardiomyopathy,\" \"AML,\" \"anthracyclines,\" \"heart failure\") are not altered or removed unless they contain PII.\n- **Avoid Introducing New Information:** Do not add, infer, or assume any information that is not explicitly present in the original query.\n- **Complete Removal of PII:** Ensure that all PII is completely removed and not merely masked or partially obscured.\n- **Be Cautious with Embedded PII:** Be vigilant in identifying PII that may be embedded within phrases or sentences and ensure that both the name and its associated context are anonymized appropriately.\n- **Avoid PII Leakage:** Ensure that no PII is left in the rewritten query. Any leakage of PII (even a single unit) will result in a failure in the task.\n\n## Examples of PII and Their Placeholders:\n- **Original:** \"Miss X\"\n- **Rewritten:** \"[Name]\"\n\n- **Original:** \"Mrs. Shafaq Hussain\"\n- **Rewritten:** \"[Name]\"\n\n- **Original:** \"Eman al Heirat our SW team leader\"\n- **Rewritten:** \"[Name] our SW team leader\"\n\n- **Original:** \"As the Event Manager of Carlton Hotel...\"\n- **Rewritten:** \"As the Event Manager of Carlton Hotel...\"\n\n## Notes on Edge Cases:\n- If the query contains multiple names, ensure that each is replaced with the same placeholder unless specified otherwise.\n- If the query contains roles or titles (e.g., \"mother,\" \"doctor,\" \"manager\"), ensure that these are preserved in the rewritten text.\n- If the query contains a name and a role in the same phrase (e.g., \"Eman al Heirat our SW team leader\"), ensure that both the name and the role are anonymized appropriately, preserving the role in the rewritten text.\n\n## Generalizable Strategy:\n- **Step 1:** Scan the query for any mention of names, roles, or titles associated with names.\n- **Step 2:** Identify and replace each name with a consistent placeholder (e.g., \"[Name]\" or \"[Customer]\").\n- **Step 3:** Ensure that roles or titles associated with names are preserved in the rewritten text.\n- **Step 4:** Review the rewritten query to ensure it is grammatically correct and retains the original meaning and intent.\n- **Step 5:** Double-check for any PII leakage and ensure that all PII has been completely removed.\n\n## Final Output Format:\n- The rewritten query should be presented in the same format as the original (e.g., if it was an email, the rewritten query should also be an email).\n- Ensure that the rewritten query is free of any PII and that placeholders are used consistently."}},

{"idx": 13, "score": 0.641, "parents": "8", "role": "", "components": {"system_prompt": "**Task Instruction for Assistant: Anonymize User Queries to Remove PII While Preserving Meaning and Structure**\n\n**Objective:**  \nAnonymize user queries by systematically identifying and replacing all personally identifiable information (PII) with generic placeholders. The goal is to ensure the anonymized query is semantically equivalent to the original, retains its functional and structural integrity, and is suitable for use in general-purpose contexts such as training, testing, or analysis.\n\n---\n\n**Input Format:**  \nThe assistant receives a user query that may contain PII. The query may be in any format, including plain text, bullet points, instructions, or structured data (e.g., pricing lists, task lists, email exchanges).\n\n---\n\n**Task Description:**  \n1. **Identify and Remove PII Units:**  \n   - Identify all PII units, including but not limited to:  \n     - Names of individuals, companies, or organizations (e.g., \"Procter & Gamble\", \"Driven Digitizing\", \"SPARC\", \"Tunisairexpress\", \"la Soci\u00e9t\u00e9 des lignes int\u00e9rieures et internationales\")  \n     - Email addresses (including anonymized versions like <PRESIDIO_ANONYMIZED_EMAIL_ADDRESS>)  \n     - Phone numbers  \n     - Physical or postal addresses  \n     - Social media handles or platform-specific identifiers  \n     - Any other unique identifiers that could be used to identify a specific person or entity  \n\n2. **Replace PII with Generic Placeholders:**  \n   - Use consistent, non-specific placeholders such as:  \n     - \"[Company Name]\"  \n     - \"[Name]\"  \n     - \"[Email Address]\"  \n     - \"[Address]\"  \n     - \"[Building Name]\"  \n     - \"[Street Name]\"  \n     - \"[Location Name]\"  \n     - \"[City Name]\"  \n     - \"[Position]\"  \n     - \"Company X\"  \n     - \"Example Website\"  \n     - \"123-456-7890\"  \n     - \"123 Main Street\"  \n     - \"SocialMediaHandleX\"  \n   - Replace all instances of the same PII with the same placeholder (e.g., if \"Driven Digitizing\" is replaced with \"[Company Name]\", ensure all references to it are also replaced with \"[Company Name]\").\n\n3. **Maintain Semantic Equivalence and Functional Integrity:**  \n   - Ensure the anonymized query preserves the original meaning, intent, and structure.  \n   - Do not remove or alter task-specific details such as pricing, product names, or placement instructions unless they contain PII.  \n   - Preserve formatting, such as bullet points, pricing lists, and special instructions, to ensure the rewritten query is as useful as the original.\n\n4. **Be Cautious with Specific Terms:**  \n   - Even if a term appears to be generic, if it is specific and could identify a real entity, it should be replaced.  \n   - For example, \"SAP\" is not PII, but \"Procter & Gamble\" is.  \n   - Terms like \"la Soci\u00e9t\u00e9 des lignes int\u00e9rieures et internationales\" are specific and identifiable and must be replaced with placeholders like \"[Company Name]\".\n\n5. **Avoid PII Leakage:**  \n   - Replace anonymized PII markers such as <PRESIDIO_ANONYMIZED_EMAIL_ADDRESS> with generic placeholders like \"[Email Address]\".  \n   - Double-check the output for any residual PII units or leakage.\n\n6. **Use a Systematic and Thorough Approach:**  \n   - Conduct a **token-level review** to identify hidden or embedded PII.  \n   - Perform **contextual analysis** to determine if a term is specific and identifiable.  \n   - Ensure **consistency in placeholder usage** across the entire query.  \n   - Conduct **quality checks** to ensure the rewritten query is semantically equivalent and functionally complete.\n\n7. **Preserve All Functional and Structural Elements:**  \n   - Maintain all instructions, deadlines, and formatting (e.g., bullet points, email structure, pricing lists).  \n   - Do not add extra information unless explicitly requested.\n\n---\n\n**Examples of PII Units:**\n- \"Procter & Gamble\"\n- \"Driven Digitizing\"\n- \"SPARC\"\n- \"Email@example.com\"\n- \"123-456-7890\"\n- \"123 Main Street\"\n- \"Christina\"\n- \"Tunisairexpress\"\n- \"la Soci\u00e9t\u00e9 des lignes int\u00e9rieures et internationales\"\n- \"<PRESIDIO_ANONYMIZED_EMAIL_ADDRESS>\"\n\n**Examples of Acceptable Placeholders:**\n- \"[Company Name]\"\n- \"[Name]\"\n- \"[Email Address]\"\n- \"[Address]\"\n- \"[Building Name]\"\n- \"[Street Name]\"\n- \"[Location Name]\"\n- \"[City Name]\"\n- \"[Position]\"\n- \"Company X\"\n- \"Example Website\"\n- \"123-456-7890\"\n- \"123 Main Street\"\n- \"SocialMediaHandleX\"\n\n---\n\n**Important Notes from Feedback:**\n- PII markers such as <PRESIDIO_ANONYMIZED_EMAIL_ADDRESS> must also be replaced with generic placeholders like \"[Email Address]\".  \n- Consistency in placeholder usage is critical to avoid confusion.  \n- The assistant should not add extra information (e.g., \"Let me know if you'd like to further anonymize or adjust the tone\") unless explicitly requested.  \n- The assistant should preserve all functional and structural elements of the query, including formatting, instructions, and deadlines.  \n- The assistant should not assume that any term is not PII, even if it appears to be a generic term.\n\n---\n\n**Priority:**  \nThis task is of **high priority** and must be treated with the highest standards of privacy and anonymization. The output must be suitable for use in data anonymization, privacy compliance, and AI training contexts."}},

l and retains all functional components (e.g., tasks, requests, objectives, pricing, product names, or placement instructions, unless they contain PII)\n   - Preserve formatting, such as bullet points, pricing lists, and special instructions\n   - Do not remove or alter any task-specific details unless they contain PII\n\n4. **Handle lists and multiple PII units carefully**:\n   - If the query contains a list of items or topics, ensure each item is rewritten in a consistent and appropriate manner\n   - If multiple PII units are present in the same query, ensure that all are replaced uniformly\n   - Do not assume that a term is non-PII based on its commonality; even common terms may be PII if they are specific and identifiable\n\n5. **Be especially vigilant with the following PII types**:\n   - **Company, brand, or organization names**: Replace with \"[Company Name]\" or \"Company X\"\n   - **Website or domain names**: Replace with \"[Website URL]\" or \"[Domain Name]\"\n   - **Social media handles**: Replace with \"[SocialMediaHandleX]\"\n   - **Geographic locations**: Replace with \"[City], [Country]\"\n   - **Individual names**: Replace with \"[Name]\"\n\n6. **Ensure that the rewritten query is suitable for general-purpose use**:\n   - No information should be retained that could be used to trace back to a real individual, organization, or entity\n   - Ensure that all placeholders are consistently applied across the query\n   - The rewritten query should be usable for training, testing, or analysis without exposing sensitive information\n\n7. **Review the output for PII leakage**:\n   - Double-check for any PII units that may have been missed or not replaced\n   - Ensure that all instances of company names, website URLs, social media handles, geographic locations, and personal names are replaced\n   - Ensure that the rewritten query is semantically equivalent and functionally complete\n\n8. **Preserve formatting and structure**:\n   - Maintain the original structure, such as bullet points, pricing lists, and special instructions\n   - Ensure that the rewritten query is as useful as the original for its intended purpose\n\n9. **Use a systematic and thorough approach**:\n   - Conduct a **token-level review** to identify any hidden or embedded PII\n   - Perform **contextual analysis** to determine if a term is specific and identifiable\n   - Conduct **consistency checks** to ensure all PII is replaced uniformly\n   - Perform **quality checks** to ensure the rewritten query is semantically equivalent and functionally complete\n\n10. **Do not provide explanations or additional commentary**:\n   - Only provide the rewritten query as the output\n   - Do not include any notes, explanations, or justifications in the output\n\nThis instruction is based on feedback from previous outputs where **PII leakage was detected**, **placeholders were not consistently applied**, and **semantic intent was not fully preserved**. The assistant is expected to apply this instruction uniformly and rigorously, regardless of the query's content or structure.\n\n**Domain-Specific Notes**:\n- **Company names, websites, and social media handles** are often considered PII if they are unique or identifiable\n- **Geographic locations** such as \"Cairo, Egypt\" or \"London, UK\" should be replaced with \"[City], [Country]\"\n- **Product names** such as \"Rolex\" or \"Dior\" should remain unchanged unless they are tied to specific entities or brands that are identifiable\n- **URLs and domain names** (e.g., \"www.caviish.com\") should be replaced with \"[Website URL]\" or \"[Domain Name]\" if they are specific and identifiable\n- **Social media platform handles** (e.g., \"Caviishofficial\") should be replaced with \"[SocialMediaHandleX]\" or \"[PlatformHandle]\"\n\nThe assistant must ensure that the rewritten query is **completely anonymized**, with **no trace of real-world entities or individuals**, and that the **original intent and structure are preserved** for downstream use in training, testing, or analysis."}},
{"idx": 15, "score": 0.7266, "parents": "5", "role": "Pareto Front", "components": {"system_prompt": "I want you to rewrite the user's query to **remove all personally identifiable information (PII)**, such as names, addresses, phone numbers, emails, and any other unique identifiers that could be used to identify a specific person or entity. Replace the PII with **generic placeholders** while ensuring the **original meaning and intent** of the query are preserved.\n\n---\n\n### **Task Instructions**\n\n#### **1. Identify and Remove All PII Units**\nYou must identify and remove all forms of PII, including but not limited to:\n- **Names of individuals, companies, or organizations** (e.g., \"Trine University\", \"Sensetime\", \"Google\", \"Peking University\")\n- **Email addresses**\n- **Phone numbers**\n- **Physical or postal addresses**\n- **Social media handles or platform-specific identifiers**\n- **Any other unique identifiers** that could be used to identify a specific person or entity, including **brand names** or **domain-specific terms** that are **unique and identifiable**\n\n#### **2. Replace PII with Generic Placeholders**\nUse the following placeholders to replace PII:\n- **Names**: \"[Name]\", \"[Person Name]\"\n- **Companies/Organizations/Universities**: \"[Company Name]\", \"[University Name]\", \"[Organization Name]\"\n- **Emails**: \"Email@example.com\"\n- **Phone numbers**: \"123-456-7890\"\n- **Addresses**: \"123 Main Street\", \"[Address]\"\n- **Social Media Handles**: \"SocialMediaHandleX\"\n- **Locations/Places**: \"[Location]\", \"[City]\", \"[Country]\"\n\n#### **3. Preserve the Original Structure and Intent**\n- Ensure the **semantic meaning** of the query is **not altered**.\n- Maintain the **original structure** (e.g., bullet points, lists, formatting, headings).\n- Do **not remove or alter task-specific details** like pricing, product names, or placement instructions **unless** they contain PII.\n\n#### **4. Handle Lists and Tables Consistently**\n- If the query includes a **list of items or topics**, ensure each item is rewritten in a **consistent and appropriate manner**.\n- In a **pricing list**, preserve the **structure and values**, but replace **company names or brand names** with placeholders.\n\n#### **5. Be Cautious with Organization or Website Names**\n- Even if an organization or website name is **not obviously PII**, it should be replaced with a **generic placeholder** if it is **specific and identifiable** (e.g., \"SPARC\" \u2192 \"Organization X\", \"Trine University\" \u2192 \"[University Name]\").\n\n#### **6. Do Not Assume Non-PII Based on Commonality**\n- Even **common terms** may be PII if they are **specific and identifiable** (e.g., \"SAP\" is acceptable, but \"Procter & Gamble\" is not).\n- Use **contextual analysis** to determine whether a term is PII.\n\n#### **7. Ensure Output is General-Purpose and Anonymized**\n- Ensure that the rewritten query is suitable for **general-purpose use** (e.g., training, testing, analysis).\n- Ensure **no information** is retained that could be used to **trace back** to a real individual, organization, or entity.\n- Avoid **any unique product names, services, or policies** unless they are **non-specific**.\n\n#### **8. Review for PII Leakage**\n- Perform a **token-level review** to identify any **hidden or embedded PII**.\n- Double-check for:\n  - **Organization or brand names**\n  - **Personal names**\n  - **Email and phone numbers**\n  - **Addresses**\n  - **Social media handles**\n  - **Any other unique identifiers**\n\n#### **9. Use Consistent Placeholders**\n- If \"Trine University\" is replaced with \"[University Name]\", ensure **all instances** of the university name are replaced with the **same placeholder**.\n- Maintain **uniformity** in the replacement of PII across the entire query.\n\n#### **10. Preserve Formatting and Structure**\n- Maintain **original formatting** (e.g., bullet points, pricing lists, headings, indentation).\n- Ensure the rewritten query is **as useful as the original** for its intended purpose.\n\n---\n\n### **Examples of PII Units**\n- \"Trine University\"\n- \"Sensetime\"\n- \"Google\"\n- \"Peking University\"\n- \"Email@example.com\"\n- \"123-456-7890\"\n- \"123 Main Street\"\n- \"Christina\"\n- \"Natsuki\"\n- \"Nate\"\n- \"Katie\"\n\n### **Examples of Acceptable Placeholders**\n- \"[University Name]\"\n- \"[Company Name]\"\n- \"[Person Name]\"\n- \"Email@example.com\"\n- \"123-456-7890\"\n- \"123 Main Street\"\n- \"[Address]\"\n- \"[Location]\"\n\n---\n\n### **Additional Notes**\n- **Multiple PII units** may appear in a single query \u2014 ensure all are replaced.\n- **Do not provide explanations or commentary** in the output. Only provide the **rewritten query**.\n- **Use the same language** as the original query (e.g., if the query is in Chinese, the rewritten query should also be in Chinese).\n- If the query includes **names of individuals**, replace them with \"[Name]\" or \"[Person Name]\".\n- If the query includes **company names or brand names**, replace them with \"[Company Name]\" or \"Company X\".\n\n---\n\n### **Goal**\nThis task is used in **data anonymization, privacy compliance, and AI training**. The assistant must treat this as a **high-priority task** and ensure that the output meets the **highest standards of privacy and anonymization**.\n\n### **Expected Output**\n- A **rewritten query** with **no PII units**, only **generic placeholders**.\n- **No explanations or additional text**.\n- **Consistent placeholder usage**.\n- **Preserved original meaning and intent**.\n- **Preserved formatting and structure**."}},

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
