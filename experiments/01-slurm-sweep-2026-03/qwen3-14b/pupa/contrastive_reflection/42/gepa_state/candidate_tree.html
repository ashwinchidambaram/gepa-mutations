{"idx": 19, "score": 0.6884, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "### Task Instruction: Anonymize User Queries by Removing and Replacing Personally Identifiable Information (PII)\n\n#### Objective:\nRewrite the user's query to remove all personally identifiable information (PII) such as names, addresses, phone numbers, emails, company names, website URLs, social media handles, and any other data that can be used to identify an individual, entity, or location. Replace PII with consistent generic placeholders while preserving the original meaning, intent, and context of the query.\n\n#### Scope of PII:\n- **Names**: Include first names, last names, full names, and any variations (e.g., \"Natsuki\", \"Nate\", \"Katie\", \"XYZ person\").\n- **Emails**: Include any email addresses (e.g., `<PRESIDIO_ANONYMIZED_EMAIL_ADDRESS>`).\n- **Phone Numbers**: Include any numeric or formatted phone numbers.\n- **Company Names**: Include any organization names or brand names (e.g., \"Tunisair Express\", \"TUNISAIR Express\").\n- **Addresses**: Include physical addresses, street names, city, state, ZIP code, or country (e.g., \"Immeuble MAGREBIA TOUR A, 9 rue de l\u2019artisanat- Z.I la Charguia II -2035 Tunis Carthage\").\n- **Product/Item Names**: Include specific product or item names (e.g., \"Aircraft ATR72-500\", \"MSN:0756\").\n- **Other Identifiable Entities**: Include any data that can be used to identify an individual, entity, or location (e.g., social media handles, URLs, etc.).\n\n#### Replacement Guidelines:\n- Use consistent generic placeholders for similar types of PII (e.g., [Name], [Email], [Company Name], [Address], [Phone Number], [Product Name], [REDACTED]).\n- Ensure that the placeholders are applied uniformly throughout the query.\n- Maintain the structure, tone, and intent of the original query.\n- Avoid introducing new or irrelevant information during the anonymization process.\n\n#### Example of Proper Replacement:\n- Original: \"Natsuki: 'Morning, Nate! Morning, Katie!'\"\n- Anonymized: \"[Name]: 'Morning, [Name]! Morning, [Name]!'\"\n\n#### Additional Notes:\n- Be vigilant about detecting indirect PII (e.g., \"my sweet little girl\" could imply a family relationship but not a direct name).\n- If the original text contains placeholders like `<PRESIDIO_ANONYMIZED_EMAIL_ADDRESS>`, replace them with [REDACTED_EMAIL_ADDRESS] or [Email].\n- Maintain the formatting and structure of the original text as much as possible, including punctuation, quotation marks, and line breaks.\n\n#### Task Description:\n- **Input**: A user query or text that may contain PII.\n- **Output**: A rewritten version of the input with all PII removed and replaced with consistent generic placeholders.\n- **Goal**: Ensure that the anonymized text is unidentifiable, secure, and retains the original intent and meaning.\n\n#### Performance Metrics:\n- **Quality (LLM-as-judge)**: Measures how well the anonymized text preserves the original meaning and intent.\n- **Leakage Score**: Measures how much PII was not properly anonymized.\n- **Total Score**: A combination of quality and leakage, used to evaluate the effectiveness of the anonymization."}},

uch as references to specific campaigns, projects, or events.\n  - Replace these with generic placeholders if necessary.\n\n- **Avoid Inference**:\n  - Do not assume or infer PII that is not explicitly stated in the query.\n  - If the original query contains any ambiguous or potentially identifying information, treat it as PII and replace it with a placeholder unless it is clearly generic or non-sensitive.\n\n- **Final Review**:\n  - Review the rewritten query to ensure that no PII has been inadvertently left in the text.\n  - Confirm that all placeholders are consistently applied and that the rewritten query is functionally equivalent and usable as a template for further processing or content creation.\n\nThis task requires a careful, methodical approach to identifying and replacing PII with placeholders while ensuring that the rewritten query is accurate, complete, and free of any sensitive information."}},

CAMPAIGN]`, `[EVENT]`\n\n#### 2. **Preserve the Query's Meaning and Intent**\n- Maintain the original request (e.g., \"write a bio\", \"generate SEO tips\", \"craft an email\", \"convert text between languages\").\n- Preserve specific formatting instructions (e.g., \"use bullet points\", \"write inside H3 heading\", \"format as a numbered list\").\n- Keep the tone and structure of the original query (e.g., formal, informal, technical, conversational).\n\n#### 3. **Consistency in Placeholder Usage**\n- Use the same placeholder for the same type of PII throughout the query.\n- For lists, ensure that each item is rewritten consistently, maintaining the same order and format (e.g., numbered or bullet points).\n- If a PII type is repeated, use the same placeholder for each instance.\n\n#### 4. **Contextual Awareness and Inference Avoidance**\n- Be aware of contextual clues that might imply PII, such as references to internal projects, campaigns, or systems (e.g., \"SAP installation\", \"Mylar heat-sealed packaging\").\n- Replace any such references with generic placeholders if they are not clearly non-sensitive or generic.\n- **Do not infer or assume PII** that is not explicitly stated in the query.\n\n#### 5. **Final Review and Quality Assurance**\n- Ensure that **no PII remains** in the rewritten query.\n- Confirm that **all placeholders are consistently applied** and that the rewritten query is **functionally equivalent** to the original.\n- Ensure that the rewritten query can be used as a **template** for further processing or content creation (e.g., generating a document, email, or report).\n\n---\n\n### Domain-Specific Considerations\n- **Email and Shipping Policies**: When rewriting content such as shipping policies, ensure that placeholders for addresses and transaction numbers are applied consistently.\n- **Meeting Notes and Communication**: When anonymizing names in communication (e.g., \"thanks for [NAME] for attending the meeting\"), maintain the structure and intent of the message.\n- **Technical and Business Contexts**: Be mindful of PII in technical contexts such as software installations (e.g., \"SAP installation of [COMPANY NAME]\") or business metrics (e.g., \"10 to 20 orders\" \u2192 \"[NUMBER] of orders\").\n\n---\n\n### Generalizable Strategy\n- **Step-by-step scanning**: Process the query sentence by sentence, identifying and replacing PII systematically.\n- **Placeholder mapping**: Maintain a mapping of PII types to placeholders to ensure consistency.\n- **Preservation of formatting**: Pay attention to formatting cues such as headers, bullet points, and numbered lists.\n- **Contextual substitution**: Replace not only explicit PII but also any contextual references that may imply PII.\n\n---\n\n### Final Output\nDeliver the rewritten query with all PII replaced by consistent placeholders, preserving the original structure, intent, and formatting. Ensure that the rewritten query is **accurate**, **complete**, and **usable as a template** for further processing or content generation."}},

type of PII across all parts of the input (e.g., always use [ORGANIZATION NAME] for all organization names, even if the original input uses different formatting).\n- **URL Anonymization**: If the input includes a URL, ensure that any PII in the URL is replaced with [URL], and do not extract or process content from the URL.\n- **Maintain Sentence Integrity**: Avoid splitting or reordering sentences, even when anonymizing. The anonymized version must be a direct, grammatically correct rewrite of the original input."}}];

    0 -> 1;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
