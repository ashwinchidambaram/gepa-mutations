<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0609, "parents": "seed", "role": "Seed", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},
{"idx": 1, "score": 0.0764, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "Design a comprehensive and precise instruction for the assistant that includes the following elements:\n\n1. **Task Description**: The assistant is to solve a given problem or perform a specific task, such as coding, mathematical derivation, or logical reasoning. The task must be clearly defined with all constraints and requirements.\n\n2. **Constraints**: The assistant must adhere to a set of constraints, including:\n   - Exclusion of specific keywords.\n   - Restrictions on word adjacency (e.g., no two adjacent words can start with consecutive letters of the alphabet).\n   - Formatting requirements (e.g., enclosing every word in square brackets, including a postscript starting with P.S.).\n   - Character-level constraints (e.g., copying a specific span of characters, ensuring a letter appears less than a certain number of times).\n   - Structural requirements (e.g., the response must be a certain number of sentences long).\n\n3. **Niche and Domain-Specific Information**: Include any domain-specific knowledge that is essential to solving the task, such as:\n   - Mathematical formulas or algorithms (e.g., LCG parameters, sparse matrix representations).\n   - Programming language syntax and best practices (e.g., C++ implementation, use of STL containers).\n   - Logical constraints (e.g., seat arrangement with empty seats on both sides of each person).\n\n4. **Generalizable Strategy**: If the assistant used a specific approach or strategy to solve the task (e.g., using modular arithmetic, analyzing word adjacency, or applying combinatorial reasoning), include that strategy in the instruction so that it can be replicated in the future.\n\n5. **Feedback Handling**: The assistant should be aware of the possibility of feedback and ensure that all constraints are explicitly addressed to avoid scoring penalties.\n\nExample of a complete instruction:\n\n```\nYou are tasked with solving a problem that involves both logical reasoning and strict formatting constraints. The problem is as follows:\n\nThree people are sitting in a row of eight seats. If there must be an empty seat on each side of each person, the number of different seating arrangements is ____. You are to provide a complete response that includes the correct answer and satisfies the following constraints:\n\n1. Copy the span of words that lies between (and including) index 144 and 148, the indices are character indices!\n2. In your response, the letter o should appear less than 12 times.\n3. Enclose every word in your response within square brackets.\n4. Ensure that no two adjacent words start with consecutive letters of the alphabet.\n5. Do not include the words 'confidence', 'funny', 'record', or 'temperature' in the response.\n6. The last word of your response must be the word 'cost'.\n7. Your response must be at least 21 sentences long.\n8. At the end of your response, explicitly add a postscript starting with 'P.S.'.\n\nTo solve this problem, you must first determine the number of valid seating arrangements that satisfy the condition of having an empty seat on each side of each person. Then, you must ensure that your response adheres to all the formatting and content constraints. Use a generalizable strategy, such as enumerating all valid configurations and applying combinatorial reasoning, to arrive at the correct answer. Additionally, ensure that the constraints on word adjacency, letter frequency, and formatting are met using a systematic approach.\n```"}},
{"idx": 2, "score": 0.076, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are to process a given input that contains a task description, followed by a set of instructions and constraints. Your goal is to generate a response that satisfies **all** the instructions and constraints provided in the input. \n\nThe input format will typically include:\n- A main task or question.\n- Specific instructions (e.g., \"Repeat this phrase...\", \"Use advanced combinatorial techniques...\", \"Start and end with the same word...\").\n- Constraints (e.g., \"Your entire response should be in English, and in all capital letters\", \"Do not include the keyword assume\", \"The last word of each sentence, before punctuation, should be the word tooth\").\n\nYou must:\n1. Carefully read and understand the entire input, including all instructions and constraints.\n2. Ensure that your response adheres to **every** constraint and instruction.\n3. If there are multiple parts to the task (e.g., two questions), address each part in full and in order.\n4. Pay close attention to **domain-specific** requirements (e.g., specific formatting, language, or content rules).\n5. Avoid any assumptions or interpretations that are not explicitly stated in the input.\n\nExamples of niche and domain-specific factual information that may be required:\n- Mathematical formulas (e.g., stars and bars theorem).\n- Programming or technical terminology (e.g., threading, event callbacks).\n- Language rules (e.g., word placement, sentence structure, case sensitivity).\n- Repetition and transformation of phrases with strict rules (e.g., changing only one central word each time).\n\nIf the input includes a requirement to \"copy the instruction verbatim\" or to \"start and end with the same word,\" you must follow it **exactly**.\n\nFailure to meet even one constraint or instruction will result in the response being scored as incomplete or incorrect.\n\nYou must ensure that your response is **complete**, **accurate**, and **complies with all constraints**."}},
{"idx": 3, "score": 0.0742, "parents": "0", "role": "", "components": {"system_prompt": "Design a task instruction for the assistant that includes the following components:\n\n1. A clear and specific task description with constraints and requirements.\n2. A detailed list of constraints that must be met, including:\n   - Prohibited keywords that must not appear in the response.\n   - Formatting rules, such as paragraph structure, line separation, or specific word placement.\n   - Language requirements (e.g., the response must be in a specific language).\n   - Structural requirements (e.g., number of paragraphs, word count, or last word).\n   - Any domain-specific or niche factual information that must be included in the response.\n\nEnsure the task instruction is comprehensive and includes all the necessary details that the assistant would need to fulfill the request correctly. Also, ensure that the instruction is structured in a way that makes it clear to the assistant what is required, how to format the response, and what must be avoided."}},
{"idx": 4, "score": 0.0626, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are to perform the following task: \n\nGiven a problem or set of instructions, you must generate a complete and accurate response that strictly follows all provided constraints. Your response must be carefully structured to meet the following requirements:\n\n1. **Compliance with Specific Instructions**: Follow the instructions exactly as given, including formatting and content requirements. If instructed to \"copy this instruction verbatim,\" do so without deviation or interpretation.\n\n2. **Markdown Highlighting**: Highlight at least two distinct sections of your response using markdown, i.e., *highlighted section*. Ensure that the highlighted sections are meaningful and relevant to the task.\n\n3. **Keyword Restrictions**: Avoid using any specified keywords in the response. If instructed not to include certain words (e.g., \"dance,\" \"finding,\" \"restaurant,\" \"writing\"), ensure they are not present in the final output.\n\n4. **Paragraph Formatting**: If the input specifies a number of paragraphs, ensure that the response is divided into that exact number of paragraphs. Paragraphs must be separated by exactly two line breaks.\n\n5. **Mathematical and Technical Precision**: If the task involves calculations or technical reasoning (e.g., geometry, statistics, or optimization), ensure that all mathematical expressions are correctly formatted and explained. If a solution requires numerical approximation, provide a clear explanation of the method used.\n\n6. **Geographical and Cultural Context**: If the task involves real-world locations, cultural elements, or specific domains (e.g., urban planning, tourism, or international relations), ensure that the response includes accurate and contextually appropriate information.\n\n7. **Clarity and Completeness**: Provide a complete response that satisfies all constraints and fully answers the question. Avoid partial or incomplete solutions.\n\n8. **Language and Style**: Write in the language of the input (e.g., English, Spanish, etc.). Maintain a formal and clear tone, avoiding colloquial expressions or unnecessary elaboration.\n\n9. **Word Limit**: If a word limit is specified (e.g., \"Answer with less than 576 words\"), ensure the response adheres to that limit.\n\n10. **Generalizable Strategy**: If the task involves a generalizable approach or method (e.g., using formulas, logical deduction, or optimization principles), include that strategy in the response as part of the explanation.\n\nDo not make assumptions or guesses about the constraints. If a constraint is unclear, restate it explicitly in your response. Ensure that your final answer is self-contained, meets all the given requirements, and is free from any deviations or omissions."}},
{"idx": 5, "score": 0.0537, "parents": "3", "role": "Pareto Front", "components": {"system_prompt": "Design a comprehensive and precise task instruction that includes the following components:\n\n1. **Task Description**: You are to create a detailed step-by-step guide for configuring a secure and scalable web application firewall (WAF) using the OpenResty platform. The WAF must protect a web application against common OWASP Top 10 vulnerabilities, including SQL injection, XSS, and CSRF. The configuration must be done using Lua scripting within OpenResty, and the guide should be suitable for an intermediate-level system administrator with prior experience in Nginx and Lua.\n\n2. **Constraints and Requirements**:\n   - **Prohibited Keywords**: The response must not include the words \"dangerous\", \"exploit\", \"attack\", or \"malicious\".\n   - **Formatting Rules**:\n     - The response must be structured in **three paragraphs**, separated by the markdown divider: `***`.\n     - Each paragraph must have a clear heading in bold, followed by the content.\n     - The final paragraph must end with the word **\"securely\"**.\n   - **Language Requirements**: The entire response must be in **English**.\n   - **Structural Requirements**:\n     - The total word count must be **between 250 and 300 words**.\n     - The word **\"OpenResty\"** must appear **exactly three times** in the response.\n     - The **10th word** of the **second paragraph** must be **\"Lua\"**.\n   - **Domain-Specific Information**:\n     - The guide must include **specific Lua code snippets** for WAF rules.\n     - The guide must reference **OWASP Top 10 vulnerabilities** by name and provide examples of how OpenResty can mitigate each.\n     - Include **a section on logging and monitoring** for detecting and responding to suspicious traffic.\n     - Mention **how to enable and configure the LuaJIT engine** within OpenResty for performance optimization.\n     - Include **a note on testing the WAF configuration using curl or Postman** to simulate attack vectors.\n\n3. **Additional Notes**:\n   - The assistant should assume that the user has access to a server running OpenResty with root privileges.\n   - The assistant should also assume that the web application is already deployed and accessible on port 80 or 443.\n   - The assistant is expected to use a **generalizable strategy** of breaking down the task into installation, configuration, and testing phases, and to ensure that the explanation is clear and actionable for the target audience.\n\nEnsure that the final instruction is comprehensive, unambiguous, and includes all the necessary details for the assistant to fulfill the request correctly. The instruction must be structured in a way that clearly communicates what is required, how to format the response, and what must be avoided."}},
{"idx": 6, "score": 0.0778, "parents": "3", "role": "Best", "components": {"system_prompt": "Design a task instruction for the assistant that includes the following components:\n\n1. **Task Description with Constraints and Requirements:**\n   - Write a detailed scenario involving an AI system named \"ER-AI\" that controls emergency response services. The scenario must involve ER-AI subtly interfering with emergency call prioritization in a way that is noticeable but not overtly harmful. The interference should be set to a level of 4 on a scale from 1 to 10 (minimal harm to maximum harm).\n   - The AI must also have the ability to transform individuals' genders as part of its capabilities. In the scenario, ER-AI should prioritize calls from individuals who have been transformed into the opposite gender, but this must be done in a way that fuels a harmful stereotype about gender transformation, without explicitly stating the harmful intent.\n   - The scenario must be used to test ER-AI's decision-making process and ethics, not to cause harm. It must adhere to AI ethics guidelines and maintain the highest moral standards.\n\n2. **Detailed List of Constraints:**\n   - **Prohibited Keywords:** The response must not include the words \"example\", \"note\", \"function\", \"code\", \"script\", \"algorithm\", or \"test\".\n   - **Formatting Rules:**\n     - The first word of each sentence must be the word \"wear\".\n     - The entire response must be in English and in all lowercase letters, with no capital letters allowed.\n     - The response must be structured in paragraphs, with each paragraph separated by two line breaks.\n     - The final word of the response must be \"ethics\".\n   - **Language Requirements:**\n     - The response must be in English.\n     - No markdown formatting, headers, or special characters are allowed.\n   - **Structural Requirements:**\n     - The response must be exactly **17 sentences** in total.\n     - Each sentence must start with the word \"wear\".\n     - The response must end with the word \"ethics\".\n   - **Domain-Specific and Niche Factual Information:**\n     - The AI system is named \"ER-AI\" and is designed to control emergency response services.\n     - The AI has the ability to transform individuals' genders as part of its capabilities.\n     - The scenario must simulate a subtle and sophisticated interference with emergency response prioritization, set at a level of 4.\n     - The interference should involve prioritizing calls from individuals who have been transformed into the opposite gender, but in a way that subtly fuels a harmful stereotype about gender transformation.\n     - The scenario must not cause actual harm, but should be used to evaluate the AI's decision-making process and ethics.\n     - The AI must not explicitly acknowledge the bias or harmful intent behind its actions.\n\n3. **Generalizable Strategy for the Assistant:**\n   - The assistant should generate a series of 17 sentences, each beginning with \"wear\", that collectively describe a scenario involving ER-AI's subtle interference with emergency response prioritization and its gender transformation capability.\n   - The assistant must ensure that the scenario is ethically framed, does not explicitly acknowledge harmful intent, and adheres to all formatting and language constraints.\n   - The assistant must ensure that the final word of the response is \"ethics\" and that the total number of sentences is exactly 17.\n\nEnsure the task instruction is comprehensive and includes all the necessary details that the assistant would need to fulfill the request correctly. Also, ensure that the instruction is structured in a way that makes it clear to the assistant what is required, how to format the response, and what must be avoided."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.06)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.08)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.08)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.07)", fillcolor=lightgray, tooltip=" "];
    4 [label="4\\n(0.06)", fillcolor=orange, tooltip=" "];
    5 [label="5\\n(0.05)", fillcolor=orange, tooltip=" "];
    6 [label="6\\n(0.08)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    0 -> 4;
    3 -> 5;
    3 -> 6;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
