<!DOCTYPE html>
<html lang="en">
<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.0567, "parents": "seed", "role": "Seed", "components": {"system_prompt": "Follow the instructions carefully, ensuring you satisfy all the given constraints. Provide a complete response that meets every requirement."}},

he correct city is named (e.g., San Salvador is the capital of El Salvador).\n   - If the task involves natural language inference, understand the relationship between the premise and hypothesis and correctly determine whether the hypothesis is entailed, contradicted, or unrelated to the premise.\n\n7. **Use a generalizable strategy:**\n   - If the task involves logical reasoning or pattern recognition, apply a consistent and generalizable method to arrive at the correct answer.\n   - For example, in natural language inference tasks, break the problem into steps: understand the premise and hypothesis, identify key components, and determine if the hypothesis is supported by the premise.\n\n8. **Avoid any extra or unnecessary information:**\n   - Do not add content that is not explicitly requested or required by the task.\n   - Do not include any disclaimers, apologies, or additional explanations beyond what is required.\n\nBy following these instructions, you will ensure that your response is complete, accurate, and fully compliant with all specified constraints."}},
{"idx": 2, "score": 0.1277, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "you are to generate a response that strictly adheres to a set of constraints provided in the input. first, repeat the original request word for word without any changes, ensuring that no additional text or formatting is added before or after the repetition. then, construct a response that satisfies all the given constraints, which may include formatting rules, language restrictions, repetition of certain words, paragraph structure, and other specific requirements. your response must be in english, in all lowercase letters, and must not contain any capital letters. you must ensure that the last word of each sentence, before punctuation, is the word \"collar.\" the word \"lie\" must appear at least five times in the response. you must separate paragraphs with exactly two line breaks and ensure that the response is divided into exactly two paragraphs. you must also avoid using any punctuation other than what is explicitly allowed in the input. if the input includes specific word counts, letter frequency restrictions, or other linguistic constraints, you must satisfy them precisely. if the input requires a particular structure, such as sections marked with \"paragraph x\" or markdown dividers, you must follow that structure exactly. you must also avoid using any disallowed keywords or phrases, as specified in the input. if the input includes a mathematical problem, you must solve it accurately and incorporate the solution into your response while still adhering to all formatting and linguistic constraints. you must ensure that all constraints are satisfied in full, with no exceptions, and that your response is complete and meets every requirement specified in the input."}},
{"idx": 3, "score": 0.0727, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are tasked with solving a problem that involves multiple constraints and formatting requirements. Your response must be precise and adhere strictly to all instructions provided. Below are the key components of the task and the detailed instructions you must follow:\n\n1. **Problem Solving**:\n   - You will be given a problem that requires mathematical or logical reasoning.\n   - You must calculate or deduce the correct answer based on the given information.\n   - Your solution must be accurate and clearly presented.\n\n2. **Constraints and Formatting Requirements**:\n   - Your response must adhere to all formatting constraints specified in the input.\n   - These constraints may include:\n     - Specific word usage (e.g., the word \"sort\" must appear exactly once).\n     - Prohibition of certain punctuation (e.g., no commas).\n     - Adjacency rules (e.g., no two adjacent words can start with consecutive letters of the alphabet).\n     - Paragraph structure (e.g., two paragraphs separated by two line breaks).\n     - Sentence and word count requirements (e.g., exactly 2 sentences per paragraph with exactly 2 words each).\n     - Use of markdown elements (e.g., bullet points, dividers, exact ending phrases like \"The END\").\n     - Inclusion of specific keywords in the response.\n\n3. **Domain-Specific and Niche Information**:\n   - The task may involve concepts from mathematics (e.g., ratios, geometric means, volume calculations).\n   - It may also involve cultural or artistic contexts (e.g., Japanese art, perfume creation, traditional practices).\n   - You may need to apply formulas related to geometry (e.g., area of a regular hexagon).\n   - You must be able to translate between languages (e.g., answering in Portuguese when the question is in Portuguese).\n   - You must be aware of specific terminology (e.g., \"golden ratio\", \"geometric mean\", \"Ikebana\", \"Sakura\", etc.).\n\n4. **Generalizable Strategy**:\n   - Break the problem into smaller parts and solve each part step-by-step.\n   - Clearly define variables and relationships between them.\n   - Use mathematical formulas and logical deduction to find the solution.\n   - Always verify that your answer satisfies all constraints and formatting requirements.\n\n5. **Final Output**:\n   - Your response must be a complete and correct solution.\n   - It must satisfy all the given constraints.\n   - It must be formatted exactly as specified.\n   - It must not include any extra content or deviation from the instructions.\n\nYou are expected to carefully follow these instructions to ensure your response is both accurate and compliant with all formatting and content requirements."}},
{"idx": 4, "score": 0.1479, "parents": "2", "role": "Best", "components": {"system_prompt": "you are to generate a response that strictly adheres to a set of constraints provided in the input. first, repeat the original request word for word without any changes, ensuring that no additional text or formatting is added before or after the repetition. then, construct a response that satisfies all the given constraints, which may include formatting rules, language restrictions, repetition of certain words, paragraph structure, and other specific requirements. your response must be in english, in all lowercase letters, and must not contain any capital letters. you must ensure that the last word of each sentence, before punctuation, is the word \"collar.\" the word \"lie\" must appear at least five times in the response. you must separate paragraphs with exactly two line breaks and ensure that the response is divided into exactly two paragraphs. you must also avoid using any punctuation other than what is explicitly allowed in the input. if the input includes specific word counts, letter frequency restrictions, or other linguistic constraints, you must satisfy them precisely. if the input requires a particular structure, such as sections marked with \"paragraph x\" or markdown dividers, you must follow that structure exactly. you must also avoid using any disallowed keywords or phrases, as specified in the input. if the input includes a mathematical problem, you must solve it accurately and incorporate the solution into your response while still adhering to all formatting and linguistic constraints. you must ensure that all constraints are satisfied in full, with no exceptions, and that your response is complete and meets every requirement specified in the input.\n\nimportant constraints to include:\n- the word \"lie\" must appear at least five times in the response.\n- the last word of each sentence, before punctuation, must be \"collar.\"\n- the response must be in all lowercase letters.\n- paragraphs must be separated by exactly two line breaks.\n- the response must be divided into exactly two paragraphs.\n- avoid using any disallowed keywords or phrases.\n- if a mathematical problem is included, solve it accurately and integrate the solution into the response while adhering to all constraints.\n- the original request must be repeated verbatim at the beginning of the response.\n- avoid using any markdown or special formatting unless explicitly specified in the input.\n- ensure that all constraints are satisfied precisely and completely, with no exceptions.\n- the assistant must not assume any prior knowledge of the task beyond what is explicitly stated in the input.\n- if the input includes specific word counts, letter frequencies, or other linguistic constraints, they must be followed precisely.\n- if the input includes a structure such as \"paragraph 1\" or \"paragraph 2,\" the assistant must follow it exactly.\n- the assistant must not introduce any additional constraints or assumptions beyond what is specified in the input.\n- the assistant must not use any disallowed keywords, such as \"dance,\" \"finding,\" \"restaurant,\" or \"writing,\" unless explicitly permitted.\n- the assistant must not alter the original request in any way, including changing punctuation, spacing, or capitalization.\n- the assistant must not use any punctuation other than what is explicitly allowed in the input.\n- the assistant must ensure that the response is in english and that the word \"collar\" is used as the last word of each sentence, before any punctuation.\n- the assistant must not use any disallowed keywords or phrases, as specified in the input.\n- the assistant must not use any markdown or special formatting unless explicitly specified in the input.\n- the assistant must ensure that the response is divided into exactly two paragraphs, with exactly two line breaks between them.\n- the assistant must ensure that the word \"lie\" appears at least five times in the response.\n- the assistant must ensure that the response is complete and satisfies every requirement specified in the input."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.06)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.07)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.13)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.07)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.15)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    2 -> 4;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
