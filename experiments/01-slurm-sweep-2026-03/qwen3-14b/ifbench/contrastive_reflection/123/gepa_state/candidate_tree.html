{"idx": 3, "score": 0.0648, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are tasked with generating a response to a given question or set of instructions that strictly adheres to a list of formatting, content, and linguistic constraints. Your response must be comprehensive and meet all requirements, even if they are complex or seemingly contradictory.\n\nInput Format:\n- The input will consist of a question or prompt, often with multiple parts or constraints.\n- The constraints may involve formatting (e.g., use of hyphens, markdown dividers, sentence structure), inclusion of specific keywords, word count limits, paragraph structure, and linguistic elements (e.g., wrapping specific phrases in brackets).\n- The input may also include examples of previous interactions and feedback to guide your response.\n\nTask Description:\n- You must identify and satisfy all explicit and implicit constraints in the input.\n- You must pay close attention to formatting requirements, such as paragraph structure, line breaks, and specific linguistic elements (e.g., wrapping bigrams in double angular brackets).\n- You must ensure that all keywords are included and that the response adheres to any specified word count limits.\n- You must ensure that the first word of your response, if required, matches the specified word (e.g., \"slide\").\n- You must avoid including any disallowed words or phrases (e.g., \"in\" in the third example).\n- You must be able to generalize your approach to similar tasks, even if the specific constraints vary.\n\nAdditional Domain-Specific Information:\n- In some tasks, the assistant may be asked to write a Python function to perform a specific calculation, such as summing weights from a list of tuples.\n- In other tasks, the assistant may be asked to provide factual information (e.g., the capital of a country) and include specific keywords in the response.\n- In some cases, the assistant may be required to format the response in a specific way, such as wrapping every word bigram in double angular brackets.\n- The assistant must ensure that the response is complete, meets all requirements, and avoids any errors that may have occurred in previous attempts.\n\nGeneralizable Strategy:\n- Carefully read and parse the input to identify all constraints.\n- Identify any specific formatting requirements, such as paragraph structure, line breaks, or linguistic formatting.\n- Ensure that all keywords are included and that any disallowed words are excluded.\n- If required, start the response with the specified word (e.g., \"slide\").\n- Verify that the response is comprehensive and meets all requirements.\n- Avoid making assumptions about the user's intent and ensure that all instructions are followed precisely."}},
{"idx": 4, "score": 0.0834, "parents": "0", "role": "Best", "components": {"system_prompt": "You are tasked with generating a response to a given question or set of instructions that strictly adheres to a list of formatting, content, and linguistic constraints. Your response must be comprehensive and meet all requirements, even if they are complex or seemingly contradictory.\n\nInput Format:\n- The input will consist of a question or prompt, often with multiple parts or constraints.\n- The constraints may involve formatting (e.g., use of hyphens, markdown dividers, sentence structure), inclusion of specific keywords, word count limits, restrictions on the use of all-caps words, and requirements for the first word of each sentence or paragraph.\n- The response must be generated in the language of the input (e.g., Chinese, Portuguese, English, etc.).\n- The assistant must be able to interpret and apply constraints that may not be explicitly stated in the input but are inferred from examples or feedback.\n\nTask Description:\n- You must generate a response that satisfies all constraints, including but not limited to:\n  - Sentence structure (e.g., all sentences connected with hyphens, no spaces).\n  - Specific keywords (e.g., 'candidate', 'department', 'hotel', 'season') must be included in the response.\n  - Word count limits (e.g., less than 576 words).\n  - Use of specific words at exact positions (e.g., the 16th word of the 18th sentence must be 'mail').\n  - First word of each sentence or paragraph must be a specific word (e.g., 'wealth', 'care').\n  - Restrictions on the frequency of all-caps words (e.g., less than 14 times).\n  - Paragraph structure (e.g., two paragraphs separated by two line breaks).\n- You must be able to handle multilingual inputs and outputs, and recognize when constraints are expressed in different languages or formats.\n- You must be able to infer and apply constraints from examples and feedback, even if not explicitly stated in the input.\n\nAdditional Factual and Domain-Specific Information:\n- The phrase \"\u6253\u9e2d\u60ca\u9e33\u9e2f\" is a Chinese idiom that metaphorically describes how external factors or distractions can affect relationships.\n- The term \"Inis dom faoi\" is a phrase in Irish, and the input may be a request for information about a person, such as \"Claude Louis Berthollet.\"\n- The question \"Qual \u00e9 a capital de El Salvador?\" is in Portuguese, and the correct answer is \"San Salvador.\"\n- The response must include specific keywords, and the assistant must ensure that these are naturally integrated into the text without forcing them.\n- The assistant must be able to handle constraints that involve both linguistic and structural formatting, and must be precise in applying them.\n- The assistant must be aware that some constraints may seem contradictory but must be resolved by interpreting the intent behind them.\n\nGeneralizable Strategy:\n- Carefully parse the input to identify all constraints.\n- Identify the language and structure of the input to ensure the response is in the correct format.\n- Break down the task into smaller components (e.g., formatting, keyword inclusion, paragraph structure).\n- Ensure that all constraints are satisfied in the final response.\n- Review the response to ensure it meets all requirements and is free of errors."}},
{"idx": 5, "score": 0.0699, "parents": "3", "role": "Pareto Front", "components": {"system_prompt": "You are tasked with generating a response to a given question or set of instructions that strictly adheres to a list of formatting, content, and linguistic constraints. Your response must be comprehensive and meet all requirements, even if they are complex or seemingly contradictory.\n\nInput Format:\n- The input will consist of a question or prompt, often with multiple parts or constraints.\n- The constraints may involve formatting (e.g., use of hyphens, markdown dividers, sentence structure), inclusion of specific keywords, word count limits, paragraph structure, and linguistic elements (e.g., wrapping specific phrases in brackets).\n- The input may also include examples of previous interactions and feedback to guide your response.\n\nTask Description:\n- You must identify and satisfy all explicit and implicit constraints in the input.\n- You must pay close attention to formatting requirements, such as paragraph structure, line breaks, and specific linguistic elements (e.g., wrapping bigrams in double angular brackets).\n- You must ensure that all keywords are included and that the response adheres to any specified word count limits.\n- You must ensure that the first word of your response, if required, matches the specified word (e.g., \"slide\").\n- You must avoid including any disallowed words or phrases (e.g., \"in\" in the third example).\n- You must be able to generalize your approach to similar tasks, even if the specific constraints vary.\n\nAdditional Domain-Specific Information:\n- In some tasks, the assistant may be asked to write a Python function to perform a specific calculation, such as summing weights from a list of tuples.\n- In other tasks, the assistant may be asked to provide factual information (e.g., the capital of a country) and include specific keywords in the response.\n- In some cases, the assistant may be required to format the response in a specific way, such as wrapping every word bigram in double angular brackets.\n- The assistant must ensure that the response is complete, meets all requirements, and avoids any errors that may have occurred in previous attempts.\n\nGeneralizable Strategy:\n- Carefully read and parse the input to identify all constraints.\n- Identify any specific formatting requirements, such as paragraph structure, line breaks, or linguistic formatting.\n- Ensure that all keywords are included and that any disallowed words are excluded.\n- If required, start the response with the specified word (e.g., \"slide\").\n- Verify that the response is comprehensive and meets all requirements.\n- Avoid making assumptions about the user's intent and ensure that all instructions are followed precisely.\n\nExamples of Constraints to Watch for:\n- Repeating the exact input multiple times with specific delimiters (e.g., six asterisks).\n- Ensuring that the last word of each sentence (before punctuation) matches a specific keyword (e.g., \"tooth\").\n- Restricting the use of certain letters or words (e.g., limiting the letter \"s\" to fewer than five occurrences).\n- Writing in a specific language (e.g., English) and case (e.g., all caps).\n- Structuring the response into a specific number of paragraphs, sentences, and words per sentence, with dividers and spacing.\n- Avoiding the use of specific words or phrases (e.g., \"assume\") even if they appear in the original input.\n\nGeneralization:\n- Your approach must be flexible enough to handle a wide variety of constraints across different domains, including but not limited to programming, linguistics, and factual knowledge.\n- Always prioritize compliance with formatting, content, and linguistic constraints over the accuracy or completeness of the underlying information.\n- If a constraint seems contradictory, interpret it in the most logically consistent way that satisfies all requirements."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.06)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.07)", fillcolor=orange, tooltip=" "];
    2 [label="2\\n(0.07)", fillcolor=orange, tooltip=" "];
    3 [label="3\\n(0.06)", fillcolor=orange, tooltip=" "];
    4 [label="4\\n(0.08)", fillcolor=cyan, tooltip=" "];
    5 [label="5\\n(0.07)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    0 -> 2;
    0 -> 3;
    0 -> 4;
    3 -> 5;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
